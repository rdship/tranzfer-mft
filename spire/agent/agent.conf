## =============================================================================
## TranzFer MFT — SPIRE Agent Configuration
##
## The agent runs on every Docker host, exposes the SPIFFE Workload API
## via Unix socket at /run/spire/sockets/agent.sock, and issues SVIDs
## to each registered workload (service container).
##
## Dev (Docker Compose):
##   - insecure_bootstrap = true   (skip CA pinning on first connect — DEV ONLY)
##   - NodeAttestor "join_token"   (one-time token generated by bootstrap.sh)
##   - WorkloadAttestor "docker"   (attests by container label)
##
## Production (Kubernetes):
##   - Remove insecure_bootstrap
##   - NodeAttestor  "k8s_psat"    (Kubernetes Projected Service Account Token)
##   - WorkloadAttestor "k8s"      (Kubernetes pod identity)
##   Use Red Hat SPIRE Operator for lifecycle management.
## =============================================================================

agent {
  data_dir       = "/opt/spire/data"
  log_level      = "INFO"
  log_format     = "json"

  server_address = "spire-server"
  server_port    = 8081

  ## Workload API socket — mounted read-only into every service container
  socket_path    = "/run/spire/sockets/agent.sock"

  trust_domain   = "filetransfer.io"

  ## DEV ONLY: skip CA verification on first bootstrap.
  ## Remove in production and provide trust_bundle_path instead.
  insecure_bootstrap = true
}

plugins {

  ## ── Node attestation ────────────────────────────────────────────────────
  ## join_token: agent presents a one-time token (generated by bootstrap.sh).
  NodeAttestor "join_token" {
    plugin_data {}
  }

  ## ── Workload attestation ────────────────────────────────────────────────
  ## docker: identifies workloads by their Docker container labels.
  ## Each service must carry label: com.filetransfer.spiffe=<service-name>
  WorkloadAttestor "docker" {
    plugin_data {
      docker_socket_path = "unix:///var/run/docker.sock"
    }
  }

  ## ── Key management ──────────────────────────────────────────────────────
  ## memory: agent SVIDs are ephemeral; re-issued on restart (fine for containers).
  KeyManager "memory" {
    plugin_data {}
  }
}

## ── Health checks ───────────────────────────────────────────────────────────
health_checks {
  listener_enabled = true
  bind_address     = "0.0.0.0"
  bind_port        = "8080"
  live_path        = "/live"
  ready_path       = "/ready"
}
