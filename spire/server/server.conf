## =============================================================================
## TranzFer MFT — SPIRE Server Configuration
## Trust domain:  filetransfer.io
## Attestation:   join_token  (dev/Docker Compose)
##                k8s_psat    (production — use Red Hat SPIRE Operator)
## Storage:       SQLite  (dev);  PostgreSQL recommended for HA production
## CA TTL:        7 days
## JWT-SVID TTL:  1 hour  (auto-rotated by SPIRE agent)
## =============================================================================

server {
  bind_address    = "0.0.0.0"
  bind_port       = "8081"
  socket_path     = "/tmp/spire-server/private/api.sock"
  trust_domain    = "filetransfer.io"
  data_dir        = "/opt/spire/data"
  log_level       = "INFO"
  log_format      = "json"

  ## Certificate authority
  ca_ttl                  = "168h"    # 7 days — rotate weekly
  default_x509_svid_ttl   = "1h"
  default_jwt_svid_ttl    = "1h"

  ca_subject {
    country      = ["US"]
    organization = ["TranzFer MFT"]
    common_name  = ""
  }
}

plugins {

  ## ── Persistent storage ──────────────────────────────────────────────────
  ## For production HA replace with PostgreSQL:
  ##   database_type = "postgres"
  ##   connection_string = "postgresql://..."
  DataStore "sql" {
    plugin_data {
      database_type     = "sqlite3"
      connection_string = "/opt/spire/data/datastore.sqlite3"
    }
  }

  ## ── Node attestation ────────────────────────────────────────────────────
  ## join_token: operator generates a one-time token; agent presents it once.
  ## For Kubernetes production: swap for k8s_psat (no static tokens needed).
  NodeAttestor "join_token" {
    plugin_data {}
  }

  ## ── Key management ──────────────────────────────────────────────────────
  ## disk: keys survive server restarts (safe for dev + single-node prod).
  ## For HA production: swap for aws_kms, gcp_kms, or vault.
  KeyManager "disk" {
    plugin_data {
      keys_path = "/opt/spire/data/keys.json"
    }
  }
}

## ── Health checks ───────────────────────────────────────────────────────────
## Docker Compose healthcheck calls /live and /ready via HTTP on port 8080.
health_checks {
  listener_enabled = true
  bind_address     = "0.0.0.0"
  bind_port        = "8080"
  live_path        = "/live"
  ready_path       = "/ready"
}
