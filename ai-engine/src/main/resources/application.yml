server:
  port: 8091
  shutdown: graceful

# Security: restrict actuator endpoints — heapdump/env/configprops MUST be disabled
# to prevent cache/intelligence data leakage via heap inspection
management:
  health:
    probes:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,circuit-breakers
  endpoint:
    health:
      show-details: when_authorized
    heapdump:
      enabled: false
    env:
      enabled: false
    configprops:
      enabled: false

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    connection-timeout: 30000
    requested-heartbeat: 60
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/filetransfer}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: false
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      pool-name: AIEngine-Pool
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        connection:
          provider_disables_autocommit: true
        temp:
          use_jdbc_metadata_defaults: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    placeholder-replacement: false
    locations: classpath:db/migration
    validate-on-migrate: false

edi:
  training:
    seed-on-startup: false

ai:
  # LLM opt-in toggle — must be explicitly enabled by the administrator
  llm:
    enabled: ${AI_LLM_ENABLED:false}
  # Anthropic Claude API for NLP features
  claude:
    api-key: ${CLAUDE_API_KEY:}
    model: ${CLAUDE_MODEL:claude-sonnet-4-20250514}
    base-url: ${CLAUDE_BASE_URL:https://api.anthropic.com}
  
  # Data classification
  classification:
    enabled: true
    # Built-in regex patterns (no LLM needed for these)
    scan-on-upload: true
    max-scan-size-mb: 100
    block-unencrypted-pci: true

  # Anomaly detection
  anomaly:
    enabled: true
    # Standard deviations from mean before alert
    threshold-sigma: 3.0
    lookback-days: 30

  # Proxy intelligence (AI-powered reverse proxy security)
  proxy:
    enabled: true
    # Score decay interval (ms) — reputation scores drift toward neutral over time
    decay-interval-ms: 300000
    # Max tracked IPs before eviction
    max-tracked-ips: 100000
    # Connection pattern thresholds
    max-connections-per-ip-per-minute: 60
    ddos-threshold-per-minute: 5000

  # Threat intelligence
  intelligence:
    enabled: ${AI_INTELLIGENCE_ENABLED:true}
    # Threat indicator store
    max-indicators: ${AI_INTEL_MAX_INDICATORS:500000}
    stale-days: ${AI_INTEL_STALE_DAYS:90}
    max-cached-indicators: ${AI_INTEL_MAX_CACHE:100000}
    stale-indicator-days: ${AI_INTEL_STALE_DAYS:90}
    downgrade-after-days: ${AI_INTEL_DOWNGRADE_DAYS:30}
    # External threat feeds (ThreatFeedConfig)
    feeds:
      enabled: true
      abuseipdb:
        enabled: true
        api-key: ${ABUSEIPDB_API_KEY:}
        confidence-minimum: 80
        max-age: 30
      urlhaus:
        enabled: true
        max-results: 1000
      threatfox:
        enabled: true
        lookback-days: 7
      feodo:
        enabled: true
      otx:
        enabled: false
        api-key: ${OTX_API_KEY:}
        pulse-limit: 50
    # GeoIP resolution
    geo:
      enabled: ${AI_GEO_ENABLED:true}
      cache-size: ${AI_GEO_CACHE_SIZE:50000}
      impossible-travel-speed-kmh: ${AI_GEO_TRAVEL_SPEED:900}

  # Background agents
  agents:
    enabled: ${AI_AGENTS_ENABLED:true}
    health-check-interval-seconds: ${AI_AGENTS_HEALTH_CHECK:60}
    # OSINT collection
    osint:
      interval-minutes: ${AI_OSINT_INTERVAL:15}
      abuseipdb-api-key: ${ABUSEIPDB_API_KEY:}
      otx-api-key: ${OTX_API_KEY:}
      virustotal-api-key: ${VIRUSTOTAL_API_KEY:}
    # CVE monitoring
    cve:
      interval-minutes: ${AI_CVE_INTERVAL:60}
    # Threat correlation
    correlation:
      interval-minutes: ${AI_CORRELATION_INTERVAL:2}
      kill-chain-window-hours: ${AI_KILL_CHAIN_WINDOW:24}
    # Reputation decay
    decay:
      interval-minutes: ${AI_DECAY_INTERVAL:5}

  # ML detection models
  detection:
    # Anomaly ensemble
    anomaly-ensemble:
      enabled: ${AI_ANOMALY_ENSEMBLE_ENABLED:true}
      isolation-forest-trees: ${AI_IF_TREES:100}
      isolation-forest-subsample: ${AI_IF_SUBSAMPLE:256}
      z-score-window-size: ${AI_ZSCORE_WINDOW:1000}
    # Network behavior analysis
    network-behavior:
      enabled: ${AI_NETWORK_BEHAVIOR_ENABLED:true}
      beaconing-min-samples: ${AI_BEACON_MIN_SAMPLES:20}
      beaconing-cov-threshold: ${AI_BEACON_COV:0.3}
      dga-entropy-threshold: ${AI_DGA_ENTROPY:3.5}
      dga-score-threshold: ${AI_DGA_SCORE:0.7}
      exfil-ratio-threshold: ${AI_EXFIL_RATIO:10}
      exfil-baseline-multiplier: ${AI_EXFIL_BASELINE:3.0}
    # Attack chain detection
    attack-chain:
      enabled: ${AI_ATTACK_CHAIN_ENABLED:true}
      window-hours: ${AI_CHAIN_WINDOW:24}
      min-stages-for-alert: ${AI_CHAIN_MIN_STAGES:2}
      prune-interval-minutes: ${AI_CHAIN_PRUNE:10}

  # Response playbooks
  response:
    enabled: ${AI_RESPONSE_ENABLED:true}
    max-blocks-per-hour: ${AI_MAX_BLOCKS_HOUR:100}
    max-alerts-per-hour: ${AI_MAX_ALERTS_HOUR:200}
    max-execution-history: ${AI_MAX_EXEC_HISTORY:500}

platform:
  services:
    onboarding-api:
      url: ${ONBOARDING_API_URL:http://onboarding-api:8080}
    sftp-service:
      url: ${SFTP_SERVICE_URL:http://sftp-service:8081}
    ftp-service:
      url: ${FTP_SERVICE_URL:http://ftp-service:8082}
    ftp-web-service:
      url: ${FTP_WEB_SERVICE_URL:http://ftp-web-service:8083}
    config-service:
      url: ${CONFIG_SERVICE_URL:http://config-service:8084}
    gateway-service:
      url: ${GATEWAY_SERVICE_URL:http://gateway-service:8085}
    encryption-service:
      url: ${ENCRYPTION_SERVICE_URL:http://encryption-service:8086}
    forwarder-service:
      url: ${FORWARDER_SERVICE_URL:http://external-forwarder-service:8087}
    dmz-proxy:
      url: ${DMZ_PROXY_URL:http://dmz-proxy:8088}
    license-service:
      url: ${LICENSE_SERVICE_URL:http://license-service:8089}
    analytics-service:
      url: ${ANALYTICS_SERVICE_URL:http://analytics-service:8090}
    ai-engine:
      url: ${AI_ENGINE_URL:http://ai-engine:8091}
    screening-service:
      url: ${SCREENING_SERVICE_URL:http://screening-service:8092}
    keystore-manager:
      url: ${KEYSTORE_MANAGER_URL:http://keystore-manager:8093}
    as2-service:
      url: ${AS2_SERVICE_URL:http://as2-service:8094}
    edi-converter:
      url: ${EDI_CONVERTER_URL:http://edi-converter:8095}
    storage-manager:
      url: ${STORAGE_MANAGER_URL:http://storage-manager:8096}
  environment: ${PLATFORM_ENVIRONMENT:PROD}
  track-id:
    prefix: ${TRACK_ID_PREFIX:TRZ}
  cluster:
    id: ${CLUSTER_ID:default-cluster}
    host: ${CLUSTER_HOST:ai-engine}
  security:
    jwt-secret: ${JWT_SECRET:change_me_in_production_256bit_secret_key!!}
    control-api-key: ${CONTROL_API_KEY:internal_control_secret}
  proxy:
    enabled: ${PROXY_ENABLED:false}
    type: ${PROXY_TYPE:HTTP}
    host: ${PROXY_HOST:dmz-proxy}
    port: ${PROXY_PORT:8088}
    no-proxy-hosts: ${PROXY_NO_PROXY_HOSTS:localhost,127.0.0.1,postgres,rabbitmq}

  readiness:
    schema-file: db/schema/ai-engine.sql
    required-tables: audit_logs,file_transfer_records,file_flows,transfer_accounts,threat_indicators,security_alerts,security_events,threat_actors,attack_campaigns,verdict_records,security_incidents

cluster:
  id: ${CLUSTER_ID:default-cluster}
  host: ${CLUSTER_HOST:ai-engine}
  service-type: AI_ENGINE
  communication-mode: ${CLUSTER_COMM_MODE:WITHIN_CLUSTER}
