server:
  port: 8091

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/filetransfer}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 10000
      pool-name: AIEngine-Pool
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        connection:
          provider_disables_autocommit: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    locations: classpath:db/migration

ai:
  # Anthropic Claude API for NLP features
  claude:
    api-key: ${CLAUDE_API_KEY:}
    model: ${CLAUDE_MODEL:claude-sonnet-4-20250514}
    base-url: ${CLAUDE_BASE_URL:https://api.anthropic.com}
  
  # Data classification
  classification:
    enabled: true
    # Built-in regex patterns (no LLM needed for these)
    scan-on-upload: true
    max-scan-size-mb: 100
    block-unencrypted-pci: true

  # Anomaly detection
  anomaly:
    enabled: true
    # Standard deviations from mean before alert
    threshold-sigma: 3.0
    lookback-days: 30

platform:
  environment: ${PLATFORM_ENVIRONMENT:PROD}
  track-id:
    prefix: ${TRACK_ID_PREFIX:TRZ}
  cluster:
    id: ${CLUSTER_ID:default-cluster}
    host: ${CLUSTER_HOST:ai-engine}
  security:
    jwt-secret: ${JWT_SECRET:change_me_in_production_256bit_secret_key!!}
    control-api-key: ${CONTROL_API_KEY:internal_control_secret}

cluster:
  id: ${CLUSTER_ID:default-cluster}
  host: ${CLUSTER_HOST:ai-engine}
  service-type: AI_ENGINE
