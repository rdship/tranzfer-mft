spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql

ai:
  claude:
    api-key: test-key
  proxy:
    enabled: true

platform:
  environment: TEST
  track-id:
    prefix: TST
  cluster:
    id: test-cluster
    host: localhost
  security:
    jwt-secret: test_secret_key_256bit_long_enough_for_hmac!!
    control-api-key: test_control_key
    shared-config: true

jwt:
  secret: test_jwt_secret_key_must_be_at_least_256_bits_long!!
  expiration: 900000

cluster:
  id: test-cluster
  host: localhost
  service-type: AI_ENGINE
  communication-mode: WITHIN_CLUSTER
