server:
  port: 8080
  shutdown: graceful

# Monitoring proxy configuration — MonitoringProxyController forwards
# PromQL/LogQL queries from the admin UI's Monitoring page to these
# backends. Defaults match the docker-compose service names; override
# via env vars for local dev or non-Docker runs.
monitoring:
  prometheus:
    url: ${PROMETHEUS_URL:http://prometheus:9090}
  loki:
    url: ${LOKI_URL:http://loki:3100}
  alertmanager:
    url: ${ALERTMANAGER_URL:http://alertmanager:9093}

management:
  health:
    probes:
      enabled: true

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 4
          max-idle: 4
          min-idle: 1
          max-wait: 1000ms
  cache:
    type: redis
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/filetransfer}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: false
      maximum-pool-size: 8
      minimum-idle: 3
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      pool-name: Onboarding-Pool
  jpa:
    open-in-view: true  # Re-enabled: controllers return raw JPA entities; OSIV off crashes Jackson serialization on lazy proxies. Proper fix: DTOs.
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        connection:
          provider_disables_autocommit: true
        temp:
          use_jdbc_metadata_defaults: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    placeholder-replacement: false
    locations: classpath:db/migration
    validate-on-migrate: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    connection-timeout: 30000
    requested-heartbeat: 60

jwt:
  secret: ${JWT_SECRET:change_me_in_production_256bit_secret_key!!}
  expiration: 900000

rabbitmq:
  exchange: file-transfer.events

sftp-control:
  url: ${SFTP_CONTROL_URL:http://localhost:8081}

ftp-control:
  url: ${FTP_CONTROL_URL:http://localhost:8082}

control-api:
  key: ${CONTROL_API_KEY:internal_control_secret}

file-transfer:
  sftp-home-base: ${SFTP_HOME_BASE:/data/sftp}
  ftp-home-base: ${FTP_HOME_BASE:/data/ftp}
  ftpweb-home-base: ${FTPWEB_HOME_BASE:/data/ftpweb}

blockchain:
  anchor-mode: ${BLOCKCHAIN_ANCHOR_MODE:INTERNAL}  # INTERNAL (local DB), DOCUMENT (RFC 3161), ETHEREUM (future)
  ethereum:
    rpc-url: ${ETHEREUM_RPC_URL:}
    contract-address: ${ETHEREUM_CONTRACT_ADDRESS:}
  timestamp-service-url: ${TIMESTAMP_SERVICE_URL:}

cluster:
  id: ${CLUSTER_ID:default-cluster}
  host: ${CLUSTER_HOST:localhost}
  service-type: ONBOARDING
  communication-mode: ${CLUSTER_COMM_MODE:WITHIN_CLUSTER}

platform:
  services:
    onboarding-api:
      url: ${ONBOARDING_API_URL:http://onboarding-api:8080}
    sftp-service:
      url: ${SFTP_SERVICE_URL:http://sftp-service:8081}
    ftp-service:
      url: ${FTP_SERVICE_URL:http://ftp-service:8082}
    ftp-web-service:
      url: ${FTP_WEB_SERVICE_URL:http://ftp-web-service:8083}
    config-service:
      url: ${CONFIG_SERVICE_URL:http://config-service:8084}
    gateway-service:
      url: ${GATEWAY_SERVICE_URL:http://gateway-service:8085}
    encryption-service:
      url: ${ENCRYPTION_SERVICE_URL:http://encryption-service:8086}
    forwarder-service:
      url: ${FORWARDER_SERVICE_URL:http://external-forwarder-service:8087}
    dmz-proxy:
      url: ${DMZ_PROXY_URL:http://dmz-proxy:8088}
    license-service:
      url: ${LICENSE_SERVICE_URL:http://license-service:8089}
    analytics-service:
      url: ${ANALYTICS_SERVICE_URL:http://analytics-service:8090}
    ai-engine:
      url: ${AI_ENGINE_URL:http://ai-engine:8091}
    screening-service:
      url: ${SCREENING_SERVICE_URL:http://screening-service:8092}
    keystore-manager:
      url: ${KEYSTORE_MANAGER_URL:http://keystore-manager:8093}
    as2-service:
      url: ${AS2_SERVICE_URL:http://as2-service:8094}
    edi-converter:
      url: ${EDI_CONVERTER_URL:http://edi-converter:8095}
    storage-manager:
      url: ${STORAGE_MANAGER_URL:http://storage-manager:8096}
  environment: ${PLATFORM_ENVIRONMENT:PROD}
  track-id:
    prefix: ${TRACK_ID_PREFIX:TRZ}
  cluster:
    id: ${CLUSTER_ID:default-cluster}
    host: ${CLUSTER_HOST:localhost}
  security:
    jwt-secret: ${JWT_SECRET:change_me_in_production_256bit_secret_key!!}
    jwt-expiration-ms: ${JWT_EXPIRATION:900000}
    control-api-key: ${CONTROL_API_KEY:internal_control_secret}
    shared-config: false
  storage:
    sftp-home: ${SFTP_HOME_BASE:/data/sftp}
    ftp-home: ${FTP_HOME_BASE:/data/ftp}
    ftpweb-home: ${FTPWEB_HOME_BASE:/data/ftpweb}
  flow:
    max-concurrent: ${FLOW_MAX_CONCURRENT:50}
    work-dir: ${FLOW_WORK_DIR:/tmp/mft-flow-work}
  proxy:
    enabled: ${PROXY_ENABLED:false}
    type: ${PROXY_TYPE:HTTP}
    host: ${PROXY_HOST:dmz-proxy}
    port: ${PROXY_PORT:8088}
    no-proxy-hosts: ${PROXY_NO_PROXY_HOSTS:localhost,127.0.0.1,postgres,rabbitmq}
  rate-limit:
    enabled: true
    default-limit: 100
    user-limit: 200
    default-window-seconds: 60

  readiness:
    schema-file: db/schema/onboarding-api.sql
    required-tables: users,tenants,partners,partner_contacts,server_instances,folder_templates,transfer_accounts,external_destinations,file_flows,folder_mappings,file_transfer_records,flow_executions,audit_logs,login_attempts,totp_configs,permissions,role_permissions,user_permissions,dead_letter_messages,blockchain_anchors,cluster_nodes,client_presence,transfer_tickets,auto_onboard_sessions,partner_agreements,scheduled_tasks,virtual_entries

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  description: Onboarding API — user registration, authentication, account management, and DLQ admin
