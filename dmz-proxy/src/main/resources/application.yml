server:
  port: 8088  # Management / REST API

control-api:
  key: ${CONTROL_API_KEY:internal_control_secret}

# Default port mappings loaded at startup.
# Additional mappings can be added at runtime via the REST API.
dmz:
  mappings:
    - name: sftp-gateway
      listen-port: 2222
      target-host: ${GATEWAY_HOST:gateway-service}
      target-port: 2220
    - name: ftp-gateway
      listen-port: 21
      target-host: ${GATEWAY_HOST:gateway-service}
      target-port: 2121
    - name: ftp-web
      listen-port: 443
      target-host: ${FTPWEB_HOST:ftp-web-service}
      target-port: 8083

  # AI-Powered Security Layer
  security:
    enabled: ${DMZ_SECURITY_ENABLED:true}
    ai-engine-url: ${AI_ENGINE_URL:http://ai-engine:8091}
    verdict-timeout-ms: ${VERDICT_TIMEOUT_MS:200}
    default-rate-per-minute: ${DEFAULT_RATE_PER_MINUTE:60}
    default-max-concurrent: ${DEFAULT_MAX_CONCURRENT:20}
    default-max-bytes-per-minute: ${DEFAULT_MAX_BYTES_PER_MINUTE:500000000}
    global-rate-per-minute: ${GLOBAL_RATE_PER_MINUTE:10000}
    event-queue-capacity: 10000
    event-batch-size: 50
    event-flush-interval-ms: 5000

platform:
  environment: ${PLATFORM_ENVIRONMENT:PROD}
