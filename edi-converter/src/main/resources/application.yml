server:
  port: 8095

# Expose Spring Boot's liveness/readiness probes so /actuator/health/readiness
# is reachable. Without this the readiness endpoint 404s and the UI's
# ServiceContext health probe (which the rest of the platform uses for
# sidebar visibility) would always flag edi-converter as down.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: readinessState
  health:
    defaults:
      enabled: true

spring:
  servlet:
    multipart:
      max-file-size: 100MB
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
edi:
  internal-format-version: "1.0"
  internal-format-name: "TIF"
  trained-maps:
    storage-dir: ${EDI_TRAINED_MAPS_DIR:./data/trained-maps}
    persist-to-disk: ${EDI_TRAINED_MAPS_PERSIST:true}

ai:
  llm:
    enabled: ${AI_LLM_ENABLED:false}
  claude:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${CLAUDE_MODEL:claude-sonnet-4-20250514}
    base-url: ${CLAUDE_BASE_URL:https://api.anthropic.com}

platform:
  services:
    onboarding-api:
      url: ${ONBOARDING_API_URL:http://onboarding-api:8080}
    sftp-service:
      url: ${SFTP_SERVICE_URL:http://sftp-service:8081}
    ftp-service:
      url: ${FTP_SERVICE_URL:http://ftp-service:8082}
    ftp-web-service:
      url: ${FTP_WEB_SERVICE_URL:http://ftp-web-service:8083}
    config-service:
      url: ${CONFIG_SERVICE_URL:http://config-service:8084}
    gateway-service:
      url: ${GATEWAY_SERVICE_URL:http://gateway-service:8085}
    encryption-service:
      url: ${ENCRYPTION_SERVICE_URL:http://encryption-service:8086}
    forwarder-service:
      url: ${FORWARDER_SERVICE_URL:http://external-forwarder-service:8087}
    dmz-proxy:
      url: ${DMZ_PROXY_URL:http://dmz-proxy:8088}
    license-service:
      url: ${LICENSE_SERVICE_URL:http://license-service:8089}
    analytics-service:
      url: ${ANALYTICS_SERVICE_URL:http://analytics-service:8090}
    ai-engine:
      url: ${AI_ENGINE_URL:http://ai-engine:8091}
    screening-service:
      url: ${SCREENING_SERVICE_URL:http://screening-service:8092}
    keystore-manager:
      url: ${KEYSTORE_MANAGER_URL:http://keystore-manager:8093}
    as2-service:
