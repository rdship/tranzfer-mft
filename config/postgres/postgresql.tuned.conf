# =============================================================================
# TranzFer MFT — Tuned Postgres Configuration (v1.0, Postgres 16)
# =============================================================================
#
# Backed by an audit of the actual platform workload (R23 — 2026-04-11):
#   - 17 database-connected services with 98 total max Hikari pool size
#   - 60 JPA @Entity classes, 167+ JSONB/TEXT/BYTEA columns
#   - Batch inserts enabled (batch_size=25, order_inserts=true) in every service
#   - No pessimistic locks (LockModeType.PESSIMISTIC = 0 occurrences)
#   - 4 findAll() hotspots on large tables (ScreeningEngine, Sentinel collectors)
#   - 8 CREATE INDEX CONCURRENTLY calls in V42 on fresh boot
#   - Dashboard polling every 5-10s with time-windowed aggregates
#   - Target hardware: 16-32 GB RAM, 8-12 CPUs, SSD storage
#
# This config is calibrated for the reference demo machine (23 GB RAM,
# 9 CPUs, M-series Mac, Docker Desktop) but scales linearly to production
# hardware — see the scaling formulas at the bottom of each section.
#
# DBAs running the platform in their own environment should copy this
# file to Postgres's $PGDATA/postgresql.conf, OR mount it into a Docker
# Postgres container, OR (fastest) use the `-c name=value` flags
# already encoded in docker-compose.yml's postgres service block.
#
# Every setting has a ROLE comment explaining WHY this value exists
# for THIS workload. Don't blindly override without reading the role.
# =============================================================================


# -----------------------------------------------------------------------------
#  CONNECTION & AUTHENTICATION
# -----------------------------------------------------------------------------

# listen_addresses
#
# ROLE: Which network interfaces Postgres binds to. '*' accepts connections
# from any interface, which is what the docker stack needs (onboarding-api
# + 16 other containers reach postgres via the shared docker network).
# Without this, postgres defaults to 'localhost' and cross-container
# connections fail with "Connection refused".
#
# PRODUCTION NOTE: pair this with a strict pg_hba.conf — '*' on the listen
# side is fine because pg_hba.conf is the real authentication gate.
listen_addresses = '*'

# max_connections
#
# ROLE: Hard cap on simultaneous backends. Total measured Hikari max-pool-size
# across all services is 98. We provide 2x headroom for replicas/scale-out
# plus 5 superuser slots, which leaves plenty of room for the demo and
# small-to-medium production deployments without wasting shared memory.
#
# SCALING: Multiply by ~2x per service replica added. If you run 3 replicas
# of onboarding-api (8 * 3 = 24), add 16 to the base.
#
# Phase 2 bump: With higher consumer concurrency (4-16 per service) and potential
# multi-replica deployments, total Hikari pool across all services can reach 300+.
# 400 provides comfortable headroom without requiring pgbouncer.
max_connections = 400

# superuser_reserved_connections
#
# ROLE: Keep some connections aside for psql / pg_dump / admin work so
# an apocalyptic connection storm from the services doesn't lock out the DBA.
superuser_reserved_connections = 5


# -----------------------------------------------------------------------------
#  MEMORY
# -----------------------------------------------------------------------------

# shared_buffers
#
# ROLE: Postgres's in-process cache for table + index pages. The audit
# found 167+ JSONB/TEXT/BYTEA columns across 32 migrations — this workload
# is TOAST-heavy, which means shared_buffers earns its keep quickly.
# We set 1 GB for the demo (~4% of 23 GB RAM), which is the Postgres
# doc's lower bound for "any real workload".
#
# SCALING:
#   - Demo (≤32 GB RAM)          → 1 GB
#   - Small prod (32-64 GB RAM)  → 4 GB
#   - Medium prod (64-256 GB)    → 25% of RAM
#   - Large prod (>256 GB)       → cap at 40 GB; cache hit rate plateaus
shared_buffers = 1GB

# effective_cache_size
#
# ROLE: Planner hint for how much RAM the OS + Postgres collectively
# use to cache disk pages. Higher = planner prefers index scans over
# seq scans. Set to ~4x shared_buffers for typical Linux.
#
# SCALING: Keep at 50-75% of RAM for dedicated DB hosts. Smaller (20-30%)
# when Postgres shares the host with other services (demo / docker-compose).
effective_cache_size = 4GB

# work_mem
#
# ROLE: Per-operation memory for sort / hash join / aggregate. The worst-
# case dashboard query does a 5-way JOIN FETCH on file_transfer_records and
# a GROUP BY on flow_executions.status. Sentinel / analytics also do
# time-windowed aggregates. 16 MB is comfortably above the typical
# working-set size (files fit, transfers fit). Total worst case:
# 200 conn * 16 MB = 3.2 GB if every connection sorts simultaneously, which
# never happens.
#
# CAUTION: Increase cautiously — this is PER OPERATION, not per connection.
# A single query can use work_mem multiple times (one per sort / hash node).
#
# SCALING: Keep at 16-32 MB. Bump to 64 MB only for reporting replicas.
work_mem = 16MB

# maintenance_work_mem
#
# ROLE: Memory ceiling for CREATE INDEX / VACUUM / ALTER TABLE / REINDEX.
# The V42 migration fires 8 CREATE INDEX CONCURRENTLY calls on fresh boot;
# without enough maintenance_work_mem those builds spill to temp files and
# take 10x longer. 256 MB makes fresh bootstrap finish in seconds.
#
# SCALING: Increase to 1 GB on larger hardware to speed up VACUUM + REINDEX.
maintenance_work_mem = 256MB

# temp_buffers
#
# ROLE: Per-session cache for temporary tables. We don't use temp tables
# heavily, but audit_logs and flow_step_snapshots occasionally need
# temporary aggregation tables for reporting.
temp_buffers = 16MB


# -----------------------------------------------------------------------------
#  WRITE-AHEAD LOG (WAL)
# -----------------------------------------------------------------------------

# wal_buffers
#
# ROLE: Buffer for WAL records before they're written to disk. With 17
# services each doing 25-row batch inserts, WAL-write bursts are common.
# 32 MB absorbs one second of heavy write activity without contention.
#
# SCALING: Keep at 1/32 of shared_buffers (Postgres auto-calculates up to
# 16 MB if unset; we override to 32 MB to get ahead of bursty inserts).
wal_buffers = 32MB

# max_wal_size / min_wal_size
#
# ROLE: Control how often Postgres checkpoints. Bigger max_wal_size means
# fewer checkpoints but larger recovery time on crash. For a heavy-write
# MFT platform with bulk inserts, we size generously to let long-running
# transactions complete without forced checkpoints.
#
# SCALING: max_wal_size should fit ~10 minutes of WAL production. At
# the demo rate (~few MB/min), 4 GB is 10+ hours — very safe.
max_wal_size = 4GB
min_wal_size = 1GB

# checkpoint_timeout
#
# ROLE: Maximum interval between automatic checkpoints. Default 5 min is
# aggressive for our workload and causes unnecessary fsync pressure during
# bulk loads. 15 min reduces overhead without materially impacting recovery.
checkpoint_timeout = 15min

# checkpoint_completion_target
#
# ROLE: Spread the checkpoint's dirty-page flushing over this fraction of
# the checkpoint interval. 0.9 = flush over 90% of checkpoint_timeout = no
# IO stall spikes. Industry default post-Postgres 11.
checkpoint_completion_target = 0.9

# wal_compression
#
# ROLE: Compress full-page WAL images. Saves ~50% of WAL volume on
# JSONB-heavy workloads (tables with many TOASTed columns generate
# large full-page images). Postgres 14+ supports multiple algorithms;
# we stick with pglz (safest, always available).
wal_compression = on

# wal_level
#
# ROLE: Required for streaming replication + PITR. We default to 'replica'
# so the demo can bolt on a standby without recycling the master.
wal_level = replica

# archive_mode (off by default; DBAs enable + point archive_command when
# they want PITR. Not set here to keep docker-compose demo clean.)


# -----------------------------------------------------------------------------
#  PLANNER / QUERY OPTIMIZATION
# -----------------------------------------------------------------------------

# random_page_cost
#
# ROLE: Planner's estimate of random I/O cost vs sequential. 1.1 tells
# the planner "we're on SSD, random reads are almost as cheap as sequential."
# Critical for making index scans the preferred access method on our
# VIP file_transfer_records table (which always queries by trackId / status).
random_page_cost = 1.1

# seq_page_cost
#
# ROLE: Baseline cost for sequential reads. Keep at 1.0 (the default).
seq_page_cost = 1.0

# effective_io_concurrency
#
# ROLE: Number of concurrent disk I/O ops the planner can assume. 200 is
# typical for NVMe SSD. Controls how aggressively bitmap heap scans prefetch.
effective_io_concurrency = 200

# default_statistics_target
#
# ROLE: Sample size for ANALYZE. 100 is default, 200 gives the planner
# better selectivity estimates on JSONB columns (which have many distinct
# values) and on status-column partial indexes. Trade-off: slower ANALYZE
# runs, but better plans.
default_statistics_target = 200


# -----------------------------------------------------------------------------
#  PARALLELISM
# -----------------------------------------------------------------------------

# max_worker_processes
#
# ROLE: Ceiling on background worker processes (parallel queries,
# logical replication, extensions). On a 9-CPU demo machine we leave
# one core for OS + services.
#
# SCALING: Set to N_CPUS - 1, capped at 16 for most workloads.
max_worker_processes = 8

# max_parallel_workers
#
# ROLE: How many of those workers can be used for parallel queries at a time.
max_parallel_workers = 6

# max_parallel_workers_per_gather
#
# ROLE: How many parallel workers a single query can spawn. Keep conservative
# (2) so dashboard aggregate queries don't starve other backends. Sentinel's
# correlation engine and analytics time-windowed queries are the main
# beneficiaries.
max_parallel_workers_per_gather = 2

# max_parallel_maintenance_workers
#
# ROLE: Parallel workers for CREATE INDEX / VACUUM. Helps V42 CONCURRENTLY
# indexes finish faster on bootstrap.
max_parallel_maintenance_workers = 2


# -----------------------------------------------------------------------------
#  AUTOVACUUM
# -----------------------------------------------------------------------------

# autovacuum
#
# ROLE: Reclaim dead tuples from UPDATE/DELETE-heavy tables. Must be on
# for any production Postgres. file_transfer_records sees frequent status
# transitions (UPLOADED -> PROCESSING -> DELIVERED -> PURGED) which leave
# dead tuples behind.
autovacuum = on

# autovacuum_max_workers
#
# ROLE: Max simultaneous autovacuum workers. Default 3; bumped to 4 so
# the VIP tables (transfers, audit, flow_executions, sentinel_findings)
# can all be vacuumed in parallel without queueing.
autovacuum_max_workers = 4

# autovacuum_naptime
#
# ROLE: How often the autovacuum launcher checks for work. Default 1 min
# is too lazy for our write volume; 30s catches bloat sooner.
autovacuum_naptime = 30s

# autovacuum_vacuum_scale_factor
#
# ROLE: Trigger autovacuum when dead tuples > scale_factor * total rows.
# Default 0.2 (20%) is fine for small tables but wasteful on the 10M+ row
# file_transfer_records table. 0.1 (10%) hits the sweet spot for our mix.
autovacuum_vacuum_scale_factor = 0.1

# autovacuum_analyze_scale_factor
#
# ROLE: Trigger ANALYZE when updated rows > scale_factor * total rows.
# Tighter than vacuum because planner stats freshness matters more than
# visibility-map freshness for dashboard performance.
autovacuum_analyze_scale_factor = 0.05

# autovacuum_vacuum_cost_limit
#
# ROLE: How much work autovacuum can do per cycle before sleeping.
# Default 200 throttles too aggressively on modern SSDs. 2000 lets
# autovacuum actually keep up with incoming churn.
autovacuum_vacuum_cost_limit = 2000


# -----------------------------------------------------------------------------
#  TIMEOUTS (the platform has very specific requirements here)
# -----------------------------------------------------------------------------

# statement_timeout
#
# ROLE: Kill any query that runs longer than this. MUST be 0 (unlimited)
# because V42 uses CREATE INDEX CONCURRENTLY which can run 60+ seconds.
# See BUG-2 in DEMO-RESULTS.md.
#
# DBAs who disable CONCURRENTLY indexes can set this to 60s or 300s.
statement_timeout = 0

# idle_in_transaction_session_timeout
#
# ROLE: Kill transactions that sit idle with an open transaction. MUST
# be 0 for Flyway bootstrap (V42 non-transactional migrations legitimately
# idle while PG builds indexes). See R18 fix.
#
# Post-bootstrap, DBAs may set this to 60s to protect against stuck clients.
idle_in_transaction_session_timeout = 0

# lock_timeout
#
# ROLE: Kill any statement that's been blocked waiting for a lock longer
# than this. Protects against runaway DDL locking a hot table. 10s is
# short enough to fail-fast, long enough to accommodate brief contention
# during autovacuum.
lock_timeout = 0

# deadlock_timeout
#
# ROLE: How long to wait before checking for deadlocks. Default 1s is fine;
# we don't use pessimistic row locks so deadlocks are rare.
deadlock_timeout = 1s


# -----------------------------------------------------------------------------
#  LOGGING & OBSERVABILITY
# -----------------------------------------------------------------------------

# log_min_duration_statement
#
# ROLE: Log any statement that takes longer than this. 500 ms catches more
# slow queries than the previous 1000 ms threshold — useful because the
# dashboard polls every 5-10s and anything slower than 500 ms visibly
# impacts UX.
log_min_duration_statement = 500

# log_checkpoints
#
# ROLE: Log every checkpoint. Useful for validating that wal_buffers +
# max_wal_size are correctly sized — if checkpoints fire more than every
# 5 minutes, something's off.
log_checkpoints = on

# log_connections / log_disconnections
#
# ROLE: OFF. The platform makes thousands of connection churn events per
# minute on startup; logging each one drowns the log pipeline.
log_connections = off
log_disconnections = off

# log_lock_waits
#
# ROLE: Log when any lock wait exceeds deadlock_timeout. Early warning
# for contention. Cheap to enable.
log_lock_waits = on

# log_autovacuum_min_duration
#
# ROLE: Log autovacuum runs longer than 1s. Observability for bloat management.
log_autovacuum_min_duration = 1s

# log_temp_files
#
# ROLE: Log queries that spill to disk temp files. >10 MB means work_mem
# might be too small for that query. 0 = log everything; we pick 4 MB so
# only genuinely large spills get logged.
log_temp_files = 4MB


# -----------------------------------------------------------------------------
#  JIT (just-in-time compilation) — Postgres 11+
# -----------------------------------------------------------------------------

# jit
#
# ROLE: Compile long-running expressions to native code. Benefits big
# GROUP BY / hash-join / analytic queries (sentinel correlation engine,
# analytics dashboards). On by default in PG 16; explicit for visibility.
jit = on

# jit_above_cost
#
# ROLE: Only JIT queries whose estimated cost is above this. Default
# 100000 means small dashboard queries skip compilation overhead.
jit_above_cost = 100000


# -----------------------------------------------------------------------------
#  TIMEZONE / LOCALE
# -----------------------------------------------------------------------------

timezone = 'UTC'
log_timezone = 'UTC'


# =============================================================================
#  APPENDIX — HARDWARE SCALING TABLE
# =============================================================================
#
# If you're a DBA standing up TranzFer MFT for your org, use this table
# as a starting point. Validate with real workload for 1 week, then tune
# further based on pg_stat_* observations.
#
#   RAM        CPUs    shared_buffers   effective_cache_size   work_mem   maintenance_work_mem   max_connections
#   8 GB       4       1 GB             4 GB                   8 MB       128 MB                 100
#   16 GB      8       2 GB             10 GB                  16 MB      256 MB                 200
#   32 GB      12      4 GB             20 GB                  16 MB      512 MB                 300
#   64 GB      16      8 GB             40 GB                  32 MB      1 GB                   500
#   128 GB     32      16 GB            80 GB                  64 MB      2 GB                   800
#   256+ GB    64+     40 GB (cap)      160 GB+                128 MB     4 GB                   1000+
#
# Notes:
#   * work_mem is per-operation per-backend; multiply by max_connections
#     to get absolute worst case. Always keep that under 25% of RAM.
#   * max_connections > 500 usually calls for pgbouncer/pgpool in front
#     — increase the app-side Hikari pool sizes first before bumping PG.
#   * Monitor pg_stat_bgwriter.buffers_backend: if this grows fast, either
#     shared_buffers or checkpoint_timeout is too small.
#   * Monitor pg_stat_statements for query patterns that trip work_mem
#     spills (look for long queries in the logs tagged "temporary file").
