# =============================================================================
# Prometheus Configuration — TranzFer MFT Platform
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# -----------------------------------------------------------------------
# Alert rules
# -----------------------------------------------------------------------
rule_files:
  - /etc/prometheus/alert-rules.yml

# -----------------------------------------------------------------------
# AlertManager
# -----------------------------------------------------------------------
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# -----------------------------------------------------------------------
# Scrape targets — all TranzFer MFT services
# -----------------------------------------------------------------------
scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # --- Core Services ---
  - job_name: onboarding-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['onboarding-api:8080']

  - job_name: sftp-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - 'sftp-service:8081'
          - 'sftp-service-2:8081'
          - 'sftp-service-3:8081'

  - job_name: ftp-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - 'ftp-service:8082'
          - 'ftp-service-2:8082'
          - 'ftp-service-3:8082'

  - job_name: ftp-web-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - 'ftp-web-service:8083'
          - 'ftp-web-service-2:8083'

  - job_name: config-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['config-service:8084']

  - job_name: gateway-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['gateway-service:8085']

  - job_name: encryption-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['encryption-service:8086']

  - job_name: external-forwarder-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['external-forwarder-service:8087']

  # --- Platform Services ---
  - job_name: license-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['license-service:8089']

  - job_name: analytics-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['analytics-service:8090']

  - job_name: ai-engine
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - 'ai-engine:8091'
          - 'ai-engine-2:8091'

  - job_name: screening-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['screening-service:8092']

  - job_name: keystore-manager
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['keystore-manager:8093']

  - job_name: storage-manager
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['storage-manager:8094']

  - job_name: edi-converter
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['edi-converter:8095']

  # --- Infrastructure ---
  - job_name: rabbitmq
    static_configs:
      - targets: ['rabbitmq:15692']

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']
