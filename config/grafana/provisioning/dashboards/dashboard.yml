# =============================================================================
# Grafana Dashboard Provisioning — TranzFer MFT Platform
# Auto-loads dashboard JSON files on startup
# =============================================================================

apiVersion: 1

providers:
  - name: TranzFer MFT
    orgId: 1
    folder: TranzFer MFT
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
