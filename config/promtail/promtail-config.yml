# =============================================================================
# Promtail Configuration — TranzFer MFT Platform
# Scrapes Docker container logs, extracts service name and log level
# =============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: fake
    batchwait: 1s
    batchsize: 1048576   # 1MB
    timeout: 10s

scrape_configs:
  # -------------------------------------------------------------------------
  # Docker container log scraping
  # -------------------------------------------------------------------------
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project"]
    relabel_configs:
      # Extract container name
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      # Extract compose service name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      # Extract compose project
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'
      # Use container ID for log path
      - source_labels: ['__meta_docker_container_id']
        target_label: '__path__'
        replacement: '/var/lib/docker/containers/$1/$1-json.log'
    pipeline_stages:
      # Parse Docker JSON log format
      - docker: {}
      # Try to parse structured JSON log lines from the application
      - json:
          expressions:
            level: level
            logger: logger
            message: message
            correlationId: correlationId
            app_service: service
            thread: thread
            timestamp: timestamp
      # Fall back: extract level from plain-text log lines
      - regex:
          expression: '(?P<level>TRACE|DEBUG|INFO|WARN|ERROR|FATAL)'
      # Normalize log level label
      - labels:
          level:
          correlationId:
      # Drop DEBUG/TRACE in production to save Loki storage
      # Uncomment the following to enable:
      # - match:
      #     selector: '{level=~"DEBUG|TRACE"}'
      #     action: drop
      # Set timestamp from the log line when available
      - timestamp:
          source: timestamp
          format: '2006-01-02T15:04:05.000Z07:00'
          fallback_formats:
            - '2006-01-02 15:04:05.000'
          action_on_failure: fudge
      # Ensure output uses the parsed message
      - output:
          source: message
