server:
  port: 8085
  shutdown: graceful

management:
  health:
    probes:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info,circuit-breakers

spring:
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 4
          max-idle: 4
          min-idle: 1
          max-wait: 1000ms
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/filetransfer}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: false
      maximum-pool-size: 15
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      pool-name: Gateway-Pool
  jpa:
    open-in-view: true  # OSIV: controllers return raw JPA entities
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        connection:
          provider_disables_autocommit: true
        temp:
          use_jdbc_metadata_defaults: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    placeholder-replacement: false
    locations: classpath:db/migration
    validate-on-migrate: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    connection-timeout: 30000
    requested-heartbeat: 60
jwt:
  secret: ${JWT_SECRET:change_me_in_production_256bit_secret_key!!}
  expiration: 900000

gateway:
  sftp:
    port: ${GATEWAY_SFTP_PORT:2220}
    host-key-path: ${GATEWAY_HOST_KEY_PATH:./gateway_host_key}
    # SSH algorithm hardening (applied in SftpGatewayConfig via SecurityProfile whitelist)
    algorithms:
      ciphers: ${GATEWAY_SFTP_CIPHERS:aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr}
      macs: ${GATEWAY_SFTP_MACS:hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512,hmac-sha2-256}
      kex: ${GATEWAY_SFTP_KEX:curve25519-sha256,ecdh-sha2-nistp521,ecdh-sha2-nistp384,diffie-hellman-group18-sha512,diffie-hellman-group16-sha512}
  ftp:
    port: ${GATEWAY_FTP_PORT:2121}
  internal-sftp-host: ${INTERNAL_SFTP_HOST:sftp-service}
  internal-sftp-port: ${INTERNAL_SFTP_PORT:2222}
  internal-ftp-host: ${INTERNAL_FTP_HOST:ftp-service}
  internal-ftp-port: ${INTERNAL_FTP_PORT:21}
  internal-ftpweb-host: ${INTERNAL_FTPWEB_HOST:ftp-web-service}
  internal-ftpweb-port: ${INTERNAL_FTPWEB_PORT:8083}

flow:
  rules:
    enabled: true

cluster:
  id: ${CLUSTER_ID:default-cluster}
  host: ${CLUSTER_HOST:localhost}
  service-type: GATEWAY
  communication-mode: ${CLUSTER_COMM_MODE:WITHIN_CLUSTER}

control-api:
  key: ${CONTROL_API_KEY:internal_control_secret}

platform:
  services:
    onboarding-api:
      url: ${ONBOARDING_API_URL:http://onboarding-api:8080}
    sftp-service:
      url: ${SFTP_SERVICE_URL:http://sftp-service:8081}
    ftp-service:
      url: ${FTP_SERVICE_URL:http://ftp-service:8082}
    ftp-web-service:
      url: ${FTP_WEB_SERVICE_URL:http://ftp-web-service:8083}
    config-service:
      url: ${CONFIG_SERVICE_URL:http://config-service:8084}
    gateway-service:
      url: ${GATEWAY_SERVICE_URL:http://gateway-service:8085}
    encryption-service:
      url: ${ENCRYPTION_SERVICE_URL:http://encryption-service:8086}
    forwarder-service:
      url: ${FORWARDER_SERVICE_URL:http://external-forwarder-service:8087}
    dmz-proxy:
      url: ${DMZ_PROXY_URL:http://dmz-proxy:8088}
    license-service:
      url: ${LICENSE_SERVICE_URL:http://license-service:8089}
    analytics-service:
      url: ${ANALYTICS_SERVICE_URL:http://analytics-service:8090}
    ai-engine:
      url: ${AI_ENGINE_URL:http://ai-engine:8091}
    screening-service:
      url: ${SCREENING_SERVICE_URL:http://screening-service:8092}
    keystore-manager:
      url: ${KEYSTORE_MANAGER_URL:http://keystore-manager:8093}
    as2-service:
      url: ${AS2_SERVICE_URL:http://as2-service:8094}
    edi-converter:
      url: ${EDI_CONVERTER_URL:http://edi-converter:8095}
    storage-manager:
      url: ${STORAGE_MANAGER_URL:http://storage-manager:8096}
  environment: ${PLATFORM_ENVIRONMENT:PROD}
  track-id:
    prefix: ${TRACK_ID_PREFIX:TRZ}
  cluster:
    id: ${CLUSTER_ID:default-cluster}
    host: ${CLUSTER_HOST:localhost}
  security:
    jwt-secret: ${JWT_SECRET:change_me_in_production_256bit_secret_key!!}
    jwt-expiration-ms: ${JWT_EXPIRATION:900000}
    control-api-key: ${CONTROL_API_KEY:internal_control_secret}
  storage:
    sftp-home: ${SFTP_HOME_BASE:/data/sftp}
    ftp-home: ${FTP_HOME_BASE:/data/ftp}
    ftpweb-home: ${FTPWEB_HOME_BASE:/data/ftpweb}
  flow:
    max-concurrent: ${FLOW_MAX_CONCURRENT:50}
    work-dir: ${FLOW_WORK_DIR:/tmp/mft-flow-work}
  proxy:
    enabled: ${PROXY_ENABLED:false}
    type: ${PROXY_TYPE:HTTP}
    host: ${PROXY_HOST:dmz-proxy}
    port: ${PROXY_PORT:8088}
    no-proxy-hosts: ${PROXY_NO_PROXY_HOSTS:localhost,127.0.0.1,postgres,rabbitmq}
  readiness:
    schema-file: db/schema/gateway-service.sql
    required-tables: legacy_server_configs,server_instances,transfer_accounts

# Single-port multiplexed tunnel to DMZ proxy (disabled by default)
tunnel:
  enabled: ${TUNNEL_ENABLED:false}
  dmz-host: ${TUNNEL_DMZ_HOST:dmz-proxy}
  dmz-port: ${TUNNEL_DMZ_PORT:9443}
  management-port: ${TUNNEL_MGMT_PORT:9444}
  tls-enabled: ${TUNNEL_TLS_ENABLED:false}
  max-streams: ${TUNNEL_MAX_STREAMS:1024}
  window-size: ${TUNNEL_WINDOW_SIZE:262144}
  keepalive-interval-seconds: 15
  keepalive-timeout-seconds: 20
  reconnect-base-ms: 1000
  reconnect-max-ms: 30000
  reconnect-jitter: 0.25
  ai-engine-url: ${AI_ENGINE_URL:http://ai-engine:8091}
  screening-service-url: ${SCREENING_SERVICE_URL:http://screening-service:8092}
  keystore-manager-url: ${KEYSTORE_MANAGER_URL:http://keystore-manager:8093}
