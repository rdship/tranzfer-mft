# Development profile — local Docker Compose
# Activate: SPRING_PROFILES_ACTIVE=dev

server:
  port: 8084

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/filetransfer
    username: postgres
    password: postgres
  jpa:
    show-sql: true

flow:
  stages:
    enabled: true

logging:
  level:
    com.filetransfer: DEBUG
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    enabled: true
