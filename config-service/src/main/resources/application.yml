server:
  port: 8084

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/filetransfer}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration

jwt:
  secret: ${JWT_SECRET:change_me_in_production_256bit_secret_key!!}
  expiration: 900000

cluster:
  id: ${CLUSTER_ID:default-cluster}
  host: ${CLUSTER_HOST:localhost}
  service-type: CONFIG

rabbitmq:
  exchange: file-transfer.events
