# Use Docker's embedded DNS so proxy_pass upstream hostnames are resolved
# per-request, not at nginx startup. Same reason as ui-service/nginx.conf.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    # Listen on 8080 (unprivileged) — see ui-service/nginx.conf for why.
    # Host port 3001 -> container 8080 via docker-compose.yml.
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;
    location = /nginx-health { access_log off; return 200 "ok\n"; }
    location / { try_files $uri $uri/ /index.html; }
    location /api/ {
        set $upstream_ftpweb ftp-web-service:8083;
        proxy_pass http://$upstream_ftpweb/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 512M;
    }
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
