# =============================================================================
# TranzFer MFT — Configuration
# =============================================================================
# Edit this file BEFORE first boot (ISO/OVA) or after installation.
# All values below are defaults — change as needed for your environment.
#
# This file is sourced by first-boot-setup.sh and passed as env to docker compose.
# After installation, edit docker-compose.yml directly or use .env overrides.
# =============================================================================

# --- Platform ---
# Domain name for the platform (used in SFTP banners, URLs, etc.)
PLATFORM_DOMAIN=localhost

# Enable bootstrap data seeding (demo accounts, default partner)
PLATFORM_BOOTSTRAP_ENABLED=true

# Environment label (DEV, STAGING, PRODUCTION)
PLATFORM_ENVIRONMENT=PRODUCTION

# --- Network Ports ---
# HTTP port for UI and REST API
HTTP_PORT=8080

# SFTP port (SSH File Transfer Protocol)
SFTP_PORT=2222

# FTP port (plain and active mode)
FTP_PORT=21

# FTPS port (FTP over TLS — implicit mode)
FTPS_PORT=990

# --- Database (PostgreSQL) ---
# When using Docker Compose, 'postgres' resolves to the container.
# For bare-metal / external DB, set the actual hostname or IP.
POSTGRES_HOST=postgres
POSTGRES_PORT=5432
POSTGRES_DB=filetransfer
POSTGRES_USER=tranzfer
# IMPORTANT: Change this password before production deployment
POSTGRES_PASSWORD=tranzfer_secure_2026

# --- Redis (session cache, rate limiting) ---
REDIS_HOST=redis
REDIS_PORT=6379

# --- RabbitMQ (event bus) ---
RABBITMQ_HOST=rabbitmq
RABBITMQ_PORT=5672
# IMPORTANT: Change these credentials before production deployment
RABBITMQ_USER=guest
RABBITMQ_PASSWORD=guest

# --- Storage ---
# Backend: local, s3, azure-blob, gcp-storage
STORAGE_BACKEND=local

# Local storage paths (mounted volumes in Docker, filesystem paths on bare-metal)
STORAGE_HOT_PATH=/data/storage/hot
STORAGE_WARM_PATH=/data/storage/warm
STORAGE_COLD_PATH=/data/storage/cold
STORAGE_BACKUP_PATH=/data/storage/backup

# --- TLS / HTTPS ---
# Set to true to enable HTTPS on the UI (served on port 8443)
TLS_ENABLED=false
TLS_CERT_PATH=/opt/tranzfer-mft/certs/server.crt
TLS_KEY_PATH=/opt/tranzfer-mft/certs/server.key

# --- Security ---
# JWT signing secret (minimum 32 characters, change for production)
# JWT_SECRET=change_me_in_production_256bit_secret_key!!

# HMAC secret for PCI audit log signing
# CONTROL_API_KEY=internal_control_secret

# Encryption master key (64 hex characters = 256-bit AES key)
# ENCRYPTION_MASTER_KEY=generate_a_random_64_hex_char_key_here

# Keystore master password
# KEYSTORE_MASTER_PASSWORD=change-this-master-password

# --- JVM Tuning (per service) ---
# Heap sizes — adjust based on available RAM
# Minimum: 4GB total RAM (256m per service)
# Recommended: 8GB total RAM (512m per service)
# Production: 16GB+ total RAM (1g per service)
JVM_HEAP_MIN=256m
JVM_HEAP_MAX=512m

# --- SPIFFE/SPIRE (Zero-Trust Service Identity) ---
# Enable SPIFFE workload identity for inter-service authentication
SPIFFE_ENABLED=true
SPIFFE_TRUST_DOMAIN=filetransfer.io

# --- Proxy (DMZ) ---
# Enable outbound proxy for external forwarding
PROXY_ENABLED=false
PROXY_TYPE=HTTP
PROXY_HOST=dmz-proxy
PROXY_PORT=8088
