name: aot-parity

# Boots the full stack twice — once with Spring AOT disabled (current
# platform default after R98), once with it enabled — and asserts every
# Java service reaches /actuator/health/liveness in both modes.
#
# Exists because R95 shipped an AOT flag that exposed a latent
# @EnableJpaRepositories vs @ComponentScan gap on 5 services. Reflection
# tolerated the gap; AOT crashed on it. Without this gate, the next AOT
# retry is equally blind to new latent gaps any future change might
# introduce (e.g., a new shared-platform @Component that references an
# unscanned repository).
#
# Trigger modes:
#   - workflow_dispatch: manual run before an AOT re-enable attempt
#   - pull_request touching Application.java in any service OR docker-compose.yml
#     OR the aot-parity script itself — catches bean-graph changes before merge
#   - scheduled weekly so silent drift doesn't accumulate between AOT retries
#
# Runtime: ~15 minutes per phase × 2 phases = ~30 min total. Acceptable
# since the workflow only runs on the specific paths above.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '**/src/main/java/**/*Application.java'
      - 'shared/shared-platform/src/main/java/com/filetransfer/shared/security/**'
      - 'docker-compose.yml'
      - 'scripts/aot-parity-check.sh'
      - '.github/workflows/aot-parity.yml'
  schedule:
    # Weekly Monday 04:00 UTC — catches silent drift accumulating between
    # AOT retry attempts. Intentionally off the boot-smoke 03:00 slot.
    - cron: '0 4 * * 1'

jobs:
  aot-parity:
    runs-on: ubuntu-latest
    # Two cold boots × ~12 minutes each plus Maven package ~5 min.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Build Java services
        run: mvn -q -B -DskipTests package
        env:
          MAVEN_OPTS: '-Xmx3g'

      - name: Pre-pull base images
        run: |
          docker pull postgres:16-alpine
          docker pull rabbitmq:3.13-management-alpine
          docker pull redis:7-alpine
          docker pull docker.redpanda.com/redpandadata/redpanda:v24.1.2 || true
          docker pull nginx:alpine

      - name: AOT parity check (both modes)
        run: ./scripts/aot-parity-check.sh --quick
        env:
          DOCKER_BUILDKIT: 1
          AOT_PARITY_TIMEOUT: 540

      - name: Capture container logs on failure
        if: failure()
        run: |
          mkdir -p /tmp/aot-parity-logs
          for c in $(docker ps -aq); do
            name=$(docker inspect --format '{{.Name}}' "$c" | tr -d '/')
            docker logs "$c" > "/tmp/aot-parity-logs/$name.log" 2>&1 || true
          done
          docker ps -a > /tmp/aot-parity-logs/_ps.txt
          docker compose ps > /tmp/aot-parity-logs/_compose-ps.txt 2>&1 || true
          cp /tmp/aot-parity-on-restarts.txt /tmp/aot-parity-logs/ 2>/dev/null || true
          cp /tmp/aot-parity-off-restarts.txt /tmp/aot-parity-logs/ 2>/dev/null || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: aot-parity-logs
          path: /tmp/aot-parity-logs/
          retention-days: 7

      - name: Teardown
        if: always()
        run: docker compose down -v --remove-orphans || true
