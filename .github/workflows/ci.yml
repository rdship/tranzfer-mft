name: CI — Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: Build (Java 21)
    runs-on: ubuntu-latest

    services:
      # CI Postgres — GitHub Actions services: block doesn't support a
      # `command:` override, so we can't inline the full R23 tuning here.
      # That's OK because:
      #   - statement_timeout, idle_in_transaction_session_timeout, lock_timeout
      #     all default to 0 in postgres:16-alpine, which matches the BUG-2/R18
      #     safety requirements out of the box.
      #   - Tests run against small data sets so memory tuning is immaterial.
      #   - The "ci-postgres-tune" step below applies the few settings that
      #     must match production via ALTER SYSTEM + pg_reload_conf.
      # For deployments that need the full tuning, see
      # docs/operations/DATABASE-TUNING.md or fetch
      # GET /api/v1/db-advisory from a running onboarding-api.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: filetransfer
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: ci-postgres-tune
        # Apply the few R23 settings that MUST be set for the Flyway bootstrap
        # (V42 CREATE INDEX CONCURRENTLY) plus the handful that improve test
        # feedback time. All non-memory tuning — avoids bumping shared_buffers
        # which would require a postgres restart.
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d filetransfer <<'SQL'
          ALTER SYSTEM SET statement_timeout = 0;
          ALTER SYSTEM SET idle_in_transaction_session_timeout = 0;
          ALTER SYSTEM SET lock_timeout = '10s';
          ALTER SYSTEM SET log_min_duration_statement = 500;
          ALTER SYSTEM SET log_lock_waits = on;
          ALTER SYSTEM SET log_checkpoints = on;
          ALTER SYSTEM SET autovacuum_vacuum_cost_limit = 2000;
          SELECT pg_reload_conf();
          SQL

      - name: Build all modules
        run: mvn clean package -B
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: test_jwt_secret_key_for_ci_256bit_long!!
          DATABASE_URL: jdbc:postgresql://localhost:5432/filetransfer
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres

      - name: Run tests
        run: mvn test -B --fail-at-end
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: test_jwt_secret_key_for_ci_256bit_long!!
          DATABASE_URL: jdbc:postgresql://localhost:5432/filetransfer
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres

      - name: Verify module count
        run: |
          MODULES=$(grep -c '<module>' pom.xml)
          echo "Maven modules: $MODULES"
          if [ "$MODULES" -lt 22 ]; then
            echo "ERROR: Expected 22+ modules, found $MODULES"
            exit 1
          fi

      - name: Check JAR artifacts
        run: |
          # R124 fix: version is set by parent pom (currently 1.0.0-Rxxx, not SNAPSHOT).
          # Glob the actual jar rather than hardcoding the version string, so this
          # step stops failing after every version bump.
          for svc in onboarding-api sftp-service ftp-service ftp-web-service config-service \
            gateway-service encryption-service license-service analytics-service \
            ai-engine screening-service keystore-manager storage-manager mft-client \
            dmz-proxy as2-service edi-converter notification-service \
            platform-sentinel external-forwarder-service; do
            # shellcheck disable=SC2086
            jar=$(ls ${svc}/target/${svc}-*.jar 2>/dev/null | grep -v -E '-sources\.jar|-javadoc\.jar' | head -1)
            if [ -n "$jar" ]; then
              echo "✓ ${svc} — $(basename "$jar")"
            else
              echo "✗ ${svc} — JAR not found in ${svc}/target/"
              exit 1
            fi
          done

  lint:
    name: Lint & Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          FOUND=0
          # Check for real AWS keys, private keys, etc.
          if grep -rn "AKIA[0-9A-Z]\{16\}" --include="*.java" --include="*.yml" --include="*.js" .; then
            echo "ERROR: AWS access key found!"
            FOUND=1
          fi
          if grep -rn "BEGIN RSA PRIVATE KEY" --include="*.java" --include="*.yml" .; then
            echo "WARNING: Private key in source (check if test fixture)"
          fi
          if [ "$FOUND" -eq 1 ]; then exit 1; fi
          echo "✓ No hardcoded secrets found"

      - name: Check Dockerfiles
        run: |
          for df in $(find . -name Dockerfile -not -path "*/node_modules/*"); do
            echo "Checking $df..."
            if ! grep -q "eclipse-temurin:21" "$df" && ! grep -q "node:" "$df" && ! grep -q "nginx:" "$df"; then
              echo "WARNING: $df may not use approved base image"
            fi
          done
          echo "✓ Dockerfile check complete"

      - name: Validate YAML configs
        run: |
          for yml in $(find . -name "application.yml" -path "*/resources/*"); do
            python3 -c "import yaml; yaml.safe_load(open('$yml'))" 2>/dev/null || \
              echo "WARNING: $yml may have syntax issues"
          done
          echo "✓ YAML validation complete"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JARs
        run: mvn clean package -DskipTests -B -q

      - name: Build Docker images
        run: |
          for svc in onboarding-api sftp-service ftp-service config-service \
            gateway-service encryption-service license-service analytics-service \
            ai-engine screening-service keystore-manager storage-manager; do
            echo "Building ${svc}..."
            docker build -t mft/${svc}:ci ./${svc}
          done
          echo "✓ All Docker images built successfully"
