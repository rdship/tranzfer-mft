server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy to backend services
    location /api-onboarding/ {
        proxy_pass http://onboarding-api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api-config/ {
        proxy_pass http://config-service:8084/;
        proxy_set_header Host $host;
    }
    location /api-analytics/ {
        proxy_pass http://analytics-service:8090/;
        proxy_set_header Host $host;
    }
    location /api-license/ {
        proxy_pass http://license-service:8089/;
        proxy_set_header Host $host;
    }
    location /api-gateway/ {
        proxy_pass http://gateway-service:8085/;
        proxy_set_header Host $host;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
