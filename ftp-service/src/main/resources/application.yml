server:
  port: 8082
  shutdown: graceful

management:
  health:
    probes:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info,circuit-breakers

spring:
  main:
    allow-bean-definition-overriding: true
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 4
          max-idle: 4
          min-idle: 1
          max-wait: 1000ms
  lifecycle:
    timeout-per-shutdown-phase: 45s
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/filetransfer}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: false
      maximum-pool-size: 15
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      pool-name: FTP-Pool
  jpa:
    open-in-view: true  # OSIV: controllers return raw JPA entities
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        connection:
          provider_disables_autocommit: true
        temp:
          use_jdbc_metadata_defaults: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    placeholder-replacement: false
    locations: classpath:db/migration
    validate-on-migrate: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    connection-timeout: 30000
    requested-heartbeat: 60

jwt:
  secret: ${JWT_SECRET:change_me_in_production_256bit_secret_key!!}
  expiration: 900000

ftp:
  port: ${FTP_PORT:21}
  passive-ports: ${FTP_PASSIVE_PORTS:21000-21010}
  public-host: ${FTP_PUBLIC_HOST:127.0.0.1}
  home-base: ${FTP_HOME_BASE:/data/ftp}
  instance-id: ${FTP_INSTANCE_ID:#{null}}

  # Connection management
  idle-timeout-seconds: ${FTP_IDLE_TIMEOUT_SECONDS:300}
  data-connection-timeout-seconds: ${FTP_DATA_CONNECTION_TIMEOUT_SECONDS:120}
  banner-message: ${FTP_BANNER_MESSAGE:220 TranzFer MFT FTP Service Ready}
  connection:
    max-total: ${FTP_MAX_CONNECTIONS:200}
    max-per-user: ${FTP_MAX_CONNECTIONS_PER_USER:10}
    max-per-ip: ${FTP_MAX_CONNECTIONS_PER_IP:10}
    max-logins: ${FTP_MAX_LOGINS:100}

  # Authentication hardening
  security:
    max-login-failures: ${FTP_MAX_LOGIN_FAILURES:5}
    lockout-duration-seconds: ${FTP_LOCKOUT_DURATION_SECONDS:900}
    ip-allowlist: ${FTP_IP_ALLOWLIST:}
    ip-denylist: ${FTP_IP_DENYLIST:}
    bounce-prevention: ${FTP_BOUNCE_PREVENTION:true}

  # Anonymous FTP (disabled by default)
  anonymous:
    enabled: ${FTP_ANONYMOUS_ENABLED:false}
    home-dir: ${FTP_ANONYMOUS_HOME_DIR:${FTP_HOME_BASE:/data/ftp}/anonymous}

  # FTPS hardening
  ftps:
    enabled: ${FTP_FTPS_ENABLED:false}
    keystore-path: ${FTP_TLS_KEYSTORE_FILE:${FTP_FTPS_KEYSTORE_PATH:./ftp-keystore.jks}}
    keystore-password: ${FTP_TLS_KEYSTORE_PASSWORD:${FTP_FTPS_KEYSTORE_PASSWORD:changeit}}
    keystore-type: ${FTP_TLS_KEYSTORE_TYPE:JKS}
    protocol: ${FTP_FTPS_PROTOCOL:TLSv1.3}
    client-auth: ${FTP_TLS_CLIENT_AUTH:${FTP_FTPS_CLIENT_AUTH:none}}
    implicit: ${FTP_IMPLICIT_TLS:${FTP_FTPS_IMPLICIT:false}}
    require: ${FTP_REQUIRE_TLS:true}
    require-data-tls: ${FTP_REQUIRE_DATA_TLS:true}
    cipher-suites: ${FTP_TLS_CIPHER_SUITES:${FTP_FTPS_CIPHER_SUITES:TLS_AES_256_GCM_SHA384,TLS_AES_128_GCM_SHA256,TLS_CHACHA20_POLY1305_SHA256,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384}}
    enabled-protocols: ${FTP_TLS_PROTOCOLS:${FTP_FTPS_ENABLED_PROTOCOLS:TLSv1.3,TLSv1.2}}
    truststore-path: ${FTP_TLS_TRUSTSTORE_FILE:${FTP_FTPS_TRUSTSTORE_PATH:}}
    truststore-password: ${FTP_TLS_TRUSTSTORE_PASSWORD:${FTP_FTPS_TRUSTSTORE_PASSWORD:changeit}}

  # File operation controls
  file:
    max-upload-size: ${FTP_MAX_UPLOAD_SIZE:0}
    disk-quota: ${FTP_DISK_QUOTA:0}
    allowed-extensions: ${FTP_ALLOWED_EXTENSIONS:}
    denied-extensions: ${FTP_DENIED_EXTENSIONS:}

  # Passive mode
  passive:
    epsv-enabled: ${FTP_EPSV_ENABLED:true}

  # Active mode (PORT/EPRT commands)
  active:
    enabled: ${FTP_ACTIVE_MODE_ENABLED:true}
    data-port-min: ${FTP_ACTIVE_DATA_PORT_MIN:0}
    data-port-max: ${FTP_ACTIVE_DATA_PORT_MAX:0}
    data-timeout-seconds: ${FTP_ACTIVE_DATA_TIMEOUT_SECONDS:30}

  # Bandwidth throttling (bytes per second, 0 = unlimited)
  throttle:
    max-upload-rate: ${FTP_MAX_UPLOAD_RATE:0}
    max-download-rate: ${FTP_MAX_DOWNLOAD_RATE:0}

  # Audit logging
  audit:
    enabled: ${FTP_AUDIT_ENABLED:true}

  # Graceful shutdown
  shutdown:
    drain-timeout-seconds: ${FTP_SHUTDOWN_DRAIN_TIMEOUT_SECONDS:30}

  # Keystore Manager integration (centralized key/cert storage)
  keystore:
    enabled: ${FTP_KEYSTORE_MANAGER_ENABLED:false}
    manager-url: ${FTP_KEYSTORE_MANAGER_URL:http://keystore-manager:8093}

rabbitmq:
  exchange: file-transfer.events
  queue:
    ftp-events: ftp.account.events

control-api:
  key: ${CONTROL_API_KEY:internal_control_secret}

flow:
  rules:
    enabled: true

cluster:
  id: ${CLUSTER_ID:default-cluster}
  host: ${CLUSTER_HOST:localhost}
  service-type: FTP
  communication-mode: ${CLUSTER_COMM_MODE:WITHIN_CLUSTER}

platform:
  entity-scan:
    mode: selective
    packages: com.filetransfer.shared.entity.AuditLog,com.filetransfer.shared.entity.FolderTemplate,com.filetransfer.shared.entity.ServerInstance,com.filetransfer.shared.entity.TransferAccount
  services:
    onboarding-api:
      url: ${ONBOARDING_API_URL:http://onboarding-api:8080}
    sftp-service:
      url: ${SFTP_SERVICE_URL:http://sftp-service:8081}
    ftp-service:
      url: ${FTP_SERVICE_URL:http://ftp-service:8082}
    ftp-web-service:
      url: ${FTP_WEB_SERVICE_URL:http://ftp-web-service:8083}
    config-service:
      url: ${CONFIG_SERVICE_URL:http://config-service:8084}
    gateway-service:
      url: ${GATEWAY_SERVICE_URL:http://gateway-service:8085}
    encryption-service:
      url: ${ENCRYPTION_SERVICE_URL:http://encryption-service:8086}
    forwarder-service:
      url: ${FORWARDER_SERVICE_URL:http://external-forwarder-service:8087}
    dmz-proxy:
      url: ${DMZ_PROXY_URL:http://dmz-proxy:8088}
    license-service:
      url: ${LICENSE_SERVICE_URL:http://license-service:8089}
    analytics-service:
      url: ${ANALYTICS_SERVICE_URL:http://analytics-service:8090}
    ai-engine:
      url: ${AI_ENGINE_URL:http://ai-engine:8091}
    screening-service:
      url: ${SCREENING_SERVICE_URL:http://screening-service:8092}
    keystore-manager:
      url: ${KEYSTORE_MANAGER_URL:http://keystore-manager:8093}
    as2-service:
      url: ${AS2_SERVICE_URL:http://as2-service:8094}
    edi-converter:
      url: ${EDI_CONVERTER_URL:http://edi-converter:8095}
    storage-manager:
      url: ${STORAGE_MANAGER_URL:http://storage-manager:8096}
  environment: ${PLATFORM_ENVIRONMENT:PROD}
  track-id:
    prefix: ${TRACK_ID_PREFIX:TRZ}
  cluster:
    id: ${CLUSTER_ID:default-cluster}
    host: ${CLUSTER_HOST:localhost}
  security:
    jwt-secret: ${JWT_SECRET:change_me_in_production_256bit_secret_key!!}
    jwt-expiration-ms: ${JWT_EXPIRATION:900000}
    control-api-key: ${CONTROL_API_KEY:internal_control_secret}
  storage:
    sftp-home: ${SFTP_HOME_BASE:/data/sftp}
    ftp-home: ${FTP_HOME_BASE:/data/ftp}
    ftpweb-home: ${FTPWEB_HOME_BASE:/data/ftpweb}
  flow:
    max-concurrent: ${FLOW_MAX_CONCURRENT:50}
    work-dir: ${FLOW_WORK_DIR:/tmp/mft-flow-work}
  proxy:
    enabled: ${PROXY_ENABLED:false}
    type: ${PROXY_TYPE:HTTP}
    host: ${PROXY_HOST:dmz-proxy}
    port: ${PROXY_PORT:8088}
    no-proxy-hosts: ${PROXY_NO_PROXY_HOSTS:localhost,127.0.0.1,postgres,rabbitmq}

  readiness:
    schema-file: db/schema/ftp-service.sql
    required-tables: transfer_accounts,server_instances,folder_templates,audit_logs,folder_mappings,file_transfer_records,file_flows,flow_executions

vfs:
  inline-max-bytes: ${VFS_INLINE_MAX_BYTES:65536}
  chunk-threshold-bytes: ${VFS_CHUNK_THRESHOLD_BYTES:67108864}
