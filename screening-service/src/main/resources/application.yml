server:
  port: 8092
spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/filetransfer}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 10000
      pool-name: Screening-Pool
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        connection:
          provider_disables_autocommit: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    locations: classpath:db/migration

screening:
  ofac:
    sdn-url: https://www.treasury.gov/ofac/downloads/sdn.csv
    refresh-hours: ${SCREENING_REFRESH_HOURS:24}
    enabled: true
  eu:
    enabled: ${EU_SANCTIONS_ENABLED:true}
    url: https://webgate.ec.europa.eu/fsd/fsf/public/files/csvFullSanctionsList/content
  un:
    enabled: ${UN_SANCTIONS_ENABLED:true}
  match-threshold: ${SCREENING_THRESHOLD:0.82}
  default-action: ${SCREENING_DEFAULT_ACTION:BLOCK}

cluster:
  id: ${CLUSTER_ID:default-cluster}
  host: ${CLUSTER_HOST:screening-service}
  service-type: SCREENING

platform:
  environment: ${PLATFORM_ENVIRONMENT:PROD}
  track-id:
    prefix: ${TRACK_ID_PREFIX:TRZ}
  security:
    control-api-key: ${CONTROL_API_KEY:internal_control_secret}
