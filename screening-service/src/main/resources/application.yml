server:
  port: 8092
  shutdown: graceful

management:
  health:
    probes:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info,circuit-breakers

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/filetransfer}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: false
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      pool-name: Screening-Pool
  jpa:
    open-in-view: true  # OSIV: controllers return raw JPA entities
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        connection:
          provider_disables_autocommit: true
        temp:
          use_jdbc_metadata_defaults: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    placeholder-replacement: false
    locations: classpath:db/migration
    validate-on-migrate: false

spring.rabbitmq:
  host: ${RABBITMQ_HOST:localhost}
  port: ${RABBITMQ_PORT:5672}
  username: ${RABBITMQ_USERNAME:guest}
  password: ${RABBITMQ_PASSWORD:guest}
  connection-timeout: 3000
  requested-heartbeat: 60
  template:
    reply-timeout: 3000

rabbitmq:
  exchange: file-transfer.events

clamav:
  host: ${CLAMAV_HOST:localhost}
  port: ${CLAMAV_PORT:3310}
  timeout-ms: ${CLAMAV_TIMEOUT_MS:60000}
  chunk-size: ${CLAMAV_CHUNK_SIZE:8192}

screening:
  quarantine:
    path: ${SCREENING_QUARANTINE_PATH:/data/quarantine}
  ofac:
    sdn-url: https://www.treasury.gov/ofac/downloads/sdn.csv
    refresh-hours: ${SCREENING_REFRESH_HOURS:24}
    enabled: true
  eu:
    enabled: ${EU_SANCTIONS_ENABLED:true}
    url: ${SANCTIONS_EU_URL:https://webgate.ec.europa.eu/fsd/fsf/public/files/csvFullSanctionsList/content?token=dG9rZW4tMjAxNw}
    fallback-to-builtin: true
  un:
    enabled: ${UN_SANCTIONS_ENABLED:true}
    url: ${SANCTIONS_UN_URL:https://scsanctions.un.org/resources/xml/en/consolidated.xml}
    fallback-to-builtin: true
  match-threshold: ${SCREENING_THRESHOLD:0.82}
  default-action: ${SCREENING_DEFAULT_ACTION:BLOCK}

cluster:
  id: ${CLUSTER_ID:default-cluster}
  host: ${CLUSTER_HOST:screening-service}
  service-type: SCREENING
  communication-mode: ${CLUSTER_COMM_MODE:WITHIN_CLUSTER}

platform:
  services:
    onboarding-api:
      url: ${ONBOARDING_API_URL:http://onboarding-api:8080}
    sftp-service:
      url: ${SFTP_SERVICE_URL:http://sftp-service:8081}
    ftp-service:
      url: ${FTP_SERVICE_URL:http://ftp-service:8082}
    ftp-web-service:
      url: ${FTP_WEB_SERVICE_URL:http://ftp-web-service:8083}
    config-service:
      url: ${CONFIG_SERVICE_URL:http://config-service:8084}
    gateway-service:
      url: ${GATEWAY_SERVICE_URL:http://gateway-service:8085}
    encryption-service:
      url: ${ENCRYPTION_SERVICE_URL:http://encryption-service:8086}
    forwarder-service:
      url: ${FORWARDER_SERVICE_URL:http://external-forwarder-service:8087}
    dmz-proxy:
      url: ${DMZ_PROXY_URL:http://dmz-proxy:8088}
    license-service:
      url: ${LICENSE_SERVICE_URL:http://license-service:8089}
    analytics-service:
      url: ${ANALYTICS_SERVICE_URL:http://analytics-service:8090}
    ai-engine:
      url: ${AI_ENGINE_URL:http://ai-engine:8091}
    screening-service:
      url: ${SCREENING_SERVICE_URL:http://screening-service:8092}
    keystore-manager:
      url: ${KEYSTORE_MANAGER_URL:http://keystore-manager:8093}
    as2-service:
      url: ${AS2_SERVICE_URL:http://as2-service:8094}
    edi-converter:
      url: ${EDI_CONVERTER_URL:http://edi-converter:8095}
    storage-manager:
      url: ${STORAGE_MANAGER_URL:http://storage-manager:8096}
  environment: ${PLATFORM_ENVIRONMENT:PROD}
  track-id:
    prefix: ${TRACK_ID_PREFIX:TRZ}
  security:
    control-api-key: ${CONTROL_API_KEY:internal_control_secret}
  proxy:
    enabled: ${PROXY_ENABLED:false}
    type: ${PROXY_TYPE:HTTP}
    host: ${PROXY_HOST:dmz-proxy}
    port: ${PROXY_PORT:8088}
    no-proxy-hosts: ${PROXY_NO_PROXY_HOSTS:localhost,127.0.0.1,postgres,rabbitmq}
  readiness:
    schema-file: db/schema/screening-service.sql
    required-tables: sanctions_entries,screening_results,dlp_policies,quarantine_records
    fail-on-missing: true
