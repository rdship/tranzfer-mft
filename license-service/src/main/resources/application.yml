server:
  port: 8089

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/filetransfer}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 10000
      pool-name: License-Pool
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        connection:
          provider_disables_autocommit: true
  cache:
    type: simple
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  metrics:
    export:
      prometheus:
        enabled: true

cluster:
  id: ${CLUSTER_ID:default-cluster}
  host: ${CLUSTER_HOST:license-service}
  service-type: LICENSE
  communication-mode: ${CLUSTER_COMM_MODE:WITHIN_CLUSTER}

license:
  trial-days: 30
  issuer-name: "TranzFer MFT Platform"
  admin-key: ${LICENSE_ADMIN_KEY:license_admin_secret_key}
  validation-cache-hours: 6

platform:
  environment: ${PLATFORM_ENVIRONMENT:PROD}
  track-id:
    prefix: ${TRACK_ID_PREFIX:TRZ}
  cluster:
    id: ${CLUSTER_ID:default-cluster}
    host: ${CLUSTER_HOST:localhost}
  security:
    jwt-secret: ${JWT_SECRET:change_me_in_production_256bit_secret_key!!}
    jwt-expiration-ms: ${JWT_EXPIRATION:900000}
    control-api-key: ${CONTROL_API_KEY:internal_control_secret}
  storage:
    sftp-home: ${SFTP_HOME_BASE:/data/sftp}
    ftp-home: ${FTP_HOME_BASE:/data/ftp}
    ftpweb-home: ${FTPWEB_HOME_BASE:/data/ftpweb}
  flow:
    max-concurrent: ${FLOW_MAX_CONCURRENT:50}
    work-dir: ${FLOW_WORK_DIR:/tmp/mft-flow-work}
