# =============================================================================
# TranzFer MFT — Third-Party SFTP Integration Demo
#
# Demonstrates: DMZ Proxy + AI Engine wrapping a completely external
# SFTP server (atmoz/sftp) and web server (nginx) with zero code changes.
#
# Usage:
#   docker compose -f docker-compose-external-demo.yml up -d
#   tests/integration/third-party-sftp/run.sh
#   docker compose -f docker-compose-external-demo.yml down -v
#
# Ports (chosen to not conflict with the main stack):
#   8189  → DMZ Proxy management API
#   2222  → SFTP through the proxy  (main stack uses 32222)
#   8180  → HTTP through the proxy
#   8191  → AI Engine health / inspect (optional)
# =============================================================================

services:

  # ─── THIRD-PARTY SERVICES ─────────────────────────────────────────────────
  # These represent any existing product you want to protect.
  # They are NOT exposed to the internet — hidden behind the DMZ proxy.

  my-sftp-server:
    image: atmoz/sftp:alpine
    container_name: demo-sftp-server
    command: demo_user:demo_pass:1001
    networks:
      - demo-net

  my-web-app:
    image: nginx:alpine
    container_name: demo-web-app
    networks:
      - demo-net

  # ─── INFRASTRUCTURE ───────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: demo-postgres
    profiles: [full]
    environment:
      POSTGRES_DB: filetransfer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # Tuned Postgres 16 — mirrors docker-compose.yml and k8s/infra/postgres.yaml
    # so every deployment surface honors R23 advice. Full rationale per
    # setting: config/postgres/postgresql.tuned.conf + docs/operations/DATABASE-TUNING.md
    command: >
      postgres
      -c max_connections=200
      -c superuser_reserved_connections=5
      -c shared_buffers=1GB
      -c effective_cache_size=4GB
      -c work_mem=16MB
      -c maintenance_work_mem=256MB
      -c temp_buffers=16MB
      -c wal_buffers=32MB
      -c max_wal_size=4GB
      -c min_wal_size=1GB
      -c checkpoint_timeout=15min
      -c checkpoint_completion_target=0.9
      -c wal_compression=on
      -c random_page_cost=1.1
      -c seq_page_cost=1.0
      -c effective_io_concurrency=200
      -c default_statistics_target=200
      -c max_worker_processes=8
      -c max_parallel_workers=6
      -c max_parallel_workers_per_gather=2
      -c max_parallel_maintenance_workers=2
      -c autovacuum=on
      -c autovacuum_max_workers=4
      -c autovacuum_naptime=30s
      -c autovacuum_vacuum_scale_factor=0.1
      -c autovacuum_analyze_scale_factor=0.05
      -c autovacuum_vacuum_cost_limit=2000
      -c statement_timeout=0
      -c idle_in_transaction_session_timeout=0
      -c lock_timeout=10s
      -c deadlock_timeout=1s
      -c log_min_duration_statement=500
      -c log_checkpoints=on
      -c log_lock_waits=on
      -c log_autovacuum_min_duration=1s
      -c log_temp_files=4MB
      -c jit=on
      -c jit_above_cost=100000
      -c timezone=UTC
      -c log_timezone=UTC
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - demo-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: demo-rabbitmq
    profiles: [full]
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - demo-net

  # ─── AI ENGINE ────────────────────────────────────────────────────────────
  # Provides IP reputation, anomaly detection, and ALLOW/THROTTLE/BLOCK/BLACKHOLE
  # verdicts to the DMZ proxy for every new connection.

  ai-engine:
    build: ./ai-engine
    container_name: demo-ai-engine
    profiles: [full]
    ports:
      - "8191:8091"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m -XX:+UseG1GC -Dspring.main.lazy-initialization=true"
      DATABASE_URL: jdbc:postgresql://postgres:5432/filetransfer?stringtype=unspecified
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      SERVER_PORT: 8091
      CONTROL_API_KEY: demo-key-2024
      CLUSTER_ID: demo-cluster
      CLUSTER_COMM_MODE: WITHIN_CLUSTER
      CLUSTER_HOST: ai-engine
      SPRING_PROFILES_ACTIVE: docker
      PLATFORM_ENVIRONMENT: DEV
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8091/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s
    networks:
      - demo-net

  # ─── DMZ PROXY ────────────────────────────────────────────────────────────
  # The security layer. Wraps the external products with:
  #   - Rate limiting (per-IP token bucket)
  #   - AI verdicts (ALLOW / THROTTLE / BLOCK / BLACKHOLE)
  #   - Protocol detection (SSH, FTP, HTTP, TLS)
  #   - Deep packet inspection
  #   - Audit logging
  #   - Hot-configurable port mappings via REST API

  demo-dmz-proxy:
    build: ./dmz-proxy
    container_name: demo-dmz-proxy
    ports:
      - "8189:8088"     # Management API
      - "12222:2222"    # SFTP → my-sftp-server (reconfigured in run.sh; 12222 avoids conflict with mft-sftp-service on 2222)
      - "8180:443"      # HTTP → my-web-app    (reconfigured in run.sh)
    environment:
      PLATFORM_SECURITY_JWT_SECRET: changeme_32char_secret_here_!!!!   # must match PLATFORM_JWT_SECRET in run.sh
      SERVER_PORT: 8088
      DMZ_SECURITY_ENABLED: "true"
      # Reuse the main stack's ai-engine if running; falls back to ALLOW on timeout
      AI_ENGINE_URL: http://host.docker.internal:8091
      DMZ_AUDIT_ENABLED: "true"
      DMZ_ZONES_ENABLED: "false"       # Docker bridge: all on same network
      DMZ_EGRESS_ENABLED: "false"      # Docker bridge: backend DNS resolves internally
      DMZ_INSPECTION_ENABLED: "true"
      DMZ_HEALTH_CHECK_ENABLED: "true"
      DMZ_QOS_ENABLED: "false"
      DMZ_TLS_ENABLED: "false"
      # Default mappings will be replaced by run.sh via REST API to point at
      # my-sftp-server:22 and my-web-app:80 (see Step 2 in run.sh)
      GATEWAY_HOST: my-sftp-server
      FTPWEB_HOST: my-web-app
    depends_on:
      my-sftp-server:
        condition: service_started
      my-web-app:
        condition: service_started

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/api/proxy/health | grep -q 'UP' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s
    networks:
      - demo-net

networks:
  demo-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24    # Isolated — no conflict with main stack
