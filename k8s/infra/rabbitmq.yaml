---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: mft
spec:
  selector: {app: rabbitmq}
  ports:
  - {name: amqp,       port: 5672,  targetPort: 5672}
  - {name: management, port: 15672, targetPort: 15672}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: mft
spec:
  serviceName: rabbitmq
  replicas: 1
  selector:
    matchLabels: {app: rabbitmq}
  template:
    metadata:
      labels: {app: rabbitmq}
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3.13-management-alpine
        env:
        - {name: RABBITMQ_DEFAULT_USER,  value: guest}
        - name: RABBITMQ_DEFAULT_PASS
          valueFrom:
            secretKeyRef: {name: mft-secrets, key: RABBITMQ_DEFAULT_PASS}
        - name: RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS
          value: "-rabbit vm_memory_high_watermark 0.8"
        ports:
        - {containerPort: 5672}
        - {containerPort: 15672}
        resources:
          requests: {memory: "256Mi", cpu: "200m"}
          limits:   {memory: "512Mi", cpu: "500m"}
        readinessProbe:
          exec:
            command: ["rabbitmq-diagnostics", "check_port_connectivity"]
          initialDelaySeconds: 20
          periodSeconds: 15
          timeoutSeconds: 10
        livenessProbe:
          exec:
            command: ["rabbitmq-diagnostics", "status"]
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 15
        volumeMounts:
        - {name: data, mountPath: /var/lib/rabbitmq}
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: rabbitmq-pvc
