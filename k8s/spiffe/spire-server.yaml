# SPIFFE/SPIRE in Kubernetes
# Reference: https://spiffe.io/docs/latest/deploying/install-server/
#
# Architecture:
#   spire-server  → StatefulSet, issues SVIDs, manages the CA
#   spire-agent   → DaemonSet, one per node, exposes workload API socket
#   Each service  → SPIRE agent mounts socket at /run/spire/sockets/agent.sock
---
apiVersion: v1
kind: ServiceAccount
metadata: {name: spire-server, namespace: mft}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: {name: spire-server-role}
rules:
- apiGroups: [""]
  resources: [nodes, pods]
  verbs: [get, list, watch]
- apiGroups: [authentication.k8s.io]
  resources: [tokenreviews]
  verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: {name: spire-server-binding}
roleRef: {apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: spire-server-role}
subjects:
- {kind: ServiceAccount, name: spire-server, namespace: mft}
---
apiVersion: v1
kind: ConfigMap
metadata: {name: spire-server-config, namespace: mft}
data:
  server.conf: |
    server {
      bind_address = "0.0.0.0"
      bind_port = "8081"
      trust_domain = "filetransfer.io"
      data_dir = "/run/spire/data"
      log_level = "INFO"
      ca_ttl = "168h"
      default_svid_ttl = "1h"
    }
    plugins {
      DataStore "sql" {
        plugin_data {
          database_type = "sqlite3"
          connection_string = "/run/spire/data/datastore.sqlite3"
        }
      }
      NodeAttestor "k8s_psat" {
        plugin_data {
          clusters = {
            "mft-cluster" = {
              service_account_allow_list = ["mft:spire-agent"]
              kube_config_file = ""
            }
          }
        }
      }
      KeyManager "memory" {
        plugin_data {}
      }
    }
---
apiVersion: v1
kind: Service
metadata: {name: spire-server, namespace: mft}
spec:
  selector: {app: spire-server}
  ports:
  - {name: grpc, port: 8081, targetPort: 8081}
  clusterIP: None  # Headless
---
apiVersion: apps/v1
kind: StatefulSet
metadata: {name: spire-server, namespace: mft}
spec:
  serviceName: spire-server
  replicas: 1
  selector: {matchLabels: {app: spire-server}}
  template:
    metadata: {labels: {app: spire-server}}
    spec:
      serviceAccountName: spire-server
      containers:
      - name: spire-server
        image: ghcr.io/spiffe/spire-server:1.9.0
        args: ["-config", "/run/spire/config/server.conf"]
        ports: [{containerPort: 8081}]
        resources:
          requests: {memory: "64Mi",  cpu: "50m"}
          limits:   {memory: "256Mi", cpu: "500m"}
        volumeMounts:
        - {name: config,    mountPath: /run/spire/config, readOnly: true}
        - {name: spire-data,mountPath: /run/spire/data}
      volumes:
      - name: config
        configMap: {name: spire-server-config}
      - name: spire-data
        emptyDir: {}
