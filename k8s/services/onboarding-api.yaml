---
apiVersion: v1
kind: Service
metadata:
  name: onboarding-api
  namespace: mft
spec:
  selector: {app: onboarding-api}
  ports:
  - {port: 8080, targetPort: 8080}
---
# Representative stateless service. All other Spring Boot services follow
# the same pattern — copy and adjust name, image, SERVER_PORT, and resources.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onboarding-api
  namespace: mft
spec:
  replicas: 2
  selector:
    matchLabels: {app: onboarding-api}
  strategy:
    rollingUpdate: {maxSurge: 1, maxUnavailable: 0}
  template:
    metadata:
      labels: {app: onboarding-api}
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector: {matchLabels: {app: onboarding-api}}
              topologyKey: kubernetes.io/hostname
      containers:
      - name: onboarding-api
        image: mft/onboarding-api:latest
        imagePullPolicy: Always
        ports:
        - {containerPort: 8080}
        env:
        - {name: SERVER_PORT,  value: "8080"}
        - {name: CLUSTER_HOST, value: onboarding-api}
        - name: JAVA_TOOL_OPTIONS
          value: "-Xmx384m -Xms192m -XX:+UseG1GC -XX:MaxGCPauseMillis=100"
        envFrom:
        - configMapRef: {name: mft-common}
        - secretRef:    {name: mft-secrets}
        resources:
          requests: {memory: "384Mi", cpu: "200m"}
          limits:   {memory: "768Mi", cpu: "1000m"}
        readinessProbe:
          httpGet: {path: /actuator/health/readiness, port: 8080}
          initialDelaySeconds: 20
          periodSeconds: 10
        livenessProbe:
          httpGet: {path: /actuator/health/liveness, port: 8080}
          initialDelaySeconds: 60
          periodSeconds: 30
        startupProbe:
          httpGet: {path: /actuator/health, port: 8080}
          failureThreshold: 30
          periodSeconds: 5
        volumeMounts:
        - {name: spire-socket, mountPath: /run/spire/sockets, readOnly: true}
      volumes:
      - name: spire-socket
        hostPath: {path: /run/spire/sockets, type: DirectoryOrCreate}
