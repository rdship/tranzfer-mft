---
# platform-sentinel
apiVersion: v1
kind: Service
metadata: {name: platform-sentinel, namespace: mft}
spec:
  selector: {app: platform-sentinel}
  ports: [{port: 8098, targetPort: 8098}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: platform-sentinel, namespace: mft}
spec:
  replicas: 1    # Sentinel is a read-only observer — 1 replica is sufficient
  selector: {matchLabels: {app: platform-sentinel}}
  template:
    metadata: {labels: {app: platform-sentinel}}
    spec:
      containers:
      - name: platform-sentinel
        image: mft/platform-sentinel:latest
        ports: [{containerPort: 8098}]
        env:
        - {name: SERVER_PORT,  value: "8098"}
        - {name: CLUSTER_HOST, value: platform-sentinel}
        - {name: JAVA_TOOL_OPTIONS, value: "-Xmx384m -Xms192m -XX:+UseG1GC"}
        envFrom:
        - configMapRef: {name: mft-common}
        - secretRef:    {name: mft-secrets}
        resources:
          requests: {memory: "384Mi", cpu: "200m"}
          limits:   {memory: "768Mi", cpu: "1000m"}
        readinessProbe:
          httpGet: {path: /api/v1/sentinel/health, port: 8098}
          initialDelaySeconds: 30
          periodSeconds: 15
        livenessProbe:
          httpGet: {path: /api/v1/sentinel/health, port: 8098}
          initialDelaySeconds: 60
          periodSeconds: 30
        volumeMounts:
        - {name: spire-socket, mountPath: /run/spire/sockets, readOnly: true}
      volumes:
      - name: spire-socket
        hostPath: {path: /run/spire/sockets, type: DirectoryOrCreate}

