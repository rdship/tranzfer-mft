# NOTE: This file uses pseudo-template notation for readability.
# In practice, use Helm charts or Kustomize to generate these.
# Below is the actual YAML for all services:

---
# config-service
apiVersion: v1
kind: Service
metadata: {name: config-service, namespace: mft}
spec:
  selector: {app: config-service}
  ports: [{port: 8084, targetPort: 8084}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: config-service, namespace: mft}
spec:
  replicas: 2
  selector: {matchLabels: {app: config-service}}
  strategy: {rollingUpdate: {maxSurge: 1, maxUnavailable: 0}}
  template:
    metadata: {labels: {app: config-service}}
    spec:
      containers:
      - name: config-service
        image: mft/config-service:latest
        ports: [{containerPort: 8084}]
        env:
        - {name: SERVER_PORT,  value: "8084"}
        - {name: CLUSTER_HOST, value: config-service}
        - {name: JAVA_TOOL_OPTIONS, value: "-Xmx384m -Xms192m -XX:+UseG1GC"}
        envFrom:
        - configMapRef: {name: mft-common}
        - secretRef:    {name: mft-secrets}
        resources:
          requests: {memory: "384Mi", cpu: "200m"}
          limits:   {memory: "768Mi", cpu: "1000m"}
        readinessProbe:
          httpGet: {path: /actuator/health/readiness, port: 8084}
          initialDelaySeconds: 20
          periodSeconds: 10
        livenessProbe:
          httpGet: {path: /actuator/health/liveness, port: 8084}
          initialDelaySeconds: 60
          periodSeconds: 30
        volumeMounts:
        - {name: spire-socket, mountPath: /run/spire/sockets, readOnly: true}
      volumes:
      - name: spire-socket
        hostPath: {path: /run/spire/sockets, type: DirectoryOrCreate}
---
