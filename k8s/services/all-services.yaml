# ─────────────────────────────────────────────────────────────────────────────
# All stateless MFT services generated from the same pattern.
# For production, split each into its own file and tune resources per service.
#
# Pattern for each service:
#   Service (ClusterIP) → Deployment (2 replicas) → configMapRef + secretRef
# ─────────────────────────────────────────────────────────────────────────────

{% set services = [
  {name: config-service,           port: 8084, cpu_req: "200m", mem_req: "384Mi"},
  {name: sftp-service,             port: 8081, cpu_req: "200m", mem_req: "512Mi"},
  {name: ftp-service,              port: 8082, cpu_req: "200m", mem_req: "384Mi"},
  {name: ftp-web-service,          port: 8083, cpu_req: "200m", mem_req: "384Mi"},
  {name: gateway-service,          port: 8085, cpu_req: "200m", mem_req: "384Mi"},
  {name: encryption-service,       port: 8086, cpu_req: "200m", mem_req: "256Mi"},
  {name: external-forwarder-service,port: 8087,cpu_req: "200m", mem_req: "384Mi"},
  {name: license-service,          port: 8089, cpu_req: "100m", mem_req: "256Mi"},
  {name: analytics-service,        port: 8090, cpu_req: "300m", mem_req: "512Mi"},
  {name: ai-engine,                port: 8091, cpu_req: "500m", mem_req: "768Mi"},
  {name: screening-service,        port: 8092, cpu_req: "200m", mem_req: "384Mi"},
  {name: keystore-manager,         port: 8093, cpu_req: "200m", mem_req: "384Mi"},
  {name: as2-service,              port: 8094, cpu_req: "200m", mem_req: "384Mi"},
  {name: edi-converter,            port: 8095, cpu_req: "200m", mem_req: "384Mi"},
  {name: notification-service,     port: 8097, cpu_req: "100m", mem_req: "256Mi"},
