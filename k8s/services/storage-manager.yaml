---
apiVersion: v1
kind: Service
metadata:
  name: storage-manager
  namespace: mft
spec:
  selector: {app: storage-manager}
  ports:
  - {port: 8096, targetPort: 8096}
---
# ─────────────────────────────────────────────────────────────────────────────
# Storage Manager — the only service with ReadWriteMany storage.
#
# ALL replicas share the SAME PVC (storage-manager-pvc, ReadWriteMany).
# Every pod writes to /data/storage/hot/{sha256} on the shared filesystem.
# Pod A writes a file → Pod B immediately reads it from the same mount.
# This closes ALL 12 multi-replica gaps (no Redis location registry needed).
#
# Pod IP is injected as STORAGE_INSTANCE_URL so the Redis location registry
# points to the specific pod — used only as a fallback if the filesystem
# is replaced with S3 (STORAGE_BACKEND=s3).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-manager
  namespace: mft
spec:
  replicas: 2   # Safe to scale: all replicas share the RWX PVC
  selector:
    matchLabels: {app: storage-manager}
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # Zero downtime rolling updates
  template:
    metadata:
      labels: {app: storage-manager}
    spec:
      # Spread replicas across different nodes for availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels: {app: storage-manager}
              topologyKey: kubernetes.io/hostname
      containers:
      - name: storage-manager
        image: mft/storage-manager:latest
        imagePullPolicy: Always
        ports:
        - {containerPort: 8096}
        env:
        - {name: SERVER_PORT,    value: "8096"}
        - {name: CLUSTER_HOST,   value: storage-manager}

        # Storage backend — local uses the RWX PVC mounted below
        - {name: STORAGE_BACKEND,      value: local}   # or "s3" for MinIO/AWS S3
        - {name: STORAGE_HOT_PATH,     value: /data/storage/hot}
        - {name: STORAGE_WARM_PATH,    value: /data/storage/warm}
        - {name: STORAGE_COLD_PATH,    value: /data/storage/cold}
        - {name: STORAGE_BACKUP_PATH,  value: /data/storage/backup}

        # This pod's own URL — used by Redis location registry.
        # With RWX PVC (shared filesystem) this is a no-op because isLocal() = true.
        # Critical when STORAGE_BACKEND=s3 is NOT used and pods need cross-routing.
        - name: STORAGE_INSTANCE_URL
          value: "http://$(POD_IP):8096"
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP

        envFrom:
        - configMapRef: {name: mft-common}
        - secretRef:    {name: mft-secrets}

        # JVM: more memory for ParallelIOEngine striped I/O
        - name: JAVA_TOOL_OPTIONS
          value: >-
            -Xmx768m -Xms384m
            -XX:+UseG1GC -XX:MaxGCPauseMillis=100
            -XX:+UseStringDeduplication
            -Dspring.jmx.enabled=false

        resources:
          requests: {memory: "512Mi", cpu: "500m"}
          limits:   {memory: "1Gi",   cpu: "2000m"}

        readinessProbe:
          httpGet: {path: /actuator/health/readiness, port: 8096}
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet: {path: /actuator/health/liveness, port: 8096}
          initialDelaySeconds: 60
          periodSeconds: 30
        startupProbe:
          httpGet: {path: /actuator/health, port: 8096}
          failureThreshold: 30
          periodSeconds: 5

        # Verify the shared storage mount is writable before pod is ready
        lifecycle:
          postStart:
            exec:
              command: [sh, -c, "mkdir -p /data/storage/hot /data/storage/warm /data/storage/cold /data/storage/backup && touch /data/storage/.mft-ready"]

        volumeMounts:
        - name: storage
          mountPath: /data/storage      # ← Shared RWX PVC: all replicas see same files
        - name: spire-socket
          mountPath: /run/spire/sockets
          readOnly: true

      volumes:
      # ReadWriteMany PVC — the key to correct multi-replica operation
      - name: storage
        persistentVolumeClaim:
          claimName: storage-manager-pvc  # Defined in pvcs.yaml, accessMode: ReadWriteMany
      - name: spire-socket
        hostPath:
          path: /run/spire/sockets
          type: DirectoryOrCreate
