# HorizontalPodAutoscaler for services that benefit from auto-scaling.
# Requires metrics-server: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml

---
# onboarding-api: scales on CPU (heavy JWT auth + DB queries)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: {name: onboarding-api-hpa, namespace: mft}
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: onboarding-api}
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource: {name: cpu, target: {type: Utilization, averageUtilization: 60}}
  - type: Resource
    resource: {name: memory, target: {type: Utilization, averageUtilization: 75}}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies: [{type: Pods, value: 2, periodSeconds: 60}]
    scaleDown:
      stabilizationWindowSeconds: 300  # Don't scale down too quickly

---
# storage-manager: scales on CPU (parallel I/O threads)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: {name: storage-manager-hpa, namespace: mft}
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: storage-manager}
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource: {name: cpu, target: {type: Utilization, averageUtilization: 65}}

---
# analytics-service: scales on CPU (heavy aggregation queries)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: {name: analytics-hpa, namespace: mft}
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: analytics-service}
  minReplicas: 2
  maxReplicas: 4
  metrics:
  - type: Resource
    resource: {name: cpu, target: {type: Utilization, averageUtilization: 60}}

---
# dmz-proxy-external: scales on connection load
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: {name: dmz-proxy-external-hpa, namespace: mft}
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: dmz-proxy-external}
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource: {name: cpu, target: {type: Utilization, averageUtilization: 50}}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30   # Fast scale-up for burst traffic
      policies: [{type: Pods, value: 3, periodSeconds: 30}]
    scaleDown:
      stabilizationWindowSeconds: 600  # Slow scale-down: active connections must drain
