# ─────────────────────────────────────────────────────────────────────────────
# TEMPLATE — replace all <base64-encoded-value> with real base64 values.
#
#   echo -n 'your-actual-secret' | base64
#
# DO NOT COMMIT real secrets to git. Use:
#   - AWS Secrets Manager + External Secrets Operator
#   - HashiCorp Vault + Vault Agent Injector
#   - Sealed Secrets (Bitnami)
#   - SOPS (Mozilla)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: mft-secrets
  namespace: mft
type: Opaque
data:
  # Database
  DB_PASSWORD: <base64-encoded-postgres-password>

  # Platform JWT (min 256-bit, randomly generated)
  JWT_SECRET: <base64-encoded-jwt-secret-32-chars-min>

  # Control API key (for DMZ proxy management)
  CONTROL_API_KEY: <base64-encoded-control-api-key>

  # S3/MinIO credentials
  STORAGE_S3_ACCESS_KEY: <base64-encoded-access-key>
  STORAGE_S3_SECRET_KEY: <base64-encoded-secret-key>
  MINIO_ROOT_USER: <base64-encoded-minio-user>
  MINIO_ROOT_PASSWORD: <base64-encoded-minio-password>

  # RabbitMQ
  RABBITMQ_DEFAULT_PASS: <base64-encoded-rabbitmq-password>

  # AI / LLM (optional)
  CLAUDE_API_KEY: <base64-encoded-claude-api-key>

  # Sentinel GitHub (optional)
  SENTINEL_GITHUB_TOKEN: <base64-encoded-github-token>
