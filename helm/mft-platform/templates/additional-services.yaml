{{/* API Gateway */}}
{{- if .Values.apiGateway.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ .Release.Namespace }}
  labels: {{- include "mft.labels" . | nindent 4 }}
    app: api-gateway
spec:
  replicas: {{ .Values.apiGateway.replicaCount }}
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: "{{ .Values.global.imageRegistry }}{{ .Values.apiGateway.image.repository }}:{{ .Values.global.imageTag }}"
          ports:
            - containerPort: 80
            - containerPort: 443
          livenessProbe:
            httpGet: { path: /health, port: 80 }
            initialDelaySeconds: 5
          resources: {{- toYaml .Values.apiGateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.apiGateway.service.type }}
  ports:
    - name: http
      port: {{ .Values.apiGateway.service.httpPort }}
      targetPort: 80
    - name: https
      port: {{ .Values.apiGateway.service.httpsPort }}
      targetPort: 443
  selector:
    app: api-gateway
{{- end }}
