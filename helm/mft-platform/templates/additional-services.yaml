{{/* AI Engine */}}
{{- if .Values.aiEngine.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
  namespace: {{ .Release.Namespace }}
  labels: {{- include "mft.labels" . | nindent 4 }}
    app: ai-engine
spec:
  replicas: {{ .Values.aiEngine.replicaCount }}
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
    spec:
      containers:
        - name: ai-engine
          image: "{{ .Values.global.imageRegistry }}{{ .Values.aiEngine.image.repository }}:{{ .Values.global.imageTag }}"
          ports:
            - containerPort: 8091
          env:
            {{- include "mft.commonEnv" . | nindent 12 }}
            - name: CLUSTER_HOST
              value: "ai-engine"
            - name: SERVER_PORT
              value: "8091"
            - name: CLAUDE_API_KEY
              value: {{ .Values.aiEngine.claudeApiKey | quote }}
            - name: CLAUDE_MODEL
              value: {{ .Values.aiEngine.claudeModel | quote }}
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8091 }
            initialDelaySeconds: 30
          resources: {{- toYaml .Values.aiEngine.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: ai-engine
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.aiEngine.service.type }}
  ports:
    - port: {{ .Values.aiEngine.service.port }}
      targetPort: 8091
  selector:
    app: ai-engine
{{- end }}

