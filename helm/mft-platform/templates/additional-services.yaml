{{/* Keystore Manager */}}
{{- if .Values.keystoreManager.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keystore-manager
  namespace: {{ .Release.Namespace }}
  labels: {{- include "mft.labels" . | nindent 4 }}
    app: keystore-manager
spec:
  replicas: {{ .Values.keystoreManager.replicaCount }}
  selector:
    matchLabels:
      app: keystore-manager
  template:
    metadata:
      labels:
        app: keystore-manager
    spec:
      containers:
        - name: keystore-manager
          image: "{{ .Values.global.imageRegistry }}{{ .Values.keystoreManager.image.repository }}:{{ .Values.global.imageTag }}"
          ports:
            - containerPort: 8093
          env:
            {{- include "mft.commonEnv" . | nindent 12 }}
            - name: CLUSTER_HOST
              value: "keystore-manager"
            - name: SERVER_PORT
              value: "8093"
            - name: KEYSTORE_MASTER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mft-secrets
                  key: keystore-master-password
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8093 }
            initialDelaySeconds: 20
          resources: {{- toYaml .Values.keystoreManager.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: keystore-manager
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.keystoreManager.service.type }}
  ports:
    - port: {{ .Values.keystoreManager.service.port }}
      targetPort: 8093
  selector:
    app: keystore-manager
{{- end }}

{{/* Storage Manager */}}
{{- if .Values.storageManager.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-manager
  namespace: {{ .Release.Namespace }}
  labels: {{- include "mft.labels" . | nindent 4 }}
    app: storage-manager
spec:
  replicas: {{ .Values.storageManager.replicaCount }}
  selector:
    matchLabels:
      app: storage-manager
  template:
    metadata:
      labels:
        app: storage-manager
    spec:
      containers:
        - name: storage-manager
          image: "{{ .Values.global.imageRegistry }}{{ .Values.storageManager.image.repository }}:{{ .Values.global.imageTag }}"
          ports:
            - containerPort: 8094
          env:
            {{- include "mft.commonEnv" . | nindent 12 }}
            - name: CLUSTER_HOST
              value: "storage-manager"
            - name: SERVER_PORT
              value: "8094"
            - name: STORAGE_HOT_PATH
              value: "/data/storage/hot"
            - name: STORAGE_WARM_PATH
              value: "/data/storage/warm"
            - name: STORAGE_COLD_PATH
              value: "/data/storage/cold"
          {{- if .Values.storageManager.persistence.enabled }}
          volumeMounts:
            - name: storage-data
              mountPath: /data/storage
          {{- end }}
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8094 }
            initialDelaySeconds: 20
          resources: {{- toYaml .Values.storageManager.resources | nindent 12 }}
      {{- if .Values.storageManager.persistence.enabled }}
      volumes:
        - name: storage-data
          persistentVolumeClaim:
            claimName: storage-manager-pvc
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: storage-manager
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.storageManager.service.type }}
  ports:
    - port: {{ .Values.storageManager.service.port }}
      targetPort: 8094
  selector:
    app: storage-manager
{{- if .Values.storageManager.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: storage-manager-pvc
  namespace: {{ .Release.Namespace }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.storageManager.persistence.storageClass }}
  storageClassName: {{ .Values.storageManager.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.storageManager.persistence.size }}
{{- end }}
{{- end }}

