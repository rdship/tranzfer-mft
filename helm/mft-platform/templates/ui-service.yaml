{{- if .Values.uiService.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-service
  namespace: {{ .Release.Namespace }}
  labels: {{- include "mft.labels" . | nindent 4 }}
    app: ui-service
spec:
  replicas: {{ .Values.uiService.replicaCount }}
  selector:
    matchLabels:
      app: ui-service
  template:
    metadata:
      labels:
        app: ui-service
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: ui-service
          image: "{{ .Values.global.imageRegistry }}{{ .Values.uiService.image.repository }}:{{ .Values.global.imageTag }}"
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ui-service
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.uiService.service.type }}
  ports:
    - port: {{ .Values.uiService.service.port }}
      targetPort: 80
  selector:
    app: ui-service
{{- end }}

