{{/* FTP Service */}}
{{- if .Values.ftpService.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ftp-service
  namespace: {{ .Release.Namespace }}
  labels: {{- include "mft.labels" . | nindent 4 }}
    app: ftp-service
spec:
  replicas: {{ .Values.ftpService.replicaCount }}
  selector:
    matchLabels:
      app: ftp-service
  template:
    metadata:
      labels:
        app: ftp-service
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: ftp-service
          image: "{{ .Values.global.imageRegistry }}{{ .Values.ftpService.image.repository }}:{{ .Values.global.imageTag }}"
          ports:
            - containerPort: 2121
              name: ftp
            - containerPort: 8082
              name: control
          env:
            {{- include "mft.commonEnv" . | nindent 12 }}
            - name: CLUSTER_HOST
              value: "ftp-service"
            - name: SERVER_PORT
              value: "8082"
            - name: FTP_PORT
              value: "2121"
            - name: FTP_PUBLIC_HOST
              value: {{ .Values.ftpService.ftpPublicHost | quote }}
          {{- if .Values.ftpService.persistence.enabled }}
          volumeMounts:
            - name: ftp-data
              mountPath: /data/ftp
          {{- end }}
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
          resources: {{- toYaml .Values.ftpService.resources | nindent 12 }}
      {{- if .Values.ftpService.persistence.enabled }}
      volumes:
        - name: ftp-data
          persistentVolumeClaim:
            claimName: ftp-data-pvc
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: ftp-service
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.ftpService.service.type }}
  ports:
    - port: {{ .Values.ftpService.service.ftpPort }}
      targetPort: 2121
      name: ftp
    - port: {{ .Values.ftpService.service.controlPort }}
      targetPort: 8082
      name: control
  selector:
    app: ftp-service
{{- if .Values.ftpService.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ftp-data-pvc
  namespace: {{ .Release.Namespace }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.ftpService.persistence.size }}
{{- end }}
{{- end }}

