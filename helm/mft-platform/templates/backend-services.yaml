{{/* DMZ Proxy */}}
{{- if .Values.dmzProxy.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dmz-proxy
  namespace: {{ .Release.Namespace }}
  labels: {{- include "mft.labels" . | nindent 4 }}
    app: dmz-proxy
spec:
  replicas: {{ .Values.dmzProxy.replicaCount }}
  selector:
    matchLabels:
      app: dmz-proxy
  template:
    metadata:
      labels:
        app: dmz-proxy
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: dmz-proxy
          image: "{{ .Values.global.imageRegistry }}{{ .Values.dmzProxy.image.repository }}:{{ .Values.global.imageTag }}"
          ports:
            - containerPort: 8088
              name: management
            - containerPort: 32222
              name: sftp
            - containerPort: 32121
              name: ftp
            - containerPort: 4443
              name: https
          env:
            - name: SERVER_PORT
              value: "8088"
            - name: CONTROL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mft-secrets
                  key: control-api-key
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8088
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8088
            initialDelaySeconds: 30
            periodSeconds: 10
          resources: {{- toYaml .Values.dmzProxy.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: dmz-proxy
  namespace: {{ .Release.Namespace }}
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  type: {{ .Values.dmzProxy.service.type }}
  ports:
    - port: {{ .Values.dmzProxy.service.managementPort }}
      targetPort: 8088
      name: management
    - port: {{ .Values.dmzProxy.service.sftpPort }}
      targetPort: 32222
      name: sftp
    - port: {{ .Values.dmzProxy.service.ftpPort }}
      targetPort: 32121
      name: ftp
    - port: {{ .Values.dmzProxy.service.httpsPort }}
      targetPort: 4443
      name: https
  selector:
    app: dmz-proxy
{{- end }}

