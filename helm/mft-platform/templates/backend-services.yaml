    matchLabels:
      app: config-service
  template:
    metadata:
      labels:
        app: config-service
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: config-service
          image: "{{ .Values.global.imageRegistry }}{{ .Values.configService.image.repository }}:{{ .Values.global.imageTag }}"
          ports:
            - containerPort: 8084
          env:
            {{- include "mft.commonEnv" . | nindent 12 }}
            - name: CLUSTER_HOST
              value: "config-service"
            - name: SERVER_PORT
              value: "8084"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
          resources: {{- toYaml .Values.configService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: config-service
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.configService.service.type }}
  ports:
    - port: {{ .Values.configService.service.port }}
      targetPort: 8084
  selector:
    app: config-service
{{- if .Values.configService.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: config-service-hpa
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: config-service
  minReplicas: {{ .Values.configService.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.configService.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.configService.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}

