# =============================================================================
# TranzFer MFT Platform — Helm Values
# =============================================================================

global:
  # Image registry override (leave empty for DockerHub)
  imageRegistry: ""
  imageTag: "2.0.0"
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

  # Branding
  platformName: "TranzFer MFT"

  # Security — MUST be overridden in production (e.g., via values-production.yaml or --set)
  # WARNING: Deployment will use insecure defaults if these are not changed!
  jwtSecret: "CHANGE_ME_REQUIRED"
  controlApiKey: "CHANGE_ME_REQUIRED"
  licenseAdminKey: "CHANGE_ME_REQUIRED"

  # Cluster
  clusterId: "cluster-1"

  # External services (override if using managed DBs)
  postgresql:
    enabled: true        # set false to use external
    host: "postgresql"
    port: 5432
    database: "filetransfer"
    username: "postgres"
    # WARNING: Override this password in production — never use the default!
    password: "CHANGE_ME_REQUIRED"

  rabbitmq:
    enabled: true
    host: "rabbitmq"
    port: 5672
    username: "guest"
    # WARNING: Override this password in production — never use the default!
    password: "CHANGE_ME_REQUIRED"

  kafka:
    enabled: false
    bootstrapServers: "kafka:9092"

# =============================================================================
# Infrastructure
# =============================================================================
postgresql:
  enabled: true
  auth:
    database: filetransfer
    username: postgres
    # WARNING: Override this password in production!
    password: "CHANGE_ME_REQUIRED"
  primary:
    persistence:
      enabled: true
      size: 20Gi

rabbitmq:
  enabled: true
  auth:
    username: guest
    # WARNING: Override this password in production!
    password: "CHANGE_ME_REQUIRED"
  persistence:
    enabled: true
    size: 5Gi

# =============================================================================
# Microservices
# =============================================================================

onboardingApi:
  enabled: true
  replicaCount: 2
  image:
    repository: mft/onboarding-api
    tag: ""  # defaults to global.imageTag
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: 1, memory: 1Gi }
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

sftpService:
  enabled: true
  replicaCount: 1
  image:
    repository: mft/sftp-service
  service:
    type: LoadBalancer
    sftpPort: 2222
    controlPort: 8081
  persistence:
    enabled: true
    size: 50Gi
    storageClass: ""
  resources:
    requests: { cpu: 500m, memory: 512Mi }
    limits: { cpu: 2, memory: 2Gi }
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60

ftpService:
  enabled: true
  replicaCount: 1
  image:
    repository: mft/ftp-service
  service:
    type: LoadBalancer
    ftpPort: 21
    controlPort: 8082
  ftpPublicHost: ""   # set to LoadBalancer external IP
  persistence:
    enabled: true
    size: 50Gi
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: 1, memory: 1Gi }

ftpWebService:
  enabled: true
  replicaCount: 2
  image:
    repository: mft/ftp-web-service
  service:
    type: ClusterIP
    port: 8083
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: 1, memory: 1Gi }

configService:
  enabled: true
  replicaCount: 2
  image:
    repository: mft/config-service
  service:
    type: ClusterIP
    port: 8084
  resources:
    requests: { cpu: 250m, memory: 256Mi }
    limits: { cpu: 500m, memory: 512Mi }
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

gatewayService:
  enabled: true
  replicaCount: 2
  image:
    repository: mft/gateway-service
  service:
    type: LoadBalancer
    sftpGatewayPort: 2220
    ftpGatewayPort: 2121
    controlPort: 8085
  resources:
    requests: { cpu: 500m, memory: 512Mi }
    limits: { cpu: 2, memory: 2Gi }
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 60

encryptionService:
  enabled: true
  replicaCount: 2
  image:
    repository: mft/encryption-service
  service:
    type: ClusterIP
    port: 8086
  # WARNING: Override this 64-hex-char key in production!
  encryptionMasterKey: "CHANGE_ME_REQUIRED"
  resources:
    requests: { cpu: 500m, memory: 512Mi }
    limits: { cpu: 2, memory: 2Gi }
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

externalForwarderService:
  enabled: true
  replicaCount: 2
  image:
    repository: mft/external-forwarder-service
  service:
    type: ClusterIP
    port: 8087
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: 1, memory: 1Gi }
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

dmzProxy:
  enabled: true
  replicaCount: 1
  image:
    repository: mft/dmz-proxy
  service:
    type: LoadBalancer
    managementPort: 8088
    sftpPort: 32222
    ftpPort: 32121
    httpsPort: 4443
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 256Mi }

licenseService:
  enabled: true
  replicaCount: 1
  image:
    repository: mft/license-service
  service:
    type: ClusterIP
    port: 8089
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 500m, memory: 512Mi }

analyticsService:
  enabled: true
  replicaCount: 2
  image:
    repository: mft/analytics-service
  service:
    type: ClusterIP
    port: 8090
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: 1, memory: 1Gi }

as2Service:
  enabled: true
  replicaCount: 1
  image:
    repository: mft/as2-service
  service:
    type: ClusterIP
    port: 8094
  persistence:
    enabled: true
    size: 20Gi
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: 1, memory: 1Gi }

aiEngine:
  enabled: true
  replicaCount: 2
  image:
    repository: mft/ai-engine
  service:
    type: ClusterIP
    port: 8091
  claudeApiKey: ""
  claudeModel: "claude-sonnet-4-20250514"
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: 1, memory: 1Gi }

screeningService:
  enabled: true
  replicaCount: 2
  image:
    repository: mft/screening-service
  service:
    type: ClusterIP
    port: 8092
  screeningThreshold: "0.82"
  defaultAction: "BLOCK"
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: 1, memory: 1Gi }

keystoreManager:
  enabled: true
  replicaCount: 1
  image:
    repository: mft/keystore-manager
  service:
    type: ClusterIP
    port: 8093
  # WARNING: Override this password in production!
  masterPassword: "CHANGE_ME_REQUIRED"
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 500m, memory: 512Mi }

storageManager:
  enabled: true
  replicaCount: 1
  image:
    repository: mft/storage-manager
  service:
    type: ClusterIP
    port: 8094
  persistence:
    enabled: true
    size: 100Gi
    storageClass: ""
  resources:
    requests: { cpu: 500m, memory: 512Mi }
    limits: { cpu: 2, memory: 2Gi }

ediConverter:
  enabled: true
  replicaCount: 1
  image:
    repository: mft/edi-converter
  service:
    type: ClusterIP
    port: 8095
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 500m, memory: 512Mi }

# =============================================================================
# Frontend UIs
# =============================================================================
partnerPortal:
  enabled: true
  replicaCount: 2
  image:
    repository: mft/partner-portal
  service:
    type: ClusterIP
    port: 80

uiService:
  enabled: true
  replicaCount: 2
  image:
    repository: mft/ui-service
  service:
    type: ClusterIP
    port: 80

ftpWebUi:
  enabled: true
  replicaCount: 2
  image:
    repository: mft/ftp-web-ui
  service:
    type: ClusterIP
    port: 80

apiGateway:
  enabled: true
  replicaCount: 2
  image:
    repository: mft/api-gateway
  service:
    type: LoadBalancer
    httpPort: 80
    httpsPort: 443
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 256Mi }

# =============================================================================
# Ingress
# =============================================================================
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "512m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    admin: admin.mft.example.com
    portal: portal.mft.example.com
    api: api.mft.example.com
  tls:
    enabled: false
    secretName: mft-tls

# =============================================================================
# Monitoring (Prometheus + Grafana)
# =============================================================================
monitoring:
  enabled: false
  prometheus:
    scrapeInterval: 30s
  grafana:
    enabled: false
    # WARNING: Override this password in production!
    adminPassword: "CHANGE_ME_REQUIRED"

# =============================================================================
# Observability (Loki + Promtail + Grafana + AlertManager)
# =============================================================================
observability:
  enabled: false
  loki:
    tag: "2.9.0"
    retentionPeriod: "720h"   # 30 days
    persistence:
      enabled: true
      size: 10Gi
      storageClass: ""
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 500m, memory: 512Mi }
  promtail:
    tag: "2.9.0"
    resources:
      requests: { cpu: 50m, memory: 64Mi }
      limits: { cpu: 200m, memory: 128Mi }
  grafana:
    enabled: true
    tag: "10.4.0"
    # WARNING: Override this password in production!
    adminPassword: "CHANGE_ME_REQUIRED"
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits: { cpu: 500m, memory: 512Mi }
  alertmanager:
    enabled: true
    tag: "v0.27.0"
    webhookUrl: ""

# =============================================================================
# OpenTelemetry
# =============================================================================
otel:
  enabled: false
  endpoint: "https://otel-collector:4318"
  serviceName: "mft-platform"
