# Use Docker's embedded DNS (127.0.0.11) so proxy_pass hostnames are
# resolved at REQUEST time, not at nginx startup. Without this, nginx
# boots before the Spring services appear in Docker DNS and dies with
# `host not found in upstream`. That was the R25-era "UI never opened"
# bug — the ui-service container was in a crash loop.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    # Listen on 8080 instead of 80 — the container runs nginx as the
    # non-root `appuser`, and on Linux non-root users cannot bind to
    # ports below 1024 (CAP_NET_BIND_SERVICE is not granted to added
    # users by default). Container port 8080 is then published to host
    # port 3000 via docker-compose, keeping the user-facing URL unchanged.
    listen 8080;
    listen 8443 ssl;
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Health probe — used by Docker healthcheck. Returns 200 from nginx
    # itself with no upstream dependency, so the container reports healthy
    # even when backends are still booting. Without this, the `/` path
    # hits proxy_pass which returns 502 when the upstream isn't ready,
    # and Docker marks the container unhealthy forever (BUG-F).
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy to backend services. The `set $upstream ...` +
    # `proxy_pass http://$upstream/` idiom forces nginx to use the
    # runtime resolver (above) so a missing upstream produces a 502
    # PER REQUEST instead of a nginx start-up failure. R26 fix.
    location /api-onboarding/ {
        set $upstream_onboarding onboarding-api:8080;
        proxy_pass http://$upstream_onboarding/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api-config/ {
        set $upstream_config config-service:8084;
        proxy_pass http://$upstream_config/;
        proxy_set_header Host $host;
    }
    location /api-analytics/ {
        set $upstream_analytics analytics-service:8090;
        proxy_pass http://$upstream_analytics/;
        proxy_set_header Host $host;
    }
    location /api-license/ {
        set $upstream_license license-service:8089;
        proxy_pass http://$upstream_license/;
        proxy_set_header Host $host;
    }
    location /api-gateway/ {
        set $upstream_gateway gateway-service:8085;
        proxy_pass http://$upstream_gateway/;
        proxy_set_header Host $host;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
