# version: removed (obsolete since Docker Compose V2 — BUG-H)

# =============================================================================
# TranzFer MFT Platform — Docker Compose (Development)
# =============================================================================

x-spiffe-env: &spiffe-env
  SPIFFE_ENABLED: ${SPIFFE_ENABLED:-true}
  SPIFFE_TRUST_DOMAIN: ${SPIFFE_TRUST_DOMAIN:-filetransfer.io}
  SPIFFE_SOCKET: unix:/run/spire/sockets/agent.sock

x-spiffe-volume: &spiffe-volume
  - spire-socket:/run/spire/sockets:ro

x-common-env: &common-env
  # R101: SPIFFE env vars live here (not on the standalone &spiffe-env
  # anchor) so every service that merges <<: *common-env automatically
  # picks them up. Before R101 the &spiffe-env anchor was defined but
  # only applied to edi-converter — SPIFFE was effectively off on 17
  # of 18 Java services, contrary to the CLAUDE.md spec ("SPIFFE is
  # REQUIRED. Default ON"). Symptom the tester measured: onboarding-api
  # → DMZ proxy DELETE calls returned 401 because BaseServiceClient had
  # no SpiffeWorkloadClient bean to attach a JWT-SVID with. Fixed by
  # moving SPIFFE into common-env so the default-on semantics actually
  # reach every service.
  SPIFFE_ENABLED: ${SPIFFE_ENABLED:-true}
  SPIFFE_TRUST_DOMAIN: ${SPIFFE_TRUST_DOMAIN:-filetransfer.io}
  SPIFFE_SOCKET: unix:/run/spire/sockets/agent.sock
  # R108 (2026-04-18): Spring AOT re-enabled by default.
  #
  # Timeline:
  #   R95   — enabled (first attempt) — crashed 5 services (RolePermissionRepository).
  #   R98   — reverted to unblock platform.
  #   R99   — fixed @EnableJpaRepositories / @EntityScan on encryption, keystore,
  #           license, storage-manager (ai-engine already had it).
  #   R102  — added @EnableAsync(proxyTargetClass=true) for AgentRegistrar @Async
  #           @EventListener JDK-proxy issue surfaced in R97 AOT attempt.
  #   R100  — CI gate (aot-parity-check.sh) boots every service with AOT on and
  #           off; regression fails the pipeline before merge.
  #   R104  — java-spiffe-provider classpath gap closed (was blocking all SPIFFE
  #           services from starting regardless of AOT state).
  #
  # All five blockers the tester flagged are now closed; re-enabling reclaims
  # the ~20-30 s/service cold-boot savings R97 measured. Override at runtime
  # with AOT_ENABLED=false if a specific incident needs the reflection-mode
  # fallback without a rebuild.
  # R125: JFR removed from the default boot path. R124 enabled it with
  # settings=profile across every service, which added ~137 s to cold boot
  # (verified in the R124 PROPER acceptance). StartupTimingListener +
  # BootPhaseDumpCollector already give us per-phase timing + thread dumps at
  # near-zero cost; a heavyweight JFR profile is only worth paying for on a
  # targeted diagnostic cycle, not every boot.
  #
  # Opt-in for a one-off diagnostic run:
  #   BOOT_JFR_FLAG='-XX:StartFlightRecording=duration=300s,filename=/tmp/boot-jfr.jfr,settings=default,dumponexit=true' \
  #     docker compose up -d --force-recreate <service>
  #
  # (Use settings=default, not settings=profile — profile is method-level
  # instrumentation and is what caused the boot regression in R124.)
  JAVA_TOOL_OPTIONS: >-
    -Xmx384m -Xms192m
    -XX:+UseG1GC -XX:MaxGCPauseMillis=100
    -XX:ActiveProcessorCount=2
    -XX:MaxMetaspaceSize=384m
    -XX:+HeapDumpOnOutOfMemoryError
    -XX:HeapDumpPath=/tmp/heapdump-%p.hprof
    ${BOOT_JFR_FLAG:- }
    -Dnet.bytebuddy.experimental=true
    -Dspring.jmx.enabled=false
    -Dspring.aot.enabled=${AOT_ENABLED:-true}
    -Dserver.tomcat.accept-count=200
    -Dserver.tomcat.threads.max=300
    -Dspring.jpa.hibernate.ddl-auto=none
    -Dspring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
    -Dspring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
    -Dspring.jpa.properties.hibernate.default_batch_fetch_size=20
    -Dspring.jpa.open-in-view=false
    -Dspring.flyway.enabled=false
    -Dspring.datasource.hikari.initialization-fail-timeout=-1
    -Dspring.rabbitmq.connection-timeout=3000
    -Dspring.kafka.admin.properties.request.timeout.ms=5000
    -Dspring.kafka.consumer.properties.default.api.timeout.ms=5000
    -Dspring.kafka.properties.reconnect.backoff.max.ms=5000
    -Dmanagement.metrics.data.repository.autotime.enabled=true
    -Dspring.data.jpa.repositories.bootstrap-mode=lazy
  PLATFORM_RATE_LIMIT_DEFAULT_LIMIT: 10000
  DATABASE_URL: jdbc:postgresql://postgres:5432/filetransfer?stringtype=unspecified
  DB_USERNAME: postgres
  DB_PASSWORD: postgres
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: 5672
  PLATFORM_DEFAULT_STORAGE_MODE: ${PLATFORM_DEFAULT_STORAGE_MODE:-VIRTUAL}
  PLATFORM_TLS_ENABLED: ${PLATFORM_TLS_ENABLED:-true}
  # Rate-limit backend. `pg` is the default (V95 rate_limit_buckets);
  # `memory` for single-instance fallback. Redis backend retired at R134AH
  # and the container itself removed at R134AJ.
  PLATFORM_RATE_LIMIT_BACKEND: ${PLATFORM_RATE_LIMIT_BACKEND:-pg}
  SPRING_FLYWAY_LOCK_RETRY_COUNT: 200
  # Fast boot: Flyway owns schema, Hibernate skips DB round trips on startup.
  # SchemaHealthIndicator validates in background 30s after boot.
  # Fast boot: double-underscore bug fixed — single underscore for relaxed binding
  SPRING_JPA_HIBERNATE_DDLAUTO: none
  SPRING_JPA_PROPERTIES_HIBERNATE_BOOT_ALLOWJDBCMETADATAACCESS: "false"
  SPRING_JPA_PROPERTIES_HIBERNATE_TEMP_USEJDBCMETADATADEFAULTS: "false"
  JWT_SECRET: ${JWT_SECRET:-change_me_in_production_256bit_secret_key!!}
  JWT_EXPIRATION: ${JWT_EXPIRATION:-28800000}
  CONTROL_API_KEY: ${CONTROL_API_KEY:-internal_control_secret}  # HMAC secret for PCI audit log signing — NOT inter-service auth
  CLUSTER_ID: ${CLUSTER_ID:-cluster-1}
  CLUSTER_COMM_MODE: ${CLUSTER_COMM_MODE:-WITHIN_CLUSTER}
  TRACK_ID_PREFIX: ${TRACK_ID_PREFIX:-TRZ}
  PLATFORM_VERSION: "1.0.0-R134AK"
  PLATFORM_BUILD_TIMESTAMP: "2026-04-23T08:00:00Z"
  PLATFORM_ENVIRONMENT: ${PLATFORM_ENVIRONMENT:-DEV}
  PROXY_ENABLED: ${PROXY_ENABLED:-false}
  PROXY_TYPE: ${PROXY_TYPE:-HTTP}
  PROXY_HOST: ${PROXY_HOST:-dmz-proxy}
  PROXY_PORT: ${PROXY_PORT:-8088}
  PROXY_NO_PROXY_HOSTS: ${PROXY_NO_PROXY_HOSTS:-localhost,127.0.0.1,postgres,rabbitmq}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,https://localhost,http://localhost:3000,http://localhost:3001,http://localhost:3002,https://localhost:443}
  SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
  FABRIC_ENABLED: "true"
  FABRIC_BROKER_URL: redpanda:9092
  # Phase 1 pipeline optimizations — only set on routing services (per-service env below)
  # FLOW_RULES_ENABLED, PIPELINE_CACHE_PARTNER_ENABLED, PIPELINE_RECORDS_BATCHWRITE
  # moved from global to per-service to allow lightweight services to skip routing beans
  # Phase 2 concurrency unlocking — SEDA stages + RabbitMQ consumers
  UPLOAD_CONSUMER_PREFETCH: "10"
  UPLOAD_CONSUMER_CONCURRENCY: "4-16"
  FLOW_STAGE_INTAKE_QUEUE: "5000"
  FLOW_STAGE_INTAKE_THREADS: "64"
  FLOW_STAGE_PIPELINE_QUEUE: "2000"
  FLOW_STAGE_PIPELINE_THREADS: "128"
  FLOW_STAGE_DELIVERY_QUEUE: "5000"
  FLOW_STAGE_DELIVERY_THREADS: "64"
  FLOW_STEPPIPELINE_PREFETCH: "5"
  FLOW_STEPPIPELINE_CONCURRENCY_MIN: "4"
  FLOW_STEPPIPELINE_CONCURRENCY_MAX: "16"
  KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
  SPRING_KAFKA_BOOTSTRAPSERVERS: redpanda:9092

# Routing pipeline flags — only for services that process file transfers.
# Lightweight services (encryption, license, keystore, storage, screening,
# analytics, notification) do NOT set these → routing beans don't load →
# fewer entities/repos scanned → faster boot.
x-routing-env: &routing-env
  FLOW_RULES_ENABLED: "true"
  PIPELINE_CACHE_PARTNER_ENABLED: "true"
  PIPELINE_RECORDS_BATCHWRITE: "true"
  PLATFORM_CONNECTORS_ENABLED: "true"

x-service-healthcheck: &healthcheck
  # Java Spring services typically need 45-90s to finish Flyway migrations,
  # Hibernate entity scan, and Kafka/RabbitMQ wiring on a cold boot. During
  # `start_period`, Docker ignores failing healthchecks (they can still
  # succeed to mark the container healthy early — the window is only an
  # upper bound). Before R26 this was 30s, which meant on cold boot the
  # container was marked unhealthy for a moment and dependent services
  # with `condition: service_healthy` could never start. 90s gives
  # V42 index builds room to finish.
  #
  # R28 (BUG-B): `restart: unless-stopped` so a transient Flyway or
  # startup failure retries instead of cascading death to 22 services.
  # This is the single most impactful change for cold-boot resilience:
  # instead of one Flyway hiccup = entire stack dead, the failed service
  # restarts 2-3 times and usually succeeds on the second attempt (after
  # the Flyway advisory lock is released by the first run's exit).
  restart: unless-stopped
  deploy:
    resources:
      limits:
        cpus: "1.5"
        memory: 896M
      reservations:
        cpus: "0.25"
        memory: 384M
  healthcheck:
    test: ["CMD-SHELL", "curl -sf http://localhost:$${SERVER_PORT:-8080}/actuator/health/liveness || curl -sf http://localhost:$${SERVER_PORT:-8080}/actuator/health || exit 1"]
    interval: 10s
    timeout: 5s
    retries: 8
    start_period: 600s

services:
  # ---------------------------------------------------------------------------
  # SPIFFE/SPIRE — Zero-Trust Workload Identity (REQUIRED)
  # Provides short-lived JWT-SVIDs for all service-to-service auth.
  # X-Internal-Key has been removed — SPIFFE is the only inter-service
  # auth mechanism. Services self-heal if SPIRE is not yet bootstrapped
  # (SpiffeWorkloadClient retries every 15s until the agent is available).
  #
  # Fresh install: just run `docker compose up -d` — spire-init container
  # auto-generates token and registers all services. No manual step needed.
  #
  # Subsequent restarts: docker compose up -d (bootstrap data persists in volumes)
  # Production / Kubernetes: use Red Hat SPIRE Operator (no static join tokens)
  # ---------------------------------------------------------------------------
  spire-server:
    image: ghcr.io/spiffe/spire-server:1.9.6
    container_name: mft-spire-server
    volumes:
      - ./spire/server:/opt/spire/conf/server:ro
      - spire-server-data:/opt/spire/data
      - spire-server-sock:/tmp/spire-server
    command: ["-config", "/opt/spire/conf/server/server.conf"]
    healthcheck:
      test: ["CMD", "/opt/spire/bin/spire-server", "healthcheck", "-socketPath", "/tmp/spire-server/private/api.sock"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s
    networks:
      - mft-network

  # Auto-bootstrap: generates join token + registers all services.
  # Runs once then exits. No manual `bash bootstrap.sh` needed.
  spire-init:
    build:
      context: ./spire
      dockerfile: Dockerfile.init
    container_name: mft-spire-init
    depends_on:
      spire-server:
        condition: service_healthy
    volumes:
      - ./spire/auto-bootstrap.sh:/opt/spire/auto-bootstrap.sh:ro
      - spire-server-sock:/tmp/spire-server:ro
      - spire-init-data:/tmp/spire-init
    entrypoint: ["/bin/bash", "/opt/spire/auto-bootstrap.sh"]
    restart: "no"
    networks:
      - mft-network

  spire-agent:
    build:
      context: ./spire
      dockerfile: Dockerfile.agent
    container_name: mft-spire-agent
    # R115: pid:host lets the Docker WorkloadAttestor resolve connecting
    # container PIDs correctly on Docker Desktop's LinuxKit VM. Without it,
    # the agent sees PIDs from SO_PEERCRED that belong to the host namespace
    # but can't `/proc/<pid>/cgroup` them (different PID namespace) — SPIRE
    # logs "could not resolve caller information" and closes the Workload
    # API connection with UNAVAILABLE. This is also the SPIRE-documented
    # standard deployment shape for Docker hosts.
    pid: "host"
    depends_on:
      spire-server:
        condition: service_healthy
      spire-init:
        condition: service_completed_successfully
    volumes:
      - ./spire/agent:/opt/spire/conf/agent:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - spire-socket:/run/spire/sockets
      - spire-server-sock:/tmp/spire-server:ro
      - spire-init-data:/tmp/spire-init:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Reading join token from spire-init..."
        until [ -f /tmp/spire-init/join-token ]; do sleep 2; done
        TOKEN=$(cat /tmp/spire-init/join-token)
        exec /opt/spire/bin/spire-agent run \
          -config /opt/spire/conf/agent/agent.conf \
          -joinToken "$$TOKEN"
    healthcheck:
      test: ["CMD", "/opt/spire/bin/spire-agent", "healthcheck", "-socketPath", "/run/spire/sockets/agent.sock"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - mft-network

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: mft-postgres
    environment:
      POSTGRES_DB: filetransfer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # Tuned Postgres 16 config — R23 audit.
    #
    # R25 note: we switched from `-c name=value` CLI flags to a mounted
    # config file. CLI flags are the highest-priority source in Postgres
    # and silently override postgresql.auto.conf at runtime, which meant
    # ALTER SYSTEM (and the Database Advisory "apply" action) would
    # appear to succeed but never actually take effect. Using a mounted
    # config file fixes that: on pg_reload_conf() the values in
    # postgresql.auto.conf win over the file's defaults, so admins can
    # hot-tune the running database from the UI.
    #
    # Full rationale per setting: config/postgres/postgresql.tuned.conf
    # Full DBA guide:              docs/operations/DATABASE-TUNING.md
    # Published as JSON at:        GET /api/v1/db-advisory on onboarding-api
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.tuned.conf
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount the tuned config read-only — single source of truth.
      # Also mirrored in k8s/infra/postgres.yaml as args (k8s doesn't
      # have a comparable bind-mount story for a single file).
      - ./config/postgres/postgresql.tuned.conf:/etc/postgresql/postgresql.tuned.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # R134AJ — `redis` service retired. All data-plane consumers migrated
  # (R134AC: VFS lock → storage-coord + pg_advisory; R134AG: storage
  # location registry + proxy group registrar deleted; R134AH: rate-limit
  # → PG `rate_limit_buckets`, ActivityMonitor → local AtomicInteger,
  # ProxyGroupService scan deleted; R134AI: cluster JOIN/LEAVE fanout →
  # RabbitMQ `platform.cluster.events` exchange). See
  # docs/rd/2026-04-R134-external-dep-retirement/01-redis-retirement.md
  # for the full per-consumer migration history.

  # R134u — replaces the old `vault-init` container (and removes `vault` entirely).
  # Only job: generate a single platform-wide TLS keystore on first boot and
  # cache it in the `platform_tls` volume for all services to mount read-only.
  # No Vault. No HashiCorp container. No profile gate — TLS is always on, so
  # the generator must always run. Idempotent: re-runs are no-ops when the
  # .p12 already exists.
  tls-init:
    image: alpine:3.19
    container_name: mft-tls-init
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -f /tls/platform-tls.p12 ]; then
          echo "[tls-init] Platform TLS cert already present — nothing to do"
          exit 0
        fi
        echo "[tls-init] Generating platform-wide TLS certificate..."
        apk add --no-cache openssl > /dev/null 2>&1
        openssl req -x509 -nodes -days 365 \
          -newkey rsa:2048 \
          -keyout /tls/platform-tls.key \
          -out /tls/platform-tls.crt \
          -subj "/CN=*.filetransfer.local/O=TranzFer MFT/C=US" \
          -addext "subjectAltName=DNS:*.filetransfer.local,DNS:localhost,DNS:onboarding-api,DNS:config-service,DNS:sftp-service,DNS:ftp-service,DNS:gateway-service,DNS:encryption-service,DNS:screening-service,DNS:ai-engine,DNS:keystore-manager,DNS:storage-manager,DNS:platform-sentinel,DNS:edi-converter,DNS:license-service,DNS:analytics-service,DNS:notification-service,DNS:as2-service,DNS:dmz-proxy,DNS:external-forwarder-service,DNS:ftp-web-service,DNS:api-gateway,IP:127.0.0.1" \
          2>/dev/null
        openssl pkcs12 -export \
          -in /tls/platform-tls.crt \
          -inkey /tls/platform-tls.key \
          -out /tls/platform-tls.p12 \
          -name platform-tls \
          -password pass:changeit \
          2>/dev/null
        chmod 644 /tls/platform-tls.*
        echo "[tls-init] Platform TLS cert generated: CN=*.filetransfer.local, valid=365d"
    restart: "no"
    volumes:
      - platform_tls:/tls
    networks:
      - mft-network

  # ── Database Migration Init (runs ALL Flyway migrations once, before services boot) ──
  # Services have spring.flyway.enabled=false — this container handles it centrally.
  # Eliminates 40-60s per service (20 services × 50 migrations each = 1000 redundant scans).
  db-migrate:
    build: ./onboarding-api
    container_name: mft-db-migrate
    # Merge &common-env so SecretSafetyValidator sees the same dev-mode
    # JWT_SECRET / POSTGRES_PASSWORD / PLATFORM_ENVIRONMENT overrides every
    # other runtime service gets. Without this, the validator resolves env
    # to PROD, sees default secrets, and blocks startup — which kept
    # db-migrate in exit-1 even after the ConnectorDispatcher DI fix.
    environment:
      <<: *common-env
      # R134E — force AOT off for this one-shot container. The common-env
      # JAVA_TOOL_OPTIONS substitutes `${AOT_ENABLED:-true}` at compose PARSE
      # time from the host env, so an in-container env override of
      # AOT_ENABLED has no effect — the interpolation is already resolved.
      # Override JAVA_TOOL_OPTIONS outright here with AOT disabled so runtime
      # `SPRING_AUTOCONFIGURE_EXCLUDE` can actually exclude WebMvc/Security
      # beans. (AOT freezes the bean graph at build time, so the runtime
      # exclusion can't remove already-registered AOT BeanDefinitions.)
      JAVA_TOOL_OPTIONS: >-
        -Xmx384m -Xms192m
        -XX:+UseG1GC -XX:MaxGCPauseMillis=100
        -XX:MaxMetaspaceSize=384m
        -Dspring.aot.enabled=false
        -Dspring.jmx.enabled=false
        -Dspring.jpa.hibernate.ddl-auto=none
        -Dspring.flyway.enabled=true
      DATABASE_URL: jdbc:postgresql://postgres:5432/filetransfer?stringtype=unspecified
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_MAIN_WEB_APPLICATION_TYPE: none
      # R111: exclude servlet-web autoconfigs so AOT's frozen bean graph does not
      # try to wire Security / MVC / Servlet context beans on this non-web run.
      # Pre-R111 symptoms: exit-1 on ListenerInfoController (R110 fixed); then
      # WebSecurityConfiguration "No ServletContext set" (R110 acceptance).
      # Durable fix: name the web autoconfigs explicitly so db-migrate's context
      # never tries to stand them up. Flyway path is unaffected.
      SPRING_AUTOCONFIGURE_EXCLUDE: >-
        org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,
        org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration,
        org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,
        org.springframework.boot.autoconfigure.web.servlet.WebMvcAutoConfiguration,
        org.springframework.boot.autoconfigure.web.servlet.DispatcherServletAutoConfiguration,
        org.springframework.boot.autoconfigure.web.servlet.ServletWebServerFactoryAutoConfiguration,
        org.springframework.boot.autoconfigure.web.servlet.HttpEncodingAutoConfiguration,
        org.springframework.boot.autoconfigure.web.servlet.error.ErrorMvcAutoConfiguration,
        org.springframework.boot.actuate.autoconfigure.web.servlet.ServletManagementContextAutoConfiguration
    # R134E — `-Dspring.aot.enabled=false` for db-migrate only. AOT freezes
    # the bean graph at build time, so runtime SPRING_AUTOCONFIGURE_EXCLUDE
    # can't actually exclude WebMvc/Security beans — they're already in the
    # AOT-generated __BeanDefinitions. db-migrate tried to wire
    # resourceHandlerMapping → HandlerMappingIntrospector → ServletContext and
    # failed (tester R134A-B-verification.md surfaced this once V95 stopped
    # blocking earlier). Disabling AOT here costs ~2s extra boot for this
    # one-shot container and lets the runtime exclusion actually exclude.
    command: ["java", "-Dspring.main.web-application-type=none", "-Dspring.flyway.enabled=true",
              "-Dspring.jpa.hibernate.ddl-auto=none",
              "-Dspring.aot.enabled=false",
              "-Dspring.rabbitmq.host=localhost", "-Dserver.port=0",
              "-jar", "app.jar", "--spring.flyway.enabled=true"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - mft-network
      - default

  # R134Y Sprint 8 — slim broker. Surviving RabbitMQ footprint is just the
  # file.uploaded routing + activity/notification fanout queues. The
  # management plugin was removed (swapped rabbitmq:3.13-management-alpine
  # → rabbitmq:3.13-alpine). Externally-exposed port 15672 gone. Exchanges
  # are re-declared by Spring beans on service boot, so the previously
  # mounted definitions.json is no longer needed and has been dropped.
  # Memory cap brought down to 256M; vm_memory_high_watermark (80% of
  # container memory) leaves comfortable headroom for file-upload bursts.
  rabbitmq:
    image: rabbitmq:3.13-alpine
    container_name: mft-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbit vm_memory_high_watermark 0.8
    ports:
      - "127.0.0.1:5672:5672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:v24.1.7
    container_name: mft-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
    ports:
      - "127.0.0.1:9092:9092"
      - "127.0.0.1:9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health 2>&1 | grep -q 'Healthy:.*true' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Core Services
  # ---------------------------------------------------------------------------
  onboarding-api:
    build: ./onboarding-api
    container_name: mft-onboarding-api
    labels:
      com.filetransfer.spiffe: onboarding-api
    <<: *healthcheck
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:9080:9080"
    environment:
      <<: *common-env
      CLUSTER_HOST: onboarding-api
      SPIFFE_SERVICE_NAME: onboarding-api
