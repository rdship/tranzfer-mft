  ai-engine:
    build: ./ai-engine
    container_name: mft-ai-engine
    labels:
      com.filetransfer.spiffe: ai-engine
    <<: *healthcheck
    ports:
      - "127.0.0.1:8091:8091"
      - "127.0.0.1:9091:9091"
    environment:
      <<: *common-env
      CLUSTER_HOST: ai-engine
      SPIFFE_SERVICE_NAME: ai-engine
      SPRING_APPLICATION_NAME: ai-engine
      SERVER_PORT: 8091
      PLATFORM_CONNECTORS_ENABLED: "true"
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-20250514}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - platform_tls:/tls:ro
      - spire-socket:/run/spire/sockets:ro

  ai-engine-2:
    profiles: ["replicas"]
    build: ./ai-engine
    container_name: mft-ai-engine-2
    labels:
      com.filetransfer.spiffe: ai-engine
    <<: *healthcheck
    ports:
      - "127.0.0.1:18091:8091"
    environment:
      <<: *common-env
      CLUSTER_HOST: ai-engine-2
      SPIFFE_SERVICE_NAME: ai-engine
      SPRING_APPLICATION_NAME: ai-engine
      SERVER_PORT: 8091
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-20250514}
      AI_ENGINE_INSTANCE_ID: ai-engine-2
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - platform_tls:/tls:ro
      - spire-socket:/run/spire/sockets:ro

  keystore-manager:
    build: ./keystore-manager
    container_name: mft-keystore-manager
    labels:
      com.filetransfer.spiffe: keystore-manager
    <<: *healthcheck
    ports:
      - "127.0.0.1:8093:8093"
    environment:
      <<: *common-env
      CLUSTER_HOST: keystore-manager
      SPIFFE_SERVICE_NAME: keystore-manager
      SPRING_APPLICATION_NAME: keystore-manager
      SERVER_PORT: 8093
      PLATFORM_PERMISSIONS_ENABLED: "false"
      KEYSTORE_MASTER_PASSWORD: ${KEYSTORE_MASTER_PASSWORD:-change-this-master-password}
      PLATFORM_ENVIRONMENT: DEV
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - platform_tls:/tls:ro
      - spire-socket:/run/spire/sockets:ro

  # ─────────────────────────────────────────────────────────────────────────────
  # IMPORTANT — Multi-replica storage warning:
  #
  # storage_data is a SINGLE Docker named volume mounted on ONE container.
  # If you scale storage-manager (docker compose up --scale storage-manager=N),
  # each replica gets its OWN copy of storage_data and CANNOT see each other's files.
  #
  # For true multi-replica deployments, choose one:
  #   A) NFS shared volume: mount an NFS path at /data/storage on every replica
  #   B) MinIO/S3: enable the mft-minio service below (profile=minio) and set
  #      STORAGE_BACKEND=s3 on each replica (future work — see StorageBackend.java)
  #   C) Kubernetes: use a ReadWriteMany PersistentVolumeClaim (EFS, GlusterFS, etc.)
  #
  # R134AG retired the Redis-backed StorageLocationRegistry (it could not
  # fix data loss if the owning pod's volume was destroyed). Multi-replica
  # deployments must use the S3/MinIO backend below.
  # ─────────────────────────────────────────────────────────────────────────────
  storage-manager:
    build: ./storage-manager
    container_name: mft-storage-manager
    labels:
      com.filetransfer.spiffe: storage-manager
    <<: *healthcheck
    ports:
      - "127.0.0.1:8096:8096"
      - "127.0.0.1:9096:9096"
    environment:
      <<: *common-env
      CLUSTER_HOST: storage-manager
      SPIFFE_SERVICE_NAME: storage-manager
      SPRING_APPLICATION_NAME: storage-manager
      SERVER_PORT: 8096
      PLATFORM_PERMISSIONS_ENABLED: "false"
      # R134N — storage-manager owns com.filetransfer.storage.config.SecurityConfig.
      # Both shared SecurityFilterChain sources disabled to avoid AOT ambiguity.
      PLATFORM_SECURITY_SHARED_CONFIG: "false"
      PLATFORM_SECURITY_INTERNAL_SERVICE: "false"
      STORAGE_HOT_PATH: /data/storage/hot
      STORAGE_WARM_PATH: /data/storage/warm
      STORAGE_COLD_PATH: /data/storage/cold
      STORAGE_BACKUP_PATH: /data/storage/backup
      # Instance URL — informational; prefer the S3/MinIO backend for true
      # multi-replica correctness (post-R134AG the Redis location registry is gone).
      STORAGE_INSTANCE_URL: http://storage-manager:8096
    volumes:
      - storage_data:/data/storage
      - platform_tls:/tls:ro
      - spire-socket:/run/spire/sockets:ro
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────────────────────────
  # MinIO — shared S3-compatible object storage (the correct multi-replica fix).
  #
  # Enables true horizontal scaling of storage-manager: every replica reads/writes
  # the same bucket. All storage-manager containers must point to the same MinIO.
  #
  # Start with:  docker compose --profile minio up -d
  # Then set on storage-manager: STORAGE_BACKEND=s3, S3_ENDPOINT=http://minio:9000
  # Admin UI: http://localhost:9001 (minioadmin / minioadmin)
  # ─────────────────────────────────────────────────────────────────────────────
  mft-minio:
    image: minio/minio:latest
    container_name: mft-minio
    profiles:
      - minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:9000:9000"   # S3 API (internal to platform only — not exposed to internet)
      - "127.0.0.1:9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Creates the mft-storage bucket on first start (idempotent).
  # Runs once on each `compose up` and exits.
  # IMPORTANT: `restart: "no"` (quoted) — an init container must NOT restart
  # on failure, otherwise a single bad config loop-spams the logs forever.
  # The wife's demo surfaced this as "mft-minio-init keeps restarting" in
  # DEMO-RESULTS.md issue #10. Previous value was `on-failure` which
  # retried every 1-2s if mc returned any non-zero exit.
  mft-minio-init:
    image: minio/mc:latest
    container_name: mft-minio-init
    profiles:
      - minio
    depends_on:
      mft-minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        # Wait a moment beyond healthcheck for full readiness
        sleep 2
        mc alias set myminio http://mft-minio:9000 \
          "$${MINIO_ROOT_USER:-minioadmin}" \
          "$${MINIO_ROOT_PASSWORD:-minioadmin}"
        mc mb --ignore-existing myminio/"$${STORAGE_S3_BUCKET:-mft-storage}"
        mc anonymous set none       myminio/"$${STORAGE_S3_BUCKET:-mft-storage}"
        echo "MinIO bucket ready: $${STORAGE_S3_BUCKET:-mft-storage}"
    restart: "no"

  edi-converter:
    build: ./edi-converter
    container_name: mft-edi-converter
    labels:
      com.filetransfer.spiffe: edi-converter
    <<: *healthcheck
    ports:
      - "127.0.0.1:8095:8095"
      - "127.0.0.1:9095:9095"
    environment:
      JAVA_TOOL_OPTIONS: >-
        -Xmx256m -Xms128m
        -XX:+UseG1GC -XX:MaxGCPauseMillis=100
        -XX:ActiveProcessorCount=1
        -XX:MaxMetaspaceSize=192m
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/tmp/heapdump-%p.hprof
        ${BOOT_JFR_FLAG:- }
        -Dnet.bytebuddy.experimental=true
        -Dspring.jmx.enabled=false
      SERVER_PORT: 8095
      # edi-converter deliberately does NOT merge <<: *common-env (it has
      # no DB / RabbitMQ and runs with a smaller heap), so keep the
      # explicit *spiffe-env merge here — without it, SPIFFE stays off on
      # this service alone (regression against R101's platform-wide
      # enablement).
      <<: *spiffe-env
      SPIFFE_SERVICE_NAME: edi-converter
      SPRING_APPLICATION_NAME: edi-converter
      AI_ENGINE_URL: http://ai-engine:8091
      PLATFORM_SECURITY_SHARED_CONFIG: "false"
      PLATFORM_SECURITY_INTERNAL_SERVICE: "true"
      PLATFORM_VERSION: "1.0.0-R134AK"
      PLATFORM_BUILD_TIMESTAMP: "2026-04-23T08:00:00Z"
      PLATFORM_ENVIRONMENT: ${PLATFORM_ENVIRONMENT:-DEV}
      CLUSTER_SERVICE_TYPE: EDI_CONVERTER
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
    volumes:
      - spire-socket:/run/spire/sockets:ro
      - platform_tls:/tls:ro
    depends_on:
      spire-agent:
        condition: service_healthy

  screening-service:
    build: ./screening-service
    container_name: mft-screening-service
    labels:
      com.filetransfer.spiffe: screening-service
    <<: *healthcheck
    ports:
      - "127.0.0.1:8092:8092"
    environment:
      <<: *common-env
      CLUSTER_HOST: screening-service
      SPIFFE_SERVICE_NAME: screening-service
      SPRING_APPLICATION_NAME: screening-service
      SERVER_PORT: 8092
      PLATFORM_SECURITY_SHARED_CONFIG: "false"
      PLATFORM_SECURITY_INTERNAL_SERVICE: "true"
      SCREENING_THRESHOLD: ${SCREENING_THRESHOLD:-0.82}
      SCREENING_DEFAULT_ACTION: ${SCREENING_DEFAULT_ACTION:-BLOCK}
      CLAMAV_HOST: ${CLAMAV_HOST:-localhost}
      CLAMAV_PORT: 3310
      CLAMAV_ENABLED: ${CLAMAV_ENABLED:-false}
    volumes:
      - quarantine_data:/data/quarantine
      - platform_tls:/tls:ro
      - spire-socket:/run/spire/sockets:ro
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build: ./notification-service
    container_name: mft-notification-service
    labels:
      com.filetransfer.spiffe: notification-service
    <<: *healthcheck
    ports:
      - "127.0.0.1:8097:8097"
      - "127.0.0.1:9097:9097"
    environment:
      <<: *common-env
      CLUSTER_HOST: notification-service
      SPIFFE_SERVICE_NAME: notification-service
      SPRING_APPLICATION_NAME: notification-service
      SERVER_PORT: 8097
      MAIL_HOST: ${MAIL_HOST:-localhost}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      NOTIFICATION_FROM: ${NOTIFICATION_FROM:-noreply@tranzfer.io}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    volumes:
      - platform_tls:/tls:ro
      - spire-socket:/run/spire/sockets:ro

  # R134o — https-service: dynamic HTTPS listeners driven by ServerInstance rows
  # with protocol=HTTPS. Pulls TLS cert from Keystore Manager at bind time,
  # applies SecurityProfile allowlists via SecurityProfileEnforcer, and streams
  # uploads through VFS → storage-manager → RoutingEngine (same path as SFTP/FTP).
  #
  # R134A (fix for R134o DOA per R134p-verification.md) — removed the :443 /
  # :8443 host-port publishes. Both stole ports already held by other
  # containers (api-gateway binds :443, dmz-proxy-external binds :8443),
  # producing `ExitCode=128, Bind failed: port is already allocated` on every
  # fresh boot. Architecturally the host bindings were wrong anyway: per-
  # customer HTTPS listener ports are configured on ServerInstance rows —
  # operators publish those explicitly when provisioning a customer, they are
  # NOT static to this container. Only the management API (:8099) and its
  # management-HTTPS (:9099) are kept; customer-facing HTTPS traffic reaches
  # https-service via the mft-network bridge from api-gateway / dmz-proxy.
  https-service:
    build: ./https-service
    container_name: mft-https-service
    labels:
      com.filetransfer.spiffe: https-service
    <<: *healthcheck
    ports:
      - "127.0.0.1:8099:8099"
      - "127.0.0.1:9099:9099"
    environment:
      <<: *common-env
      CLUSTER_HOST: https-service
      SPIFFE_SERVICE_NAME: https-service
      SPRING_APPLICATION_NAME: https-service
      SERVER_PORT: 8099
      PLATFORM_SECURITY_SHARED_CONFIG: "false"
      PLATFORM_SECURITY_INTERNAL_SERVICE: "true"
      PIPELINE_CACHE_PARTNER_ENABLED: "true"
      PLATFORM_CONNECTORS_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keystore-manager:
        condition: service_healthy
    volumes:
      - platform_tls:/tls:ro
      - spire-socket:/run/spire/sockets:ro
      - https_keystores:/data/https-keystores

  platform-sentinel:
    build: ./platform-sentinel
    container_name: mft-platform-sentinel
    labels:
      com.filetransfer.spiffe: platform-sentinel
    <<: *healthcheck
    ports:
      - "127.0.0.1:8098:8098"
      - "127.0.0.1:9098:9098"
    environment:
      <<: *common-env
      CLUSTER_HOST: platform-sentinel
      SPIFFE_SERVICE_NAME: platform-sentinel
      SPRING_APPLICATION_NAME: platform-sentinel
      SERVER_PORT: 8098
      PLATFORM_CONNECTORS_ENABLED: "true"
      SENTINEL_GITHUB_ENABLED: ${SENTINEL_GITHUB_ENABLED:-false}
      SENTINEL_GITHUB_TOKEN: ${SENTINEL_GITHUB_TOKEN:-}
      SENTINEL_GITHUB_OWNER: ${SENTINEL_GITHUB_OWNER:-}
      SENTINEL_GITHUB_REPO: ${SENTINEL_GITHUB_REPO:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    volumes:
      - platform_tls:/tls:ro
      - spire-socket:/run/spire/sockets:ro

  # ---------------------------------------------------------------------------
  # Security Services
  # ---------------------------------------------------------------------------
  # ClamAV disabled on Apple Silicon (no ARM64 image available)
  # Re-enable on AMD64 with: CLAMAV_ENABLED=true and uncomment below
  # clamav:
  #   image: clamav/clamav:1.4
  #   container_name: mft-clamav
  #   ports:
  #     - "3310:3310"
  #   volumes:
  #     - clamav_data:/var/lib/clamav
  #   healthcheck:
  #     test: ["CMD", "clamdscan", "--ping"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5

  # ---------------------------------------------------------------------------
  # Observability Stack (Prometheus, Loki, Grafana, AlertManager)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: mft-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      # Enable CORS so the admin UI (http://localhost:3000) can query
      # Prometheus HTTP API directly from the browser for the native
      # Monitoring page. Without this every /api/v1/query call 403s.
      - '--web.cors.origin=.*'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: mft-alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  loki:
    image: grafana/loki:2.9.0
    container_name: mft-loki
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  promtail:
    image: grafana/promtail:2.9.0
    container_name: mft-promtail
    volumes:
      - ./config/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.4.0
    container_name: mft-grafana
    ports:
      - "127.0.0.1:3030:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      # Allow the admin UI (http://localhost:3000) to embed Grafana panels.
      # Required for the /observability page's iframe-based dashboard view.
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SAMESITE: "none"
      GF_SECURITY_COOKIE_SECURE: "false"
      # Enable anonymous viewer access so operators don't need a second
      # login just to view the embedded dashboards. Edits still require
      # admin credentials.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Frontend UIs
  # ---------------------------------------------------------------------------
  ui-service:
    build:
      context: ./ui-service
      args:
        VITE_PLATFORM_ENVIRONMENT: ${PLATFORM_ENVIRONMENT:-PROD}
    restart: unless-stopped
    container_name: mft-ui-service
    labels:
      com.filetransfer.spiffe: ui-service
    # Container port is 8080 (non-root nginx) — host URL stays http://localhost:3000
    ports:
      - "127.0.0.1:3000:8080"
    # UI is a static nginx — depend only on `service_started` not
    # `service_healthy` so the SPA can load even if backends are still
    # warming up (R13's global QueryCache handler renders a friendly
    # error banner per page instead of blocking the whole UI).
    depends_on:
      - onboarding-api
      - config-service
      - analytics-service
      - license-service
    volumes:
      - platform_tls:/tls:ro
    # H4 fix: hit static /nginx-health endpoint, not proxied / (which depends on backends)
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/nginx-health > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  partner-portal:
    build: ./partner-portal
    restart: unless-stopped
    container_name: mft-partner-portal
    ports:
      - "127.0.0.1:3002:8080"
    depends_on:
      - onboarding-api
    volumes:
      - platform_tls:/tls:ro
    # H4 fix: hit static /nginx-health endpoint
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/nginx-health > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  ftp-web-ui:
    build: ./ftp-web-ui
    restart: unless-stopped
    container_name: mft-ftp-web-ui
    ports:
      - "127.0.0.1:3001:8080"
    depends_on:
      - ftp-web-service
    volumes:
      - platform_tls:/tls:ro
    # H4 fix: hit static /nginx-health endpoint
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/nginx-health > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # API Gateway — Single Entry Point
  # ---------------------------------------------------------------------------
  api-gateway:
    build: ./api-gateway
    restart: unless-stopped
    container_name: mft-api-gateway
    labels:
      com.filetransfer.spiffe: api-gateway
    ports:
      - "127.0.0.1:80:8080"
      - "127.0.0.1:443:8443"
    depends_on:
      - onboarding-api
      - config-service
      - ui-service
    healthcheck:
      test: ["CMD-SHELL", "curl -skf https://localhost:8443/nginx-health > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    volumes:
      - platform_tls:/tls:ro

networks:
  mft-network:
    driver: bridge

volumes:
  # SPIRE volumes — always created; persist bootstrap state across restarts
  spire-server-data: # SPIRE Server CA, keys, SQLite DB
  spire-server-sock: # SPIRE Server admin socket (shared with spire-init)
  spire-init-data:   # Bootstrap join-token file (written by bootstrap.sh)
  spire-socket:      # SPIFFE Workload API socket (mounted read-only into services)
  minio_data:      # MinIO object storage — shared across all storage-manager replicas (profile=minio)
  postgres_data:
  rabbitmq_data:
  redpanda_data:
    driver: local
  sftp_data:       # Shared across all SFTP replicas
  ftp_data:        # Shared across all FTP replicas
  storage_data:
  ftpweb_data:     # Shared across all FTP-Web replicas
  clamav_data:     # ClamAV virus definition database
  quarantine_data: # Quarantined files (AV/DLP detections)
  platform_tls:    # Shared TLS cert generated by tls-init — mounted read-only into all services
  https_keystores: # R134o — per-listener PEMs materialized by https-service from Keystore Manager
  prometheus_data: # Prometheus time-series data
  alertmanager_data: # AlertManager state
  loki_data:       # Loki log storage
  grafana_data:    # Grafana dashboards and state
