  # ── DMZ Proxy — INTERNAL group ────────────────────────────────────────────
  # Handles corporate/private network traffic (SFTP, FTP, AS2, HTTPS from LAN/VPN).
  # PROXY_GROUP_NAME=internal maps to the 'internal' ProxyGroup in the database.
  dmz-proxy:
    build: ./dmz-proxy
    container_name: mft-dmz-proxy-internal
    labels:
      com.filetransfer.spiffe: dmz-proxy
    ports:
      - "127.0.0.1:8088:8088"       # Management REST API
      - "127.0.0.1:32222:2222"      # SFTP (internal network clients)
      - "127.0.0.1:32121:21"        # FTP  (internal network clients)
      - "127.0.0.1:31000-31010:31000-31010"  # FTP passive range (internal)
      - "127.0.0.1:4443:443"        # FTP-Web (internal HTTPS)
      - "127.0.0.1:9443:9443"       # Tunnel port (gateway-service connects inbound)
    environment:
      # R101: dmz-proxy doesn't merge &common-env (it's the "no shared-
      # platform, no DB" service), so SPIFFE has to come in explicitly.
      # Without this, SpiffeProxyAuth.enabled stays false and the proxy's
      # /api/proxy/* management API rejects every inbound S2S call with
      # 401 — exactly the R79 symptom the tester measured under listener-
      # CRUD load.
      <<: *spiffe-env
      SPIFFE_SERVICE_NAME: dmz-proxy
      SPRING_APPLICATION_NAME: dmz-proxy
      PLATFORM_SECURITY_JWT_SECRET: ${JWT_SECRET:-change_me_in_production_256bit_secret_key!!}
      SERVER_PORT: 8088
      PROXY_GROUP_NAME: internal
      PROXY_GROUP_TYPE: INTERNAL
      PROXY_INSTANCE_ID: dmz-proxy-internal-1
      DMZ_EXTERNAL_HOST: ${DMZ_EXTERNAL_HOST_INTERNAL:-127.0.0.1}
      DMZ_SECURITY_ENABLED: "true"
      AI_ENGINE_URL: http://ai-engine:8091
      KEYSTORE_MANAGER_URL: http://keystore-manager:8093
      DMZ_AUDIT_ENABLED: "true"
      DMZ_ZONES_ENABLED: "false"
      DMZ_EGRESS_ENABLED: "false"
      DMZ_INSPECTION_ENABLED: "true"
      DMZ_HEALTH_CHECK_ENABLED: "true"
      DMZ_QOS_ENABLED: "true"
      DMZ_TUNNEL_ENABLED: ${DMZ_TUNNEL_ENABLED:-false}
      DMZ_TUNNEL_PORT: "9443"
      PLATFORM_VERSION: "1.0.0-R134AK"
      PLATFORM_BUILD_TIMESTAMP: "2026-04-23T08:00:00Z"
      CLUSTER_SERVICE_TYPE: DMZ_PROXY
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/api/proxy/health | grep -qE '\"status\":\"(UP|DEGRADED)\"' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      ai-engine:
        condition: service_started
      gateway-service:
        condition: service_started
    volumes:
      - platform_tls:/tls:ro
      - spire-socket:/run/spire/sockets:ro

  # ── DMZ Proxy — EXTERNAL group ────────────────────────────────────────────
  # Handles internet-facing traffic (public partner integrations, AS2, cloud).
  # TLS is required. Runs on different external ports from the internal proxy.
  # Scale this group for high external traffic without touching internal proxies.
  dmz-proxy-external:
    build: ./dmz-proxy
    container_name: mft-dmz-proxy-external
    labels:
      com.filetransfer.spiffe: dmz-proxy
    profiles:
      - external-proxy     # start with: docker compose --profile external-proxy up
    ports:
      - "127.0.0.1:8089:8088"        # Management REST API (different host port)
      - "127.0.0.1:42222:2222"       # SFTP (external/internet clients)
      - "127.0.0.1:42121:21"         # FTP  (external/internet clients)
      - "127.0.0.1:41000-41010:41000-41010"  # FTP passive range (external)
      - "127.0.0.1:8443:443"         # FTP-Web HTTPS (external)
      - "127.0.0.1:9444:9443"        # Tunnel port (separate tunnel for external proxy)
    environment:
      # R101: same rationale as the internal dmz-proxy above — this
      # service doesn't merge &common-env, so SPIFFE has to come in
      # explicitly or SpiffeProxyAuth stays disabled and S2S calls 401.
      <<: *spiffe-env
      SPIFFE_SERVICE_NAME: dmz-proxy
      SPRING_APPLICATION_NAME: dmz-proxy
      PLATFORM_SECURITY_JWT_SECRET: ${JWT_SECRET:-change_me_in_production_256bit_secret_key!!}
      SERVER_PORT: 8088
      PROXY_GROUP_NAME: external
      PROXY_GROUP_TYPE: EXTERNAL
      PROXY_INSTANCE_ID: dmz-proxy-external-1
      DMZ_EXTERNAL_HOST: ${DMZ_EXTERNAL_HOST_EXTERNAL:-127.0.0.1}
      DMZ_SECURITY_ENABLED: "true"
      DMZ_TLS_ENABLED: ${DMZ_EXTERNAL_TLS_ENABLED:-true}   # TLS mandatory for external group
      AI_ENGINE_URL: http://ai-engine:8091
      KEYSTORE_MANAGER_URL: http://keystore-manager:8093
      DMZ_AUDIT_ENABLED: "true"
      DMZ_ZONES_ENABLED: "true"                             # Zone enforcement ON for external
      DMZ_EGRESS_ENABLED: "true"                            # Egress filter ON for external
      DMZ_INSPECTION_ENABLED: "true"
      DMZ_HEALTH_CHECK_ENABLED: "true"
      DMZ_QOS_ENABLED: "true"
      DMZ_TUNNEL_ENABLED: ${DMZ_TUNNEL_ENABLED:-false}
      DMZ_TUNNEL_PORT: "9443"
      GATEWAY_HOST: gateway-service
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/api/proxy/health | grep -qE '\"status\":\"(UP|DEGRADED)\"' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      ai-engine:
        condition: service_started
      gateway-service:
        condition: service_started
    volumes:
      - platform_tls:/tls:ro

  as2-service:
    build: ./as2-service
    container_name: mft-as2-service
    labels:
      com.filetransfer.spiffe: as2-service
    # Align start_period with other Spring services (was 30s — too tight for
    # Flyway + Hibernate + Kafka cold boot which takes ~100s). 600s matches
    # the shared x-service-healthcheck anchor.
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8094/internal/health | grep -q UP || curl -sf http://localhost:8094/actuator/health/liveness || exit 1"]
      interval: 15s
