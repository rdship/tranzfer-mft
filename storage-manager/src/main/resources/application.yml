server:
  port: 8096
  shutdown: graceful

management:
  health:
    probes:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info,circuit-breakers

spring:
  main:
    allow-bean-definition-overriding: true
  lifecycle:
    timeout-per-shutdown-phase: 45s
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 4
          max-idle: 4
          min-idle: 1
          max-wait: 1000ms
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    connection-timeout: 30000
    requested-heartbeat: 60
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/filetransfer}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: false
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      pool-name: Storage-Pool
  jpa:
    open-in-view: false  # OSIV off: controllers return DTOs, not raw entities
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        connection:
          provider_disables_autocommit: true
        temp:
          use_jdbc_metadata_defaults: false
  servlet:
    multipart:
      max-file-size: 512MB
      max-request-size: 512MB
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    placeholder-replacement: false
    locations: classpath:db/migration
    validate-on-migrate: false

vault:
  enabled: ${VAULT_ENABLED:true}
  addr: ${VAULT_ADDR:http://vault:8200}
  token: ${VAULT_TOKEN:mft-dev-token}

storage:
  encryption:
    enabled: ${STORAGE_ENCRYPTION_ENABLED:false}
  # ── Backend selector ────────────────────────────────────────────────────────
  # local (default) — local/NFS filesystem, single-instance or NFS-mounted
  # s3              — S3-compatible object store (MinIO internal or AWS S3 external)
  #
  # Switch: STORAGE_BACKEND=s3
  backend: ${STORAGE_BACKEND:local}

  # ── S3 / MinIO config (only used when storage.backend=s3) ────────────────────
  s3:
    # MinIO internal (Docker): bypasses DMZ proxy (auto-added to PROXY_NO_PROXY_HOSTS)
    # AWS S3 external:         leave blank; uses DMZ proxy when PROXY_ENABLED=true
    endpoint:   ${STORAGE_S3_ENDPOINT:http://mft-minio:9000}
    bucket:     ${STORAGE_S3_BUCKET:mft-storage}
    access-key: ${STORAGE_S3_ACCESS_KEY:minioadmin}
    secret-key: ${STORAGE_S3_SECRET_KEY:minioadmin}
    region:     ${STORAGE_S3_REGION:us-east-1}
    path-style: ${STORAGE_S3_PATH_STYLE:true}   # true=MinIO, false=AWS S3 virtual-hosted

  # ── Replica identity ────────────────────────────────────────────────────────
  # This instance's own URL — registered in Redis so other instances can route
  # retrieve requests directly to the pod that holds the physical bytes.
  # Set STORAGE_INSTANCE_URL to the Docker/K8s service URL for THIS specific pod
  # (e.g. http://storage-manager-1:8096).  Docker Compose sets this per-service.
  # In a shared-storage deployment (NFS/S3/MinIO) this is not needed.
  instance-url: ${STORAGE_INSTANCE_URL:http://storage-manager:8096}

  # Tiered storage paths
  hot:
    path: ${STORAGE_HOT_PATH:/data/storage/hot}
    max-size-gb: ${STORAGE_HOT_MAX_GB:100}
  warm:
    path: ${STORAGE_WARM_PATH:/data/storage/warm}
    max-size-gb: ${STORAGE_WARM_MAX_GB:500}
  cold:
    path: ${STORAGE_COLD_PATH:/data/storage/cold}
    max-size-gb: ${STORAGE_COLD_MAX_GB:2000}
  backup:
    path: ${STORAGE_BACKUP_PATH:/data/storage/backup}
  # Parallel I/O
  stripe-size-kb: ${STORAGE_STRIPE_SIZE_KB:4096}
  io-threads: ${STORAGE_IO_THREADS:8}
  write-buffer-mb: ${STORAGE_WRITE_BUFFER_MB:64}
  # Lifecycle policies
  hot-to-warm-hours: ${STORAGE_HOT_WARM_HOURS:168}
  warm-to-cold-days: ${STORAGE_WARM_COLD_DAYS:30}
  cold-retention-days: ${STORAGE_COLD_RETENTION_DAYS:365}

cluster:
  id: ${CLUSTER_ID:default-cluster}
  host: ${CLUSTER_HOST:storage-manager}
  service-type: STORAGE
  communication-mode: ${CLUSTER_COMM_MODE:WITHIN_CLUSTER}

platform:
  services:
    onboarding-api:
      url: ${ONBOARDING_API_URL:http://onboarding-api:8080}
    sftp-service:
      url: ${SFTP_SERVICE_URL:http://sftp-service:8081}
    ftp-service:
      url: ${FTP_SERVICE_URL:http://ftp-service:8082}
    ftp-web-service:
      url: ${FTP_WEB_SERVICE_URL:http://ftp-web-service:8083}
    config-service:
      url: ${CONFIG_SERVICE_URL:http://config-service:8084}
    gateway-service:
      url: ${GATEWAY_SERVICE_URL:http://gateway-service:8085}
    encryption-service:
      url: ${ENCRYPTION_SERVICE_URL:http://encryption-service:8086}
    forwarder-service:
      url: ${FORWARDER_SERVICE_URL:http://external-forwarder-service:8087}
    dmz-proxy:
      url: ${DMZ_PROXY_URL:http://dmz-proxy:8088}
    license-service:
      url: ${LICENSE_SERVICE_URL:http://license-service:8089}
    analytics-service:
      url: ${ANALYTICS_SERVICE_URL:http://analytics-service:8090}
    ai-engine:
      url: ${AI_ENGINE_URL:http://ai-engine:8091}
    screening-service:
      url: ${SCREENING_SERVICE_URL:http://screening-service:8092}
    keystore-manager:
      url: ${KEYSTORE_MANAGER_URL:http://keystore-manager:8093}
    as2-service:
      url: ${AS2_SERVICE_URL:http://as2-service:8094}
    edi-converter:
      url: ${EDI_CONVERTER_URL:http://edi-converter:8095}
    storage-manager:
      url: ${STORAGE_MANAGER_URL:http://storage-manager:8096}
  environment: ${PLATFORM_ENVIRONMENT:PROD}
  proxy:
    enabled: ${PROXY_ENABLED:false}
    type: ${PROXY_TYPE:HTTP}
    host: ${PROXY_HOST:dmz-proxy}
    port: ${PROXY_PORT:8088}
    no-proxy-hosts: ${PROXY_NO_PROXY_HOSTS:localhost,127.0.0.1,postgres,rabbitmq}
  readiness:
    schema-file: db/schema/storage-manager.sql
    required-tables: storage_objects
    fail-on-missing: true
