server:
  port: 8094
spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/filetransfer}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: false
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 10000
      pool-name: Storage-Pool
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        connection:
          provider_disables_autocommit: true
  servlet:
    multipart:
      max-file-size: 512MB
      max-request-size: 512MB
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    locations: classpath:db/migration

storage:
  # Tiered storage paths
  hot:
    path: ${STORAGE_HOT_PATH:/data/storage/hot}
    max-size-gb: ${STORAGE_HOT_MAX_GB:100}
  warm:
    path: ${STORAGE_WARM_PATH:/data/storage/warm}
    max-size-gb: ${STORAGE_WARM_MAX_GB:500}
  cold:
    path: ${STORAGE_COLD_PATH:/data/storage/cold}
    max-size-gb: ${STORAGE_COLD_MAX_GB:2000}
  backup:
    path: ${STORAGE_BACKUP_PATH:/data/storage/backup}
  # Parallel I/O
  stripe-size-kb: ${STORAGE_STRIPE_SIZE_KB:4096}
  io-threads: ${STORAGE_IO_THREADS:8}
  write-buffer-mb: ${STORAGE_WRITE_BUFFER_MB:64}
  # Lifecycle policies
  hot-to-warm-hours: ${STORAGE_HOT_WARM_HOURS:168}
  warm-to-cold-days: ${STORAGE_WARM_COLD_DAYS:30}
  cold-retention-days: ${STORAGE_COLD_RETENTION_DAYS:365}

cluster:
  id: ${CLUSTER_ID:default-cluster}
  host: ${CLUSTER_HOST:storage-manager}
  service-type: STORAGE
  communication-mode: ${CLUSTER_COMM_MODE:WITHIN_CLUSTER}

platform:
  services:
    onboarding-api:
      url: ${ONBOARDING_API_URL:http://onboarding-api:8080}
    sftp-service:
      url: ${SFTP_SERVICE_URL:http://sftp-service:8081}
    ftp-service:
      url: ${FTP_SERVICE_URL:http://ftp-service:8082}
    ftp-web-service:
      url: ${FTP_WEB_SERVICE_URL:http://ftp-web-service:8083}
    config-service:
      url: ${CONFIG_SERVICE_URL:http://config-service:8084}
    gateway-service:
      url: ${GATEWAY_SERVICE_URL:http://gateway-service:8085}
    encryption-service:
      url: ${ENCRYPTION_SERVICE_URL:http://encryption-service:8086}
    forwarder-service:
      url: ${FORWARDER_SERVICE_URL:http://external-forwarder-service:8087}
    dmz-proxy:
      url: ${DMZ_PROXY_URL:http://dmz-proxy:8088}
    license-service:
      url: ${LICENSE_SERVICE_URL:http://license-service:8089}
    analytics-service:
      url: ${ANALYTICS_SERVICE_URL:http://analytics-service:8090}
    ai-engine:
      url: ${AI_ENGINE_URL:http://ai-engine:8091}
    screening-service:
      url: ${SCREENING_SERVICE_URL:http://screening-service:8092}
    keystore-manager:
      url: ${KEYSTORE_MANAGER_URL:http://keystore-manager:8093}
    as2-service:
      url: ${AS2_SERVICE_URL:http://as2-service:8094}
    edi-converter:
      url: ${EDI_CONVERTER_URL:http://edi-converter:8095}
    storage-manager:
      url: ${STORAGE_MANAGER_URL:http://storage-manager:8096}
  environment: ${PLATFORM_ENVIRONMENT:PROD}
  proxy:
    enabled: ${PROXY_ENABLED:false}
    type: ${PROXY_TYPE:HTTP}
    host: ${PROXY_HOST:dmz-proxy}
    port: ${PROXY_PORT:8088}
    no-proxy-hosts: ${PROXY_NO_PROXY_HOSTS:localhost,127.0.0.1,postgres,rabbitmq}
