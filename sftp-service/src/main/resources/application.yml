server:
  port: 8081
  shutdown: graceful

management:
  health:
    probes:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info,circuit-breakers

spring:
  main:
    allow-bean-definition-overriding: true
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 4
          max-idle: 4
          min-idle: 1
          max-wait: 1000ms
  lifecycle:
    timeout-per-shutdown-phase: 45s
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/filetransfer}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: false
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      pool-name: SFTP-Pool
  jpa:
    open-in-view: false  # OSIV off: controllers return DTOs, not raw entities
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        connection:
          provider_disables_autocommit: true
        temp:
          use_jdbc_metadata_defaults: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    placeholder-replacement: false
    locations: classpath:db/migration
    validate-on-migrate: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    connection-timeout: 30000
    requested-heartbeat: 60

jwt:
  secret: ${JWT_SECRET:change_me_in_production_256bit_secret_key!!}
  expiration: 900000

sftp:
  port: ${SFTP_PORT:2222}
  host-key-path: ${SFTP_HOST_KEY_PATH:./sftp_host_key}
  home-base: ${SFTP_HOME_BASE:/data/sftp}
  instance-id: ${SFTP_INSTANCE_ID:#{null}}

  # Connection management
  max-connections: ${SFTP_MAX_CONNECTIONS:0}                         # 0 = unlimited
  max-connections-per-user: ${SFTP_MAX_CONNECTIONS_PER_USER:0}       # 0 = unlimited
  idle-timeout-seconds: ${SFTP_IDLE_TIMEOUT_SECONDS:0}               # 0 = no timeout
  max-session-duration-seconds: ${SFTP_MAX_SESSION_DURATION_SECONDS:0}  # 0 = unlimited
  banner-message: ${SFTP_BANNER_MESSAGE:}

  # Authentication hardening
  auth:
    max-failed-attempts: ${SFTP_AUTH_MAX_FAILED_ATTEMPTS:5}          # 0 = disable lockout
    lockout-duration-seconds: ${SFTP_AUTH_LOCKOUT_DURATION_SECONDS:900}

  # IP access control (comma-separated, empty = disabled)
  security:
    ip-allowlist: ${SFTP_IP_ALLOWLIST:}
    ip-denylist: ${SFTP_IP_DENYLIST:}

  # File operation controls
  files:
    max-upload-size-bytes: ${SFTP_MAX_UPLOAD_SIZE_BYTES:0}           # 0 = unlimited
    disk-quota-bytes: ${SFTP_DISK_QUOTA_BYTES:0}                     # 0 = unlimited
    allowed-extensions: ${SFTP_ALLOWED_EXTENSIONS:}                  # e.g. csv,xml,txt
    denied-extensions: ${SFTP_DENIED_EXTENSIONS:}                    # e.g. exe,bat,sh
    prevent-symlink-traversal: ${SFTP_PREVENT_SYMLINK_TRAVERSAL:true}

  # SSH algorithm configuration (comma-separated, empty = hardened defaults from SecurityProfile)
  algorithms:
    ciphers: ${SFTP_CIPHERS:aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr}
    macs: ${SFTP_MACS:hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512,hmac-sha2-256}
    kex: ${SFTP_KEX:curve25519-sha256,curve25519-sha256@libssh.org,ecdh-sha2-nistp521,ecdh-sha2-nistp384,ecdh-sha2-nistp256,diffie-hellman-group18-sha512,diffie-hellman-group16-sha512}

  # Bandwidth throttling
  throttle:
    upload-bytes-per-second: ${SFTP_THROTTLE_UPLOAD_BPS:0}           # 0 = unlimited
    download-bytes-per-second: ${SFTP_THROTTLE_DOWNLOAD_BPS:0}       # 0 = unlimited

  # Graceful shutdown
  shutdown:
    drain-timeout-seconds: ${SFTP_SHUTDOWN_DRAIN_TIMEOUT_SECONDS:30}

  # Keystore Manager integration (centralized key storage)
  keystore:
    enabled: ${SFTP_KEYSTORE_MANAGER_ENABLED:false}
    manager-url: ${SFTP_KEYSTORE_MANAGER_URL:http://keystore-manager:8093}

rabbitmq:
  exchange: file-transfer.events
  queue:
    sftp-events: sftp.account.events

control-api:
  key: ${CONTROL_API_KEY:internal_control_secret}

flow:
  rules:
    enabled: true

cluster:
  id: ${CLUSTER_ID:default-cluster}
  host: ${CLUSTER_HOST:localhost}
  service-type: SFTP
  communication-mode: ${CLUSTER_COMM_MODE:WITHIN_CLUSTER}

platform:
  services:
    onboarding-api:
      url: ${ONBOARDING_API_URL:http://onboarding-api:8080}
    sftp-service:
      url: ${SFTP_SERVICE_URL:http://sftp-service:8081}
    ftp-service:
      url: ${FTP_SERVICE_URL:http://ftp-service:8082}
    ftp-web-service:
      url: ${FTP_WEB_SERVICE_URL:http://ftp-web-service:8083}
    config-service:
      url: ${CONFIG_SERVICE_URL:http://config-service:8084}
    gateway-service:
      url: ${GATEWAY_SERVICE_URL:http://gateway-service:8085}
    encryption-service:
      url: ${ENCRYPTION_SERVICE_URL:http://encryption-service:8086}
    forwarder-service:
      url: ${FORWARDER_SERVICE_URL:http://external-forwarder-service:8087}
    dmz-proxy:
      url: ${DMZ_PROXY_URL:http://dmz-proxy:8088}
    license-service:
      url: ${LICENSE_SERVICE_URL:http://license-service:8089}
    analytics-service:
      url: ${ANALYTICS_SERVICE_URL:http://analytics-service:8090}
    ai-engine:
      url: ${AI_ENGINE_URL:http://ai-engine:8091}
    screening-service:
      url: ${SCREENING_SERVICE_URL:http://screening-service:8092}
    keystore-manager:
      url: ${KEYSTORE_MANAGER_URL:http://keystore-manager:8093}
    as2-service:
      url: ${AS2_SERVICE_URL:http://as2-service:8094}
    edi-converter:
      url: ${EDI_CONVERTER_URL:http://edi-converter:8095}
    storage-manager:
      url: ${STORAGE_MANAGER_URL:http://storage-manager:8096}
  environment: ${PLATFORM_ENVIRONMENT:PROD}
  track-id:
    prefix: ${TRACK_ID_PREFIX:TRZ}
  cluster:
    id: ${CLUSTER_ID:default-cluster}
    host: ${CLUSTER_HOST:localhost}
  security:
    jwt-secret: ${JWT_SECRET:change_me_in_production_256bit_secret_key!!}
    jwt-expiration-ms: ${JWT_EXPIRATION:900000}
    control-api-key: ${CONTROL_API_KEY:internal_control_secret}
  storage:
    sftp-home: ${SFTP_HOME_BASE:/data/sftp}
    ftp-home: ${FTP_HOME_BASE:/data/ftp}
    ftpweb-home: ${FTPWEB_HOME_BASE:/data/ftpweb}
  flow:
    max-concurrent: ${FLOW_MAX_CONCURRENT:50}
    work-dir: ${FLOW_WORK_DIR:/tmp/mft-flow-work}
  proxy:
    enabled: ${PROXY_ENABLED:false}
    type: ${PROXY_TYPE:HTTP}
    host: ${PROXY_HOST:dmz-proxy}
    port: ${PROXY_PORT:8088}
    no-proxy-hosts: ${PROXY_NO_PROXY_HOSTS:localhost,127.0.0.1,postgres,rabbitmq}

  readiness:
    schema-file: db/schema/sftp-service.sql
    required-tables: transfer_accounts,server_instances,folder_templates,audit_logs,login_attempts,virtual_entries,folder_mappings,file_transfer_records,file_flows,flow_executions

vfs:
  inline-max-bytes: ${VFS_INLINE_MAX_BYTES:65536}
  chunk-threshold-bytes: ${VFS_CHUNK_THRESHOLD_BYTES:67108864}
