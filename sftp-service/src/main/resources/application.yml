server:
  port: 8081

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/filetransfer}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 10000
      pool-name: SFTP-Pool
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        connection:
          provider_disables_autocommit: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

jwt:
  secret: ${JWT_SECRET:change_me_in_production_256bit_secret_key!!}
  expiration: 900000

sftp:
  port: ${SFTP_PORT:2222}
  host-key-path: ${SFTP_HOST_KEY_PATH:./sftp_host_key}
  home-base: ${SFTP_HOME_BASE:/data/sftp}
  instance-id: ${SFTP_INSTANCE_ID:#{null}}

  # Connection management
  max-connections: ${SFTP_MAX_CONNECTIONS:0}                         # 0 = unlimited
  max-connections-per-user: ${SFTP_MAX_CONNECTIONS_PER_USER:0}       # 0 = unlimited
  idle-timeout-seconds: ${SFTP_IDLE_TIMEOUT_SECONDS:0}               # 0 = no timeout
  max-session-duration-seconds: ${SFTP_MAX_SESSION_DURATION_SECONDS:0}  # 0 = unlimited
  banner-message: ${SFTP_BANNER_MESSAGE:}

  # Authentication hardening
  auth:
    max-failed-attempts: ${SFTP_AUTH_MAX_FAILED_ATTEMPTS:5}          # 0 = disable lockout
    lockout-duration-seconds: ${SFTP_AUTH_LOCKOUT_DURATION_SECONDS:900}

  # IP access control (comma-separated, empty = disabled)
  security:
    ip-allowlist: ${SFTP_IP_ALLOWLIST:}
    ip-denylist: ${SFTP_IP_DENYLIST:}

  # File operation controls
  files:
    max-upload-size-bytes: ${SFTP_MAX_UPLOAD_SIZE_BYTES:0}           # 0 = unlimited
    disk-quota-bytes: ${SFTP_DISK_QUOTA_BYTES:0}                     # 0 = unlimited
    allowed-extensions: ${SFTP_ALLOWED_EXTENSIONS:}                  # e.g. csv,xml,txt
    denied-extensions: ${SFTP_DENIED_EXTENSIONS:}                    # e.g. exe,bat,sh
    prevent-symlink-traversal: ${SFTP_PREVENT_SYMLINK_TRAVERSAL:true}

  # SSH algorithm configuration (comma-separated, empty = MINA defaults)
  algorithms:
    ciphers: ${SFTP_CIPHERS:}                                       # e.g. aes256-ctr,aes128-ctr
    macs: ${SFTP_MACS:}                                              # e.g. hmac-sha2-256,hmac-sha2-512
    kex: ${SFTP_KEX:}                                                # e.g. diffie-hellman-group16-sha512

  # Bandwidth throttling
  throttle:
    upload-bytes-per-second: ${SFTP_THROTTLE_UPLOAD_BPS:0}           # 0 = unlimited
    download-bytes-per-second: ${SFTP_THROTTLE_DOWNLOAD_BPS:0}       # 0 = unlimited

  # Graceful shutdown
  shutdown:
    drain-timeout-seconds: ${SFTP_SHUTDOWN_DRAIN_TIMEOUT_SECONDS:30}

  # Keystore Manager integration (centralized key storage)
  keystore:
    enabled: ${SFTP_KEYSTORE_MANAGER_ENABLED:false}
    manager-url: ${SFTP_KEYSTORE_MANAGER_URL:http://keystore-manager:8093}

rabbitmq:
  exchange: file-transfer.events
  queue:
    sftp-events: sftp.account.events

control-api:
  key: ${CONTROL_API_KEY:internal_control_secret}

cluster:
  id: ${CLUSTER_ID:default-cluster}
  host: ${CLUSTER_HOST:localhost}
  service-type: SFTP
  communication-mode: ${CLUSTER_COMM_MODE:WITHIN_CLUSTER}

platform:
  environment: ${PLATFORM_ENVIRONMENT:PROD}
  track-id:
    prefix: ${TRACK_ID_PREFIX:TRZ}
  cluster:
    id: ${CLUSTER_ID:default-cluster}
    host: ${CLUSTER_HOST:localhost}
  security:
    jwt-secret: ${JWT_SECRET:change_me_in_production_256bit_secret_key!!}
    jwt-expiration-ms: ${JWT_EXPIRATION:900000}
    control-api-key: ${CONTROL_API_KEY:internal_control_secret}
  storage:
    sftp-home: ${SFTP_HOME_BASE:/data/sftp}
    ftp-home: ${FTP_HOME_BASE:/data/ftp}
    ftpweb-home: ${FTPWEB_HOME_BASE:/data/ftpweb}
  flow:
    max-concurrent: ${FLOW_MAX_CONCURRENT:50}
    work-dir: ${FLOW_WORK_DIR:/tmp/mft-flow-work}
  proxy:
    enabled: ${PROXY_ENABLED:false}
    type: ${PROXY_TYPE:HTTP}
    host: ${PROXY_HOST:dmz-proxy}
    port: ${PROXY_PORT:8088}
    no-proxy-hosts: ${PROXY_NO_PROXY_HOSTS:localhost,127.0.0.1,postgres,rabbitmq}
