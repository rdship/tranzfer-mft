resolver 127.0.0.11 valid=10s ipv6=off;

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;

server {
    # HTTP listener (8080) — always available
    listen 8080;
    # HTTPS listener (8443) — enabled when TLS cert is present
    listen 8443 ssl;
    server_name _;

    # TLS config — auto-generated cert at /etc/nginx/ssl/
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!3DES:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Proxy params
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_connect_timeout 10s;
    proxy_read_timeout 300s;
    client_max_body_size 512M;

    # Backend TLS — self-signed certs on internal network (trusted)
    proxy_ssl_verify off;
    proxy_ssl_protocols TLSv1.2 TLSv1.3;

    # Health probe — available on both HTTP and HTTPS
    location = /nginx-health { access_log off; return 200 "ok\n"; }

    # NOTE: HTTP→HTTPS 308 redirect removed — Docker Desktop TLS passthrough
    # has issues on this host. Both HTTP (port 80) and HTTPS (port 443) are
    # available. The browser uses whichever it connects to.

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;

    # === Onboarding API ===
    location /api/auth/    { set $up onboarding-api:8080; proxy_pass http://$up; }
    location /api/accounts { set $up onboarding-api:8080; proxy_pass http://$up; }
    location /api/users    { set $up onboarding-api:8080; proxy_pass http://$up; }
    location /api/folder-mappings { set $up onboarding-api:8080; proxy_pass http://$up; }
    location /api/service-registry { set $up onboarding-api:8080; proxy_pass http://$up; }
    location /api/p2p/     { set $up onboarding-api:8080; proxy_pass http://$up; }
    location /api/journey  { set $up onboarding-api:8080; proxy_pass http://$up; }
    location /api/cli/     { set $up onboarding-api:8080; proxy_pass http://$up; }
    location /api/audit-logs { set $up onboarding-api:8080; proxy_pass http://$up; }
    location /api/clusters { set $up onboarding-api:8080; proxy_pass http://$up; }
    location /api/proxy-groups { set $up onboarding-api:8080; proxy_pass http://$up; }
    location /api/snapshot-retention { set $up onboarding-api:8080; proxy_pass http://$up; }
    location /api/v1/config-export { set $up onboarding-api:8080; proxy_pass http://$up; }
    location /api/v1/monitoring { set $up onboarding-api:8080; proxy_pass http://$up; }

    # === Config Service ===
    location /api/servers  { set $up config-service:8084; proxy_pass http://$up; }
    location /api/security-profiles { set $up config-service:8084; proxy_pass http://$up; }
    location /api/flows    { set $up config-service:8084; proxy_pass http://$up; }
    location /api/external-destinations { set $up config-service:8084; proxy_pass http://$up; }
    location /api/encryption-keys { set $up config-service:8084; proxy_pass http://$up; }
    location /api/connectors { set $up config-service:8084; proxy_pass http://$up; }
    location /api/function-queues { set $up config-service:8084; proxy_pass http://$up; }
    location /api/scheduler { set $up config-service:8084; proxy_pass http://$up; }
    location /api/sla      { set $up config-service:8084; proxy_pass http://$up; }
    location /api/activity/ { set $up config-service:8084; proxy_pass http://$up; }
    location /api/compliance { set $up config-service:8084; proxy_pass http://$up; }
    location /api/flow-executions { set $up config-service:8084; proxy_pass http://$up; }
    location /api/flow-steps { set $up onboarding-api:8080; proxy_pass http://$up; }
    location /api/listener-security-policies { set $up config-service:8084; proxy_pass http://$up; }
    location /api/as2-partnerships { set $up config-service:8084; proxy_pass http://$up; }
    location /api/folder-templates { set $up config-service:8084; proxy_pass http://$up; }
    location /api/legacy-servers { set $up config-service:8084; proxy_pass http://$up; }
    location /api/platform-settings { set $up config-service:8084; proxy_pass http://$up; }
    location /api/v1/migration { set $up config-service:8084; proxy_pass http://$up; }
    location /api/fabric/  { set $up config-service:8084; proxy_pass http://$up; }

    # === Partners (management API — distinct from /api/partner/ portal) ===
    location /api/partners { set $up onboarding-api:8080; proxy_pass http://$up; }
    location /api/partner-webhooks { set $up onboarding-api:8080; proxy_pass http://$up; }

    # === DLQ ===
    location /api/dlq/     { set $up onboarding-api:8080; proxy_pass http://$up; }

    # === Gateway ===
    location /api/gateway/ { set $up gateway-service:8085; proxy_pass http://$up; }

    # === Encryption ===
    location /api/encrypt/ { set $up encryption-service:8086; proxy_pass http://$up; }

    # === DMZ ===
    location /api/dmz/     { set $up dmz-proxy:8088; proxy_pass http://$up; }
    location /api/proxy/   { set $up dmz-proxy:8088; proxy_pass http://$up; }

    # === License ===
    location /api/v1/licenses { set $up license-service:8089; proxy_pass http://$up; }

    # === Analytics ===
    location /api/v1/analytics/ { set $up analytics-service:8090; proxy_pass http://$up; }

    # === AI Engine ===
    location /api/v1/ai/   { set $up ai-engine:8091; proxy_pass http://$up; }
    location /api/v1/proxy/ { set $up ai-engine:8091; proxy_pass http://$up; }
    location /api/v1/threats/ { set $up ai-engine:8091; proxy_pass http://$up; }

    # === Screening ===
    location /api/v1/screening/ { set $up screening-service:8092; proxy_pass http://$up; }
    location /api/v1/dlp/      { set $up screening-service:8092; proxy_pass http://$up; }
    location /api/v1/quarantine { set $up screening-service:8092; proxy_pass http://$up; }

    # === Keystore ===
    location /api/v1/keys  { set $up keystore-manager:8093; proxy_pass http://$up; }

    # === Storage ===
    location /api/v1/storage/ { set $up storage-manager:8096; proxy_pass http://$up; }

    # === Notification ===
    location /api/notifications { set $up notification-service:8097; proxy_pass http://$up; }

    # === EDI Converter ===
    location /api/v1/edi/ { set $up edi-converter:8095; proxy_pass http://$up; }
    location /api/v1/convert/ { set $up edi-converter:8095; proxy_pass http://$up; }

    # === Platform Sentinel ===
    location /api/v1/sentinel/ { set $up platform-sentinel:8098; proxy_pass http://$up; }

    # === Partner Portal API ===
    location /api/partner/ { set $up onboarding-api:8080; proxy_pass http://$up; }

    # === Activity Monitor ===
    location /api/activity-monitor { set $up onboarding-api:8080; proxy_pass http://$up; }

    # === Platform Listeners ===
    location /api/platform/listeners { set $up onboarding-api:8080; proxy_pass http://$up; }

    # === Onboarding sub-APIs ===
    location /api/v2/transfer/ { set $up onboarding-api:8080; proxy_pass http://$up; }
    location /api/v1/tenants { set $up onboarding-api:8080; proxy_pass http://$up; }
    location /api/v1/auto-onboard/ { set $up onboarding-api:8080; proxy_pass http://$up; }
    location /api/v1/blockchain/ { set $up onboarding-api:8080; proxy_pass http://$up; }
    location /api/2fa/ { set $up onboarding-api:8080; proxy_pass http://$up; }
    location /api/v1/db-advisory { set $up onboarding-api:8080; proxy_pass http://$up; }
    location /api/migration { set $up onboarding-api:8080; proxy_pass http://$up; }

    # === Forwarder ===
    location /api/v1/forwarder/ { set $up external-forwarder-service:8087; proxy_pass http://$up; }
    location /api/forward/ { set $up external-forwarder-service:8087; proxy_pass http://$up; }

    # === File Manager (FTP-Web) ===
    location /api/files/ { set $up ftp-web-service:8083; proxy_pass http://$up; }

    # === Admin UI (default) — HTTP backend (nginx static files, no TLS) ===
    location / {
        set $ui ui-service:8080;
        proxy_pass http://$ui;
    }

    # === File Portal — HTTP backend ===
    location /portal/ {
        set $fp ftp-web-ui:8080;
        proxy_pass http://$fp/;
    }

    # === Partner Portal — HTTP backend (inline nginx config, no TLS yet) ===
    location /partner/ {
        set $pp partner-portal:8080;
        proxy_pass http://$pp/;
    }

    # === Health ===
    location /health {
        return 200 '{"status":"UP","service":"api-gateway"}';
        add_header Content-Type application/json;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
