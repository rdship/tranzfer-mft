resolver 127.0.0.11 valid=10s ipv6=off;

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;

server {
    # HTTP listener (8080) — always available
    listen 8080;
    # HTTPS listener (8443) — enabled when TLS cert is present
    listen 8443 ssl;
    server_name _;

    # TLS config — auto-generated cert at /etc/nginx/ssl/
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!3DES:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Proxy params
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_connect_timeout 10s;
    proxy_read_timeout 300s;
    client_max_body_size 512M;

    # Backend TLS — self-signed certs on internal network (trusted)
    proxy_ssl_verify off;
    proxy_ssl_protocols TLSv1.2 TLSv1.3;

    # Health probe — available on both HTTP and HTTPS
    location = /nginx-health { access_log off; return 200 "ok\n"; }

    # HTTP → HTTPS redirect using 308 (Permanent Redirect).
    # 308 preserves the HTTP method — POST stays POST, body is preserved.
    # 301 would change POST→GET, breaking login and all write operations.
    if ($scheme = http) {
        return 308 https://$host$request_uri;
    }

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;

    # === Onboarding API ===
    location /api/auth/    { set $up onboarding-api:9080; proxy_pass https://$up; }
    location /api/accounts { set $up onboarding-api:9080; proxy_pass https://$up; }
    location /api/users    { set $up onboarding-api:9080; proxy_pass https://$up; }
    location /api/folder-mappings { set $up onboarding-api:9080; proxy_pass https://$up; }
    location /api/service-registry { set $up onboarding-api:9080; proxy_pass https://$up; }
    location /api/p2p/     { set $up onboarding-api:9080; proxy_pass https://$up; }
    location /api/journey  { set $up onboarding-api:9080; proxy_pass https://$up; }
    location /api/cli/     { set $up onboarding-api:9080; proxy_pass https://$up; }
    location /api/audit-logs { set $up onboarding-api:9080; proxy_pass https://$up; }

    # === Config Service ===
    location /api/servers  { set $up config-service:9084; proxy_pass https://$up; }
    location /api/security-profiles { set $up config-service:9084; proxy_pass https://$up; }
    location /api/flows    { set $up config-service:9084; proxy_pass https://$up; }
    location /api/external-destinations { set $up config-service:9084; proxy_pass https://$up; }
    location /api/encryption-keys { set $up config-service:9084; proxy_pass https://$up; }
    location /api/connectors { set $up config-service:9084; proxy_pass https://$up; }
    location /api/function-queues { set $up config-service:9084; proxy_pass https://$up; }
    location /api/scheduler { set $up config-service:9084; proxy_pass https://$up; }
    location /api/sla      { set $up config-service:9084; proxy_pass https://$up; }
    location /api/activity/ { set $up config-service:9084; proxy_pass https://$up; }

    # === Gateway ===
    location /api/gateway/ { set $up gateway-service:9085; proxy_pass https://$up; }

    # === Encryption ===
    location /api/encrypt/ { set $up encryption-service:9086; proxy_pass https://$up; }

    # === DMZ ===
    location /api/dmz/     { set $up dmz-proxy:9088; proxy_pass https://$up; }

    # === License ===
    location /api/v1/licenses { set $up license-service:9089; proxy_pass https://$up; }

    # === Analytics ===
    location /api/v1/analytics/ { set $up analytics-service:9090; proxy_pass https://$up; }

    # === AI Engine ===
    location /api/v1/ai/   { set $up ai-engine:9091; proxy_pass https://$up; }

    # === Screening ===
    location /api/v1/screening/ { set $up screening-service:9092; proxy_pass https://$up; }

    # === Keystore ===
    location /api/v1/keys  { set $up keystore-manager:9093; proxy_pass https://$up; }

    # === Storage ===
    location /api/v1/storage/ { set $up storage-manager:9096; proxy_pass https://$up; }

    # === EDI Converter ===
    location /api/v1/edi/ { set $up edi-converter:9095; proxy_pass https://$up; }

    # === Platform Sentinel ===
    location /api/v1/sentinel/ { set $up platform-sentinel:9098; proxy_pass https://$up; }

    # === Partner Portal API ===
    location /api/partner/ { set $up onboarding-api:9080; proxy_pass https://$up; }

    # === Activity Monitor ===
    location /api/activity-monitor { set $up onboarding-api:9080; proxy_pass https://$up; }

    # === Platform Listeners ===
    location /api/platform/listeners { set $up onboarding-api:9080; proxy_pass https://$up; }

    # === Onboarding sub-APIs ===
    location /api/v2/transfer/ { set $up onboarding-api:9080; proxy_pass https://$up; }
    location /api/v1/tenants { set $up onboarding-api:9080; proxy_pass https://$up; }
    location /api/v1/auto-onboard/ { set $up onboarding-api:9080; proxy_pass https://$up; }
    location /api/v1/blockchain/ { set $up onboarding-api:9080; proxy_pass https://$up; }
    location /api/2fa/ { set $up onboarding-api:9080; proxy_pass https://$up; }

    # === Admin UI (default) — HTTP backend (nginx static files, no TLS) ===
    location / {
        set $ui ui-service:8443;
        proxy_pass https://$ui;
    }

    # === File Portal — HTTP backend ===
    location /portal/ {
        set $fp ftp-web-ui:8443;
        proxy_pass https://$fp/;
    }

    # === Partner Portal — HTTP backend ===
    location /partner/ {
        set $pp partner-portal:8443;
        proxy_pass https://$pp/;
    }

    # === Health ===
    location /health {
        return 200 '{"status":"UP","service":"api-gateway"}';
        add_header Content-Type application/json;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
